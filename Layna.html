<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layna</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#c7c7cf;--accent2:#e8e8ec;
  --red:#e06a6a;--green:#7fbf9a;--amber:#d6a95f;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  --cols:4;
}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;cursor:pointer}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{order:-1;display:inline-flex;flex-direction:column;align-items:flex-start;flex-shrink:0;line-height:1}
.logo .name{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:.5px}
.logo .name b{color:#fff}
.logo .ver{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-top:2px}
.home-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:18px;background:var(--bg4);border:1px solid transparent;border-radius:var(--radius2);transition:all .15s}
.home-btn:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.folder-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer}
.folder-status:hover{border-color:var(--border2)}
.folder-status .dot{width:8px;height:8px;border-radius:50%;background:#5a5a6a}
.folder-status.connected .dot{background:#d8d8dc}
.user-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.user-field input{width:96px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:12px}
.size-btns{display:flex;gap:2px}
.size-btn{width:30px;height:30px;border-radius:var(--radius2);border:1px solid var(--border);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center}
.size-btn.active{color:#e8e8ec;border-color:#e8e8ec}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:#ececf0;color:#16161a}
.btn-primary:hover{background:#fff}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,90,90,.12)}
.btn-sm{padding:4px 9px;font-size:12px}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label .add{color:var(--accent);cursor:pointer;font-size:14px}
.sidebar-label .side-ctrls{display:flex;align-items:center;gap:11px}
.sidebar-label .side-ctrls .add:hover{color:var(--text)}
/* TREE */
.tree{font-size:13px}
.tree-row{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden}
.tree-row:hover{background:var(--bg4);color:var(--text)}
.tree-row.active{background:rgba(255,255,255,.08);color:var(--text)}
.tree-toggle{width:14px;text-align:center;color:var(--text3);flex-shrink:0;font-size:9px;transition:transform .1s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0 6px}
.tree-empty{color:var(--text3);font-size:12px;padding:8px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 20px 0;color:var(--text3);font-size:13px;flex-wrap:wrap}
.breadcrumb .sep{opacity:.5}
.breadcrumb .cur{color:var(--text)}
.main-head{display:flex;align-items:center;gap:12px;padding:8px 20px 0}
.main-head h1{font-family:var(--font-head);font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.main-head .desc{color:var(--text3);font-size:12px;margin-top:3px}
.main-head .spacer{flex:1}
.scroll{flex:1;overflow-y:auto;padding:14px 20px 28px}
/* еНШиЙ≤гГ©гВ§гГ≥гВҐгВ§гВ≥гГ≥ */
.ico{width:1.05em;height:1.05em;vertical-align:-0.16em;flex-shrink:0}
button .ico,.tree-row .ico,.hs-item .ico,.tl-title .ico,.breadcrumb .ico,.type-chip .ico{margin-right:.4em}
.ico+*{vertical-align:middle}
/* гГЧгГ≠гВЄгВІгВѓгГИгБЃгВњгГЦпЉИгВњгВ§гГ†гГ©гВ§гГ≥ / йА≤жНЧ / гВЈгГІгГГгГИпЉЙ */
.ptab-nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin:2px 0 18px}
.ptab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.5px;padding:9px 18px;cursor:pointer;margin-bottom:-1px}
.ptab:hover{color:var(--text)}
.ptab.on{color:var(--text);border-bottom-color:var(--edge)}
/* гВњгГЦеЖЕгБЃйА≤жНЧгГїгВЈгГІгГГгГИпЉИгГ°гВ§гГ≥гВ¶гВ£гГ≥гГЙгВ¶еЯЛгВБиЊЉгБњзЙИпЉЙ */
.pm-sel{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.pm-sel label{font-size:11px;color:var(--text3)}
.pm-sel select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;max-width:460px}
.pm-tabs{display:flex;gap:6px;margin-bottom:16px}
.pm-stab{background:var(--bg3);border:1px solid var(--border);color:var(--text3);border-radius:7px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer}
.pm-stab:hover{color:var(--text)}
.pm-stab.on{background:rgba(96,165,255,.16);border-color:var(--edge);color:var(--text)}
.pm-card{border:1px solid var(--border);border-radius:12px;background:var(--bg2);padding:16px 18px;margin-bottom:6px}
.pm-body{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.pm-body canvas{flex-shrink:0;cursor:pointer}
.pm-ptbl{flex:1;min-width:320px;border-collapse:collapse}
.pm-ptbl th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid var(--border)}
.pm-ptbl td{padding:6px 8px;border-bottom:1px solid var(--bg3);vertical-align:middle;cursor:pointer}
.pm-ptbl tr:hover td{background:var(--bg3)}
.pm-ptbl tr.pick td{background:rgba(96,165,255,.12)}
.pm-sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:7px;vertical-align:-1px}
.pm-bar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;min-width:80px}
.pm-bar>i{display:block;height:100%;border-radius:4px}
.pm-num{text-align:right;font-variant-numeric:tabular-nums}
.pm-pct{color:var(--text3);font-variant-numeric:tabular-nums}
.pm-h{font-family:var(--font-head);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 2px 10px}
.pm-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700;color:#101013}
.pm-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.pm-tile{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;background:var(--bg2)}
.pm-tile:hover{border-color:var(--edge);box-shadow:0 0 10px var(--edgeglow)}
.pm-tile .th{aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;color:var(--text3);overflow:hidden}
.pm-tile .th img{width:100%;height:100%;object-fit:cover}
.pm-tile .bd{padding:7px 9px}.pm-tile .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-tile .mt{display:flex;align-items:center;gap:6px;margin-top:5px}.pm-tile .pth{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-stbl{border-collapse:collapse;width:100%}
.pm-stbl th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:5px 8px;border-bottom:1px solid var(--border)}
.pm-stbl td{padding:7px 8px;border-bottom:1px solid var(--bg3)}
.pm-stbl .sn{font-weight:600}
.pm-empty{color:var(--text3);padding:44px;text-align:center}
.pm-mod{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;z-index:400}
.pm-mod.on{display:flex}
.pm-mod .top{display:flex;align-items:center;gap:10px;padding:12px 16px;color:var(--text)}
.pm-mod .top .sp{flex:1}
.pm-mod .bd{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:0 16px 16px}
.pm-mod video{max-width:100%;max-height:100%}
/* гГЧгГ≠гВЄгВІгВѓгГИгБЃгВњгВ§гГ†гГ©гВ§гГ≥гГїгГЫгГЉгГ† */
/* гГЫгГЉгГ†зФїйЭҐпЉИгГЧгГ≠гВЄгВІгВѓгГИйБЄжКЮпЉЙвАФ гВЈгГ≥гГЧгГЂгБ™гГ©гГ≥гГБгГ£гГЉйҐ® */
.home-screen{max-width:1120px;margin:0 auto;padding:30px 10px 50px}
.home-hd{margin:8px 4px 30px}
.home-hd .ht{font-family:var(--font-head);font-size:30px;font-weight:800;letter-spacing:.5px}
.home-hd .hs{color:var(--text3);font-size:13px;margin-top:7px}
.proj-grid{display:grid;gap:24px;grid-template-columns:repeat(auto-fill,272px);justify-content:center}
.proj-card{border:1px solid var(--edge);border-radius:16px;overflow:hidden;background:var(--bg);cursor:pointer;box-shadow:0 0 10px var(--edgeglow);transition:box-shadow .2s ease,border-color .2s ease}
.proj-card:hover{animation:tile-beat 2.6s ease-in-out infinite}
@keyframes tile-beat{
  0%,100%{box-shadow:0 0 8px rgba(96,165,255,.14);border-color:rgba(96,165,255,.5)}
  50%{box-shadow:0 0 16px rgba(96,165,255,.4);border-color:rgba(120,180,255,.85)}
}
.proj-media{aspect-ratio:16/9;background:#000 center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative}
.proj-media img{width:100%;height:100%;object-fit:cover;display:block}
.proj-media.ph{background:linear-gradient(135deg,#1a2338,#0e131d)}
.proj-initial{font-family:var(--font-head);font-size:56px;font-weight:800;color:rgba(150,180,255,.34)}
.proj-body{padding:15px 17px 17px}
.proj-name{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap}
.proj-badge{font-size:11px;font-weight:700;padding:2px 11px;border-radius:20px;border:1px solid}
.proj-cnt,.proj-upd{font-size:11px;color:var(--text3)}
.proj-add{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:216px;border:none;box-shadow:none;color:var(--text3);gap:8px;background:transparent}
.proj-add:hover{color:var(--text);animation:none;box-shadow:none;border:none}
.proj-add .p{font-size:36px;font-weight:300;line-height:1}
.proj-empty{color:var(--text3);padding:60px 10px;text-align:center;grid-column:1/-1}
.home-flex{display:flex;gap:20px;align-items:flex-start}
.home-main{flex:1;min-width:0}
.home-side{width:236px;flex-shrink:0;position:sticky;top:0}
.home-side h3{font-family:var(--font-head);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:2px 4px 10px}
.hs-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);cursor:pointer;margin-bottom:8px}
.hs-item:hover{border-color:var(--edge);box-shadow:0 0 8px var(--edgeglow)}
.hs-item .ic{font-size:14px}.hs-item .nm{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs-item .ct{font-size:10px;color:var(--text3)}
.tl{display:flex;flex-direction:column}
.tl-item{display:flex;gap:13px;padding:13px 10px;margin:0 -10px;border-bottom:1px solid var(--border);border-radius:8px;cursor:pointer}
.tl-item:hover{background:var(--bg2)}
.tl-thumb{width:124px;height:70px;flex-shrink:0;border-radius:6px;background:#000 center/cover no-repeat;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.tl-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tl-path{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-title{font-size:14px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-stage{display:inline-block;padding:1px 9px;border-radius:5px;font-size:10px;font-weight:700;color:#101013}
.tl-kind{font-size:10px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:0 6px}
.tl-fchip{font-size:10px;color:#9ec5ff;border:1px solid rgba(96,165,255,.5);border-radius:4px;padding:0 6px}
.tl-comment{font-size:13px;color:var(--text);margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.tl-meta{font-size:11px;color:var(--text3);margin-top:4px}
.tl-item.is-comment .tl-thumb{opacity:.85}
.filter-dd{position:relative;display:inline-block}
.filter-panel{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:210px;max-height:340px;overflow-y:auto;z-index:30;box-shadow:0 8px 26px rgba(0,0,0,.55)}
.filter-panel.hidden{display:none}
.filter-tools{display:flex;gap:6px;padding:2px 2px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.filter-row{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:13px}
.filter-row:hover{background:var(--bg3)}
.filter-row input{accent-color:#5aa2ff;cursor:pointer}
.section-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label:first-child{margin-top:8px}
.section-label .acts{margin-left:auto;display:flex;gap:6px}

/* GRID / CARDS */
.grid{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,4),1fr)}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.vcard:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.vcard-thumb{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-noimg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#17171b,#232329);color:rgba(255,255,255,.4)}
.vcard-noimg .g{font-size:30px}
.vcard-noimg .lab{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;font-family:var(--font-head)}
.vcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none;transition:opacity .15s}
.vcard-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.vcard:hover .vcard-play{opacity:0}
.vcard-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:4}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.vcard-act:hover{background:rgba(255,90,90,.55)}
.vcard-cnt{position:absolute;bottom:6px;right:8px;font-size:10px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5);padding:1px 6px;border-radius:8px;z-index:3}
.vcard-reel{position:absolute;bottom:6px;left:8px;max-width:70%;font-size:10px;color:rgba(255,255,255,.9);background:rgba(96,165,255,.32);border:1px solid rgba(96,165,255,.5);padding:1px 6px;border-radius:8px;z-index:4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-reel:hover{background:rgba(96,165,255,.5)}
.vcard-ov{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:2;pointer-events:none}
.vcard-ov .t{font-size:12px;font-weight:500;color:#fff;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.vcard-name-big{font-family:var(--font-head);font-size:18px;font-weight:700;padding:10px 12px 12px;line-height:1.3}
.log-gen{padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);background:var(--bg2)}
.log-gen-head{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.badge-empty{background:rgba(90,90,106,.25);color:#9a9aaa}
.badge-pending{background:rgba(120,120,140,.3);color:#cbd5e1}
.badge-approved{background:rgba(127,191,154,.85);color:#0c1a12}
.badge-retake{background:rgba(214,169,95,.9);color:#1a1200}
.badge-rejected{background:rgba(224,106,106,.88);color:#fff}
.add-tile{border:1px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);cursor:pointer;min-height:130px;transition:all .15s}
.add-tile:hover{border-color:var(--border2);color:var(--text2);background:rgba(255,255,255,.03)}
.add-tile .p{font-size:26px}
.empty{color:var(--text3);text-align:center;padding:50px 20px;border:1px dashed var(--border);border-radius:var(--radius)}

<script>
'use strict';
/* ============================================================
   Layna вАФ дїїжДПйЪОе±§гГДгГ™гГЉзЙИпЉИShotGrid гГ©гВ§гВѓ / OGREF гГЗгВґгВ§гГ≥пЉЙ
   гБ©гБЃгГОгГЉгГЙгВВгАМе≠РпЉИжЮЭеИЖгБЛгВМпЉЙгАНгБ®гАМеЛХзФїгГ≠гВ∞пЉИеЈ•з®ЛгБФгБ®гБЃе±•ж≠іпЉЙгАНгВТжМБгБ¶гВЛгАВ
   йЪОе±§гБЃжХ∞гГїеРНеЙНгБѓгГ¶гГЉгВґгГЉгБМиЗ™зФ±гБЂдљЬжИРгАВдњЭе≠ШгБѓгГ≠гГЉгВЂгГЂгГХгВ©гГЂгГАгАВ
   ============================================================ */

const DEFAULT_STATUSES=[
  {id:'pending',label:'гГБгВІгГГгВѓеЊЕгБ°',color:'#9a9ab0'},
  {id:'approved',label:'OK',color:'#5affa0'},

  {id:'rejected',label:'NG',color:'#ff5a5a'},
];
function hexA(hex,a){const m=/^#?([0-9a-fA-F]{2})([0-9a-fA-F]{2})([0-9a-fA-F]{2})/.exec(hex||'')||[];return 'rgba('+parseInt(m[1]||'7a',16)+','+parseInt(m[2]||'7a',16)+','+parseInt(m[3]||'90',16)+','+a+')'}
const STATUS={
  empty:{label:'вАФ',cls:'empty',color:'#3a3a42'},
  pending:{label:'гГБгВІгГГгВѓеЊЕгБ°',cls:'pending',color:'#8a8a92'},

  retake:{label:'гГ™гГЖгВ§гВѓ',cls:'retake',color:'#d6a95f'},
  rejected:{label:'NG',cls:'rejected',color:'#e06a6a'},
};
function defaultTemplates(){return[
  {id:'tpl_anim',name:'гВҐгГЛгГ°еЈ•з®ЛпЉИгГђгВ§гВҐгВ¶гГИвЖТгВҐгГЛгГ°вЖТгВїгВЂгГ≥гГАгГ™пЉЙ',steps:[{name:'гГђгВ§гВҐгВ¶гГИ',color:'#7c6fff'},{name:'гВҐгГЛгГ°гГЉгВЈгГІгГ≥',color:'#5a9bff'},{name:'гВїгВЂгГ≥гГАгГ™',color:'#c06fff'}]},
  {id:'tpl_cg',name:'CGеЈ•з®ЛпЉИгГҐгГЗгГ™гГ≥гВ∞гАЬгВ≥гГ≥гГЭгВЄгГГгГИпЉЙ',steps:[{name:'гГҐгГЗгГ™гГ≥гВ∞',color:'#7c6fff'},{name:'гВҐгГЛгГ°гГЉгВЈгГІгГ≥',color:'#5a9bff'},{name:'гГ©гВ§гГЖгВ£гГ≥гВ∞',color:'#ffb85a'},{name:'гВ≥гГ≥гГЭгВЄгГГгГИ',color:'#5affa0'}]},

];}

let _c=0;
function newId(p){_c++;return p+'_'+Date.now().toString(36)+_c.toString(36)}
function nowIso(){try{return new Date().toISOString()}catch(_){return''}}

/* ---------- IndexedDB ---------- */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('layna',1);r.onupgradeneeded=()=>{const d=r.result;for(const s of['handles','blobs','kv'])if(!d.objectStoreNames.contains(s))d.createObjectStore(s)};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbPut(s,k,v){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function idbGet(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
async function idbDel(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}

/* ---------- гВєгГИгГђгГЉгВЄжКљи±°еМЦпЉИfolder / idbпЉЙ ---------- */
const storage={
  /* DBпЉИlayna_db.json зЫЄељУпЉЙгБѓеЄЄгБЂгГЦгГ©гВ¶гВґеЖЕдњЭе≠Ш(IndexedDB)гАВ
     еЛХзФїгГїзФїеГПгБѓгГЧгГ≠гВЄгВІгВѓгГИгБФгБ®гБЂжМЗеЃЪгБЧгБЯгГХгВ©гГЂгГАгБЄгАБжЬ™жМЗеЃЪгБ™гВЙгГЦгГ©гВ¶гВґеЖЕдњЭе≠ШгБЄж†ЉзіНгАВ */
  mode:'idb',rootHandle:null,urlCache:new Map(),
  supportsFolder(){return typeof window.showDirectoryPicker==='function'},
  useIdb(){this.mode='idb';try{localStorage.setItem('layna_mode','idb')}catch(_){}},
  /* гГШгГГгГАгГЉи°®з§ЇпЉЪгГЧгГ≠гВЄгВІгВѓгГИгВТйЦЛгБДгБ¶гБДгБ¶е∞ВзФ®гГХгВ©гГЂгГАжМЗеЃЪгБМгБВгВМгБ∞гБЭгБЃеРНеЙНгАБгБ™гБСгВМгБ∞гГЦгГ©гВ¶гВґеЖЕдњЭе≠Ш */
  folderLabel(){const cur=(DB&&state&&state.currentId)?getNode(state.currentId):null;const root=cur?rootOf(cur):null;if(root&&root.folderName)return root.folderName;return 'гГЦгГ©гВ¶гВґеЖЕдњЭе≠Ш';},
  async _subdir(n,root,create){let dir=root;for(const p of String(n).split('/'))if(p)dir=await dir.getDirectoryHandle(p,{create:create!==false});return dir},
  /* гГЧгГ≠гВЄгВІгВѓгГИеИ•гГХгВ©гГЂгГАпЉИи®≠еЃЪжЄИгБњгБ™гВЙ directory handle гВТињФгБЩпЉЙ */
  projHandles:new Map(),
  async projRoot(projectId){if(!projectId)return null;if(this.projHandles.has(projectId))return this.projHandles.get(projectId);let h=null;try{h=await idbGet('handles','proj_'+projectId)}catch(_){}if(h){try{if(await h.queryPermission({mode:'readwrite'})!=='granted'){if(await h.requestPermission({mode:'readwrite'})!=='granted')h=null}}catch(_){h=null}}this.projHandles.set(projectId,h);return h;},
  async setProjRoot(projectId,handle){await idbPut('handles','proj_'+projectId,handle);this.projHandles.set(projectId,handle);},
  async clearProjRoot(projectId){try{await idbDel('handles','proj_'+projectId)}catch(_){}this.projHandles.set(projectId,null);},
  async loadDb(){return (await idbGet('kv','db'))||null},
  async saveDb(db){await idbPut('kv','db',db)},
  /* opts.projectId жМЗеЃЪгБЛгБ§и®≠еЃЪжЄИгБњгБ™гВЙгГЧгГ≠гВЄгВІгВѓгГИгГХгВ©гГЂгГАгБЄдњЭе≠ШпЉИref гБѓ p:<id>|<path>пЉЙгАВ
     жЬ™жМЗеЃЪгГїжЬ™и®≠еЃЪгБѓгГЦгГ©гВ¶гВґеЖЕдњЭе≠ШпЉИref гБѓ idb:...пЉЙгАВ */
  async putMedia(sub,fn,blob,opts){
    opts=opts||{};
    if(opts.projectId){const ph=await this.projRoot(opts.projectId);if(ph){const dir=await this._subdir(sub,ph,true);const fh=await dir.getFileHandle(fn,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return 'p:'+opts.projectId+'|'+sub+'/'+fn}}
    const key='blob_'+newId('b')+'_'+fn;await idbPut('blobs',key,blob);return 'idb:'+key;
  },
  _parseRef(ref){if(ref.startsWith('p:')){const i=ref.indexOf('|');return{proj:ref.slice(2,i),path:ref.slice(i+1)}}return{proj:null,path:ref}},
  async _fileHandle(ref,create){const {proj,path}=this._parseRef(ref);const parts=path.split('/');const fn=parts.pop();let root=this.rootHandle;if(proj){root=await this.projRoot(proj);if(!root)return null}if(!root)return null;let dir=root;for(const p of parts)if(p)dir=await dir.getDirectoryHandle(p,{create:create===true});return{dir,fn};},
  async delMedia(ref){if(!ref)return;try{if(ref.startsWith('idb:'))await idbDel('blobs',ref.slice(4));else{const h=await this._fileHandle(ref);if(h)await h.dir.removeEntry(h.fn)}}catch(e){}const u=this.urlCache.get(ref);if(u){URL.revokeObjectURL(u);this.urlCache.delete(ref)}},
  async getURL(ref){if(!ref)return null;if(this.urlCache.has(ref))return this.urlCache.get(ref);let blob=null;try{if(ref.startsWith('idb:'))blob=await idbGet('blobs',ref.slice(4));else{const h=await this._fileHandle(ref);if(h)blob=await (await h.dir.getFileHandle(h.fn)).getFile()}}catch(e){return null}if(!blob)return null;const url=URL.createObjectURL(blob);this.urlCache.set(ref,url);return url},
};

/* ---------- зКґжЕЛ / DB ---------- */
let DB=null;let curUploadUI=null;

function migrate(old){
  const nodes=[];
  for(const p of old.projects||[])nodes.push({id:p.id,parentId:null,name:p.name,description:p.description||'',thumbnail:p.thumbnail||null,createdAt:p.createdAt||nowIso(),versions:[]});
  for(const s of old.shots||[])nodes.push({id:s.id,parentId:s.projectId,name:s.name,description:s.description||'',thumbnail:s.thumbnail||null,createdAt:s.createdAt||nowIso(),versions:(s.versions||[]).map(v=>({...v,thumb:v.thumb||v.thumbnail||null}))});
  const templates=(old.pipelineTemplates&&old.pipelineTemplates.length)?old.pipelineTemplates.map(t=>({id:t.id,name:t.name,steps:(t.steps||[]).map(st=>({name:st.name,color:st.color||'#7c6fff'}))})):defaultTemplates();
  return{version:2,templates,nodes};
}

/* ---------- гГДгГ™гГЉжУНдљЬ ---------- */
const getNode=id=>DB.nodes.find(n=>n.id===id)||null;
const childrenOf=id=>DB.nodes.filter(n=>n.parentId===id).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
function pathOf(id){const p=[];let n=getNode(id);while(n){p.unshift(n);n=n.parentId?getNode(n.parentId):null}return p}
function descendants(id){const out=[];const walk=pid=>{for(const c of childrenOf(pid)){out.push(c);walk(c.id)}};walk(id);return out}
/* гГЧгГ≠гВЄгВІгВѓгГИпЉИгГЂгГЉгГИпЉЙгБФгБ®гБЃгВєгГЖгГЉгВњгВєеЃЪзЊ©гАВжЬ™и®≠еЃЪгБѓгГЗгГХгВ©гГЂгГИ4з®Ѓ */
function projStatuses(node){
  let n=node;
  while(n&&n.parentId){const p=getNode(n.parentId);if(!p)break;n=p}
  return (n&&Array.isArray(n.statuses)&&n.statuses.length)?n.statuses:DEFAULT_STATUSES;
}
function nodeStatus(node){
  if(node.type==='review'){
    if(!(node.versions&&node.versions.length))return 'empty';
    return node.status||projStatuses(node)[0].id;
  }
  const ch=childrenOf(node.id);
  if(!ch.length)return 'empty';
  const sts=ch.map(nodeStatus).filter(s=>s!=='empty');
  if(!sts.length)return 'empty';
  if(sts.every(s=>s===sts[0]))return sts[0];
  return projStatuses(node)[0].id; /* жЈЈеЬ®гБѓеЕИй†≠гВєгГЖгГЉгВњгВєжЙ±гБД */
}
function stInfo(node){
  const id=nodeStatus(node);
  if(id==='empty')return{label:'вАФ',color:'#5a5a6a'};
  return projStatuses(node).find(s=>s.id===id)||{label:'вАФ',color:'#5a5a6a'};
}
function reviewToStatus(st){return st}
/* гАМеЃМдЇЖгАНжЙ±гБДгБЃгВєгГЖгГЉгВњгВєеИ§еЃЪпЉИid гБЛ гГ©гГЩгГЂгБІеИ§жЦ≠пЉЙ */
function isDoneStatus(root,statusId){
  if(!statusId||statusId==='empty')return false;
  if(statusId==='approved')return true;
  const s=projStatuses(root).find(x=>x.id===statusId);
  return !!(s&&/еЃМдЇЖ|жЙњи™Н|дЄКгБМгВК|гГХгВ£гГГгВѓгВє|ok\b|done|fix|approve|complete/i.test(s.label));
}
/* гГЧгГ≠гВЄгВІгВѓгГИпЉИгГЂгГЉгГИпЉЙгБМеЃМдЇЖгБЛгАВеЛХзФїгБЃгБВгВЛгГђгГУгГ•гГЉгБМеЕ®гБ¶еЃМдЇЖгВєгГЖгГЉгВњгВєгБ™гВЙеЃМдЇЖ */
function projectDone(root){
  const reviews=[root,...descendants(root.id)].filter(n=>n.type==='review'&&n.versions&&n.versions.length);
  if(!reviews.length)return false;
  return reviews.every(r=>isDoneStatus(root,nodeStatus(r)));
}
/* гГЧгГ≠гВЄгВІгВѓгГИгБЃгГРгГГгВЄпЉИйА≤и°МдЄ≠ / еЃМдЇЖпЉЙ */
function projBadge(root){return projectDone(root)?{label:'еЃМдЇЖ',color:'#5affa0'}:{label:'йА≤и°МдЄ≠',color:'#5a9bff'};}

  updateFolderStatus();initSizeBtns();updateNotifBadge();
  /* гГ™гГ≠гГЉгГЙжЩВгБѓеЙНеЫЮйЦЛгБДгБ¶гБДгБЯзФїйЭҐгВТеЊ©еЕГпЉИзД°еКєгБ™гВЙгГЫгГЉгГ†пЉЙ */
  let restored=false;
  try{
    const raw=localStorage.getItem('layna_loc');
    if(raw){const loc=JSON.parse(raw);
      if(loc&&loc.id&&getNode(loc.id)){
        state.currentId=loc.id;
        if(['timeline','progress','shots','browse'].includes(loc.tab))state.projTab=loc.tab;

function notify(title,text,opts){
  opts=opts||{};
  if(!DB)return null;
  if(!Array.isArray(DB.notifications))DB.notifications=[];
  const n={id:newId('ntf'),title:title||'йАЪзЯ•',text:text||'',time:nowIso(),read:false,nodeId:opts.nodeId||null};
  DB.notifications.unshift(n);
  if(DB.notifications.length>300)DB.notifications.length=300;
  persist();updateNotifBadge();
  const p=$('#notifPanel');if(p&&!p.classList.contains('hidden'))renderNotifPanel();

}
function updateNotifBadge(){
  const b=$('#notifBadge');if(!b)return;

  b.classList.toggle('hidden',c<=0);
}

/* гГОгГЉгГЙгБЃгГЂгГЉгГИпЉИгГЧгГ≠гВЄгВІгВѓгГИпЉЙ */
function rootOf(node){let n=node;while(n&&n.parentId){const p=getNode(n.parentId);if(!p)break;n=p}return n;}
/* гГЧгГ≠гВЄгВІгВѓгГИгБЃдЄКйГ®гВњгГЦпЉИеЄЄгБЂи°®з§ЇпЉЙгАВгВњгГЦгВѓгГ™гГГгВѓгБІгГЧгГ≠гВЄгВІгВѓгГИгБЃгГИгГГгГЧпЉЛи©≤ељУгВњгГЦгБЄ */

/* гГЧгГ≠гВЄгВІгВѓгГИпЉИгГЂгГЉгГИпЉЙйЕНдЄЛгБЃжЫіжЦ∞гВ§гГЩгГ≥гГИпЉИеЛХзФїгВҐгГГгГЧгГ≠гГЉгГЙгБЃгБњпЉЙгВТжЦ∞зЭАй†ЖгБІгАВ
   гВ≥гГ°гГ≥гГИињљеК†гВДгВєгГЖгГЉгВњгВєе§ЙжЫігБѓгВњгВ§гГ†гГ©гВ§гГ≥гБЂеЗЇгБХгБ™гБД */
function projectUpdates(rootId){
  const evs=[];const groups={};
  for(const n of descendants(rootId))if(n.type==='review')for(const v of (n.versions||[])){
    if(v.type!=='video')continue;
    const notes=(v.review&&v.review.notes)||[];
    const upNote=notes.find(x=>x.kind==='upload');
    const item={type:'upload',node:n,v,time:v.uploadedAt||'',stage:n.name,comment:upNote?upNote.text:null};
    if(v.submitId){
      /* гВµгГЦгГЯгГГгГИгГЦгГ≠гГГгВѓгБЃжПРеЗЇгБѓгБЊгБ®гВБгБ¶1гБ§гБЃгВњгВ§гГ†гГ©гВ§гГ≥гВ®гГ≥гГИгГ™гБЂ */
      let g=groups[v.submitId];
      if(!g){g={type:'submit',submitId:v.submitId,name:v.submitName||'гВµгГЦгГЯгГГгГИгГЦгГ≠гГГгВѓ',items:[],time:''};groups[v.submitId]=g;evs.push(g)}
      g.items.push(item);
      if(item.time>g.time)g.time=item.time;
      continue;
    }
    evs.push(item);
  }
  /* гБЊгБ®гВБгВ®гГ≥гГИгГ™гБЃеЈ•з®ЛдЄАи¶ІпЉИгГХгВ£гГЂгВњзФ®пЉЙпЉЪеРЂгБЊгВМгВЛеЈ•з®ЛгБЃгБ©гВМгБЛгБМи°®з§ЇеѓЊи±°гБ™гВЙи°®з§Ї */
  for(const g of Object.values(groups))g.stages=[...new Set(g.items.map(i=>i.stage))];
  evs.sort((a,b)=>a.time<b.time?1:a.time>b.time?-1:0);
  return evs;
}
/* гГЧгГ≠гВЄгВІгВѓгГИйЕНдЄЛгБІеЛХзФїгБЃгБВгВЛеЈ•з®ЛпЉИгГђгГУгГ•гГЉгГОгГЉгГЙпЉЙгБЃеРНеЙНдЄАи¶ІпЉИеЈ•з®Лй†ЖпЉЙ */

/* ============================================================
   гВҐгГОгГЖгГЉгВЈгГІгГ≥еЕ±йАЪпЉИFBзФїйЭҐгГїREELгБІеЕ±зФ®пЉЙ
   ============================================================ */
function paintStrokeList(ctx,W,H,list,alpha){
  ctx.globalAlpha=alpha;
  for(const st of list){
    if(!st.points||st.points.length<2)continue;
    ctx.strokeStyle=st.color||'#ff4d4d';
    ctx.lineWidth=Math.max(1.5,(st.w||0.004)*W);
    ctx.lineJoin=ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(st.points[0][0]*W,st.points[0][1]*H);
    for(let i=1;i<st.points.length;i++)ctx.lineTo(st.points[i][0]*W,st.points[i][1]*H);
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}
/* гГЦгГ©гВЈеЮЛжґИгБЧгВігГ†пЉЪеНКеЊДеЖЕгБЃзВєгБ†гБСгВТеПЦгВКйЩ§гБНгАБжЃЛгБ£гБЯеМЇйЦУгБІзЈЪгВТеИЖеЙ≤гАВ
   еѓЊи±°гБѓжМЗеЃЪгГђгВ§гГ§гГЉгБЃгБњгАВе§ЙжЫігБМгБ™гБСгВМгБ∞ null гВТињФгБЩгАВ */
function eraseFromList(list,x,y,r,aspect,layer){
  const out=[];let changed=false;
  for(const s of list){
    if((s.layer||1)!==layer){out.push(s);continue}
    const keep=s.points.map(q=>Math.hypot(q[0]-x,(q[1]-y)*aspect)>=r);
    if(keep.every(Boolean)){out.push(s);continue}
    changed=true;
    let run=[];
    for(let i=0;i<s.points.length;i++){
      if(keep[i])run.push(s.points[i]);
      else{if(run.length>=2)out.push({...s,points:run});run=[]}
    }
    if(run.length>=2)out.push({...s,points:run});
  }
  return changed?out:null;
}

/* гВЂгВєгВњгГ†еЛХзФїгГЧгГђгВ§гГ§гГЉпЉИвЧРеЖНзФЯгГЬгВњгГ≥пЉЛгГАгВ§гГ§гГОгГЦгБЃгВЈгГЉгВѓгГРгГЉпЉЙ */
function buildVPlayer(media,vid){
  const fmtT=s=>{s=Math.max(0,s||0);return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')};
  const center=el('div','vp-center','вЧР');
  const bar=el('div','vp-bar');
  const play=el('button','vp-play','вЧР');play.title='еЖНзФЯ / еБЬж≠Ґ';
  const time=el('span','vp-time','0:00 / 0:00');
  const track=el('div','vp-track');
  const ticks=el('div','ticks');for(let i=0;i<13;i++)ticks.appendChild(el('i'));
  const rail=el('div','rail');const fill=el('div','fill');const knob=el('div','knob');
  rail.appendChild(fill);rail.appendChild(knob);
  track.appendChild(ticks);track.appendChild(rail);
  bar.appendChild(play);bar.appendChild(track);bar.appendChild(time);
  media.appendChild(center);media.appendChild(bar);
  function update(){
    const d=vid.duration||0,c=vid.currentTime||0,p=d?(c/d*100):0;
    fill.style.width=p+'%';knob.style.left=p+'%';
    time.textContent=fmtT(c)+' / '+fmtT(d);
  }
  vid.addEventListener('loadedmetadata',update);
  vid.addEventListener('timeupdate',update);
  vid.addEventListener('play',()=>{center.classList.add('off');play.textContent='вЭЪвЭЪ';
    (function loop(){if(vid.paused||vid.ended)return;update();requestAnimationFrame(loop)})()});
  vid.addEventListener('pause',()=>{center.classList.remove('off');play.textContent='вЧР';update()});
  vid.addEventListener('ended',()=>{center.classList.remove('off');play.textContent='вЧР'});
  const toggle=()=>{if(vid.paused)vid.play().catch(()=>{});else vid.pause()};
  play.onclick=e=>{e.stopPropagation();toggle()};
  vid.addEventListener('click',toggle);
  const seek=e=>{const r=track.getBoundingClientRect();const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));if(vid.duration){vid.currentTime=p*vid.duration;update()}};
  let drag=false;
  track.onpointerdown=e=>{e.stopPropagation();drag=true;track.setPointerCapture(e.pointerId);seek(e)};
  track.onpointermove=e=>{if(drag)seek(e)};
  track.onpointerup=()=>{drag=false};
  return {update};
}

/* гВҐгГОгГЖгГЉгВЈгГІгГ≥дїШгБНгГХгГђгГЉгГ†гБЃгВєгВѓгГ™гГЉгГ≥гВЈгГІгГГгГИзФЯжИРпЉИгВ≠гГ£гГГгВЈгГ•пЉЛзЫіеИЧгВ≠гГ•гГЉпЉЙ */
const shotCache=new Map();let shotQueue=Promise.resolve();
function annotShotInto(cv,shot,n){
  const key=shot.fileRef+'|'+(n.time||'')+'|'+(n.frame||0);
  const paint=du=>{if(!du)return;const img=new Image();img.onload=()=>{cv.width=img.width;cv.height=img.height;cv.getContext('2d').drawImage(img,0,0)};img.src=du};
  if(shotCache.has(key)){paint(shotCache.get(key));return}
  shotQueue=shotQueue.then(async()=>{
    if(shotCache.has(key)){paint(shotCache.get(key));return}
    const url=await storage.getURL(shot.fileRef);if(!url)return;
    const du=await new Promise(res=>{
      const vd=document.createElement('video');vd.muted=true;vd.preload='auto';
      const to=setTimeout(()=>res(null),5000);
      vd.onloadedmetadata=()=>{try{vd.currentTime=(n.frame||0)/(shot.fps||24)+0.0001}catch(_){clearTimeout(to);res(null)}};
      vd.onseeked=()=>{
        clearTimeout(to);
        try{
          const W=360,H=Math.max(2,Math.round(W*vd.videoHeight/vd.videoWidth));
          const c=document.createElement('canvas');c.width=W;c.height=H;
          const ctx=c.getContext('2d');ctx.drawImage(vd,0,0,W,H);
          if(n.drawing)paintStrokeList(ctx,W,H,n.drawing,1);
          res(c.toDataURL('image/jpeg',0.72));
        }catch(_){res(null)}
        vd.removeAttribute('src');
      };
      vd.onerror=()=>{clearTimeout(to);res(null)};
      vd.src=url;
    });
    if(du)shotCache.set(key,du);
    paint(du);
  }).catch(()=>{});
}

/* еЕ±йАЪгВ≥гГ°гГ≥гГИгГЦгГ≠гГГгВѓпЉИзЈ®йЫЖгГїеЙКйЩ§гГїгГХгГђгГЉгГ†гВЄгГ£гГ≥гГЧгГїгВҐгГОгГЖгВєгВѓгВЈгГІеѓЊењЬпЉЙ */

async function deleteNode(node){

  const all=[node,...desc];
  for(const n of all)for(const v of n.versions||[]){await storage.delMedia(v.file);await storage.delMedia(v.thumb)}
  const ids=new Set(all.map(n=>n.id));

async function uploadVersion(node,file,ui,opts){
  opts=opts||{};
  ui.prog.classList.remove('hidden');ui.pct.textContent='гВµгГ†гГНгВ§гГЂзФЯжИРдЄ≠...';ui.bi.style.width='30%';
  const isVideo=file.type.startsWith('video/');
  try{
    const thumbDataUrl=await genThumb(file);ui.pct.textContent='дњЭе≠ШдЄ≠...';ui.bi.style.width='60%';
    const ext=(file.name.match(/\.[^.]+$/)||[''])[0];const id=newId('media');
    const sub=opts.sub||'media';const thumbSub=opts.sub?opts.sub+'/thumbnails':'thumbnails';const pm={projectId:opts.projectId};
    const mediaRef=await storage.putMedia(sub,id+ext,file,pm);
    let thumbRef=null;if(thumbDataUrl){const blob=await(await fetch(thumbDataUrl)).blob();thumbRef=await storage.putMedia(thumbSub,id+'.jpg',blob,pm)}else if(!isVideo)thumbRef=mediaRef;
    /* еРНеЙНпЉЪеЕ•еКЫгБМгБВгВМгБ∞гБЭгВМгАБз©ЇжђДгБ™гВЙеЛХзФїгБЃгВњгВ§гГИгГЂпЉИжЛ°еЉµе≠РгБ™гБЧгБЃгГХгВ°гВ§гГЂеРНпЉЙ */
    const vname=(opts.name&&opts.name.trim())||file.name.replace(/\.[^.]+$/,'');
    const version={id:newId('ver'),name:vname,type:isVideo?'video':'image',file:mediaRef,thumb:thumbRef,uploadedBy:currentUser(),uploadedAt:nowIso(),review:{status:'pending',notes:[]}};
    if(opts.comment&&opts.comment.trim())version.review.notes.push({author:currentUser(),text:opts.comment.trim(),time:nowIso(),kind:'upload'});
    node.versions.push(version);if(thumbRef)node.thumbnail=thumbRef;
    await persist();ui.bi.style.width='100%';render();resolveThumbs();toast('гВҐгГГгГЧгГ≠гГЉгГЙеЃМдЇЖ: '+version.name);
  }catch(e){ui.prog.classList.add('hidden');toast('гВҐгГГгГЧгГ≠гГЉгГЙе§±жХЧ: '+e.message)}

function genThumb(file){return new Promise(resolve=>{const isVideo=file.type.startsWith('video/');const url=URL.createObjectURL(file);const done=cv=>{URL.revokeObjectURL(url);resolve(cv?cv.toDataURL('image/jpeg',0.72):null)};const draw=(src,w,h)=>{const scale=Math.min(1,640/w);const cv=document.createElement('canvas');cv.width=Math.round(w*scale);cv.height=Math.round(h*scale);cv.getContext('2d').drawImage(src,0,0,cv.width,cv.height);return cv};if(isVideo){const vid=document.createElement('video');vid.preload='metadata';vid.muted=true;vid.src=url;vid.onloadeddata=()=>{try{vid.currentTime=Math.min(1,(vid.duration||2)/2)}catch(_){}}; vid.onseeked=()=>{try{done(draw(vid,vid.videoWidth,vid.videoHeight))}catch(_){done(null)}};vid.onerror=()=>done(null)}else{const img=new Image();img.onload=()=>done(draw(img,img.naturalWidth,img.naturalHeight));img.onerror=()=>done(null);img.src=url}})}

  let FPS=v.fps||24,totalFrames=1,lastFrame=-1;
  let tool=null,erasing=false,pending=[],stroke=null,brushW=4,eraseW=16;

  function close(){document.removeEventListener('keydown',onKey);ov.remove();render();resolveThumbs()}

  /* --- гГИгГГгГЧгГРгГЉ --- */
  const top=el('div','fb-top');

  const curFrame=()=>isVideo?Math.min(totalFrames-1,Math.max(0,Math.round(media.currentTime*FPS))):null;
  let scrubbing=false,scrubTarget=-1,seekBusy=false,seekPend=-1;
  const dispFrame=()=>scrubbing&&scrubTarget>=0?scrubTarget:(curFrame()||0);
  function fmtFrame(){frameLab.textContent='F '+dispFrame()+' / '+(totalFrames-1)}
  let seekGuard=0;
  function seekRT(f){
    f=Math.max(0,Math.min(f,totalFrames-1));
    const t=f/FPS+0.0001;
    if(Math.abs(media.currentTime-t)<0.0005){refreshView();return} // еРМдЄАжЩВеИїгБѓгВєгВ≠гГГгГЧпЉИseekedдЄНзЩЇгБІгВВи©∞гБЊгВЙгБ™гБДпЉЙ
    if(seekBusy){seekPend=f;return}
    seekBusy=true;
    clearTimeout(seekGuard);
    /* seeked гБМзЩЇзБЂгБЧгБ™гБДзТ∞еҐГ/гВ±гГЉгВєгБІгВВ 300ms гБІиЗ™еЛХеЊ©еЄ∞ */
    seekGuard=setTimeout(()=>{seekBusy=false;if(seekPend>=0){const p=seekPend;seekPend=-1;seekRT(p)}},300);
    if(scrubbing&&typeof media.fastSeek==='function'){try{media.fastSeek(t)}catch(_){media.currentTime=t}}
    else media.currentTime=t;
  }
  function seekFrame(f){if(!isVideo)return;media.pause();seekRT(f)}
  function setupDuration(){totalFrames=Math.max(1,Math.round((media.duration||0)*FPS));fmtFrame();drawTimeline()}
  /* 1FеҐГзХМгБЄгБЃгВєгГКгГГгГЧпЉЪеБЬж≠ҐгГїгВЈгГЉгВѓеЊМгБѓењЕгБЪгГХгГђгГЉгГ†гБігБ£гБЯгВКгБЃжЩВеИїгБЂеРИгВПгБЫгВЛ */
  function snapToFrame(){
    if(!isVideo||scrubbing||!media.paused)return;
    const f=Math.min(totalFrames-1,Math.max(0,Math.round(media.currentTime*FPS)));
    if(Math.abs(media.currentTime-(f/FPS+0.0001))>(0.02/FPS))seekRT(f);
  }
  if(isVideo){
    media.addEventListener('loadedmetadata',()=>{setupDuration();fit();sync(true)});
    media.addEventListener('seeked',()=>{clearTimeout(seekGuard);seekBusy=false;if(seekPend>=0){const p=seekPend;seekPend=-1;seekRT(p)}else snapToFrame()});
    playBtn.onclick=()=>{if(media.paused)media.play();else media.pause()};

    fpsSel.onchange=async()=>{FPS=parseInt(fpsSel.value);v.fps=FPS;await persist();setupDuration();sync(true)};
    /* гВњгВ§гГ†гГ©гВ§гГ≥гБІгБЃгВєгВѓгГ©гГЦпЉИжКЉдЄЛеН≥гВЈгГЉгВѓгГїгГЙгГ©гГГгВ∞ињљеЊУпЉЙ */
    const frameFromX=e=>{const r=tl.getBoundingClientRect();return Math.max(0,Math.min(totalFrames-1,Math.floor((e.clientX-r.left)/r.width*totalFrames)))};
    tl.onpointerdown=e=>{scrubbing=true;tl.setPointerCapture(e.pointerId);media.pause();scrubTarget=frameFromX(e);seekRT(scrubTarget);refreshView()};
    tl.onpointermove=e=>{if(!scrubbing)return;const f=frameFromX(e);if(f!==scrubTarget){scrubTarget=f;seekRT(f);refreshView()}};
    tl.onpointerup=()=>{const f=scrubTarget;scrubbing=false;scrubTarget=-1;if(f>=0)seekRT(f);refreshView()}; // йЫҐгБЧгБЯдљНзљЃгБЄз≤ЊеѓЖгВЈгГЉгВѓпЉИ1FгВєгГКгГГгГЧпЉЙ

  /* --- гВњгВ§гГ†гГ©гВ§гГ≥жППзФїпЉИгГХгГђгГЉгГ†зЫЃзЫЫгВКгГїгВ≥гГ°гГ≥гГИгГЮгГЉгВЂгГЉгГїгГЧгГђгВ§гГШгГГгГЙпЉЙ --- */
  function drawTimeline(){
    if(!isVideo||!tl.width)return;
    const W=tl.width,H=tl.height,ctx=tl.getContext('2d');
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#141416';ctx.fillRect(0,0,W,H);
    const fw=W/totalFrames;
    /* жѓОгГХгГђгГЉгГ†гБЃзЫЃзЫЫгВК */
    if(fw>=2.5){
      ctx.strokeStyle='rgba(255,255,255,.12)';ctx.beginPath();
      for(let f=0;f<totalFrames;f++){const x=Math.round(f*fw)+.5;ctx.moveTo(x,H-11);ctx.lineTo(x,H)}

    }
    /* зІТзЫЃзЫЫгВКпЉИFPSгБФгБ®пЉЙпЉЛгГХгГђгГЉгГ†зХ™еПЈ */
    let step=FPS;while(step*fw<46)step*=2;
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='9px monospace';ctx.beginPath();
    for(let f=0;f<totalFrames;f+=step){const x=Math.round(f*fw)+.5;ctx.moveTo(x,H-18);ctx.lineTo(x,H);ctx.fillText(String(f),x+3,H-20)}
    ctx.stroke();
    /* гГЮгГЉгВЂгГЉпЉЪгВҐгГОгГЖпЉЭдЄЛгГђгВ§гГ§гГЉпЉИгВ™гГђгГ≥гВЄгБЃгГРгГЉпЉЙгАБгВ≥гГ°гГ≥гГИпЉЭдЄКгГђгВ§гГ§гГЉпЉИиµ§гБЃиП±ељҐпЉЙ */
    for(const n of v.review.notes){
      if(n.frame==null||!(n.drawing&&n.drawing.length))continue;
      ctx.fillStyle='#e08a4a';ctx.fillRect(n.frame*fw,2,Math.max(3,fw*(parseInt(n.dur)||1)),7);
    }
    /* жЬ™йАБдњ°гБЃжППзФїгБЃгГЧгГђгГУгГ•гГЉгГЮгГЉгВЂгГЉпЉИеНКйАПжШОгВ™гГђгГ≥гВЄпЉЙ */
    const pdur=parseInt(durSel.value)||1;
    ctx.fillStyle='rgba(224,138,74,.5)';
    for(const p of pending)if(p.f!=null)ctx.fillRect(p.f*fw,2,Math.max(3,fw*pdur),7);
    /* гВ≥гГ°гГ≥гГИпЉЭиµ§гБЃиП±ељҐпЉИжЬАеЙНйЭҐгГђгВ§гГ§гГЉпЉЙ */
    for(const n of v.review.notes){
      if(n.frame==null||(n.drawing&&n.drawing.length))continue;
      const cx=n.frame*fw+fw/2;
      ctx.fillStyle='#ff5a5a';
      ctx.beginPath();ctx.moveTo(cx,2);ctx.lineTo(cx+5,7);ctx.lineTo(cx,12);ctx.lineTo(cx-5,7);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
    }
    /* гГЧгГђгВ§гГШгГГгГЙ */
    const f=dispFrame();const x=f*fw+fw/2;
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillRect(x-1,0,2,H);
    const lab='F'+f;ctx.font='10px monospace';const tw=ctx.measureText(lab).width+8;
    const bx=Math.min(W-tw,Math.max(0,x-tw/2));
    ctx.fillStyle='#e8e8ec';ctx.fillRect(bx,H-13,tw,13);
    ctx.fillStyle='#16161a';ctx.fillText(lab,bx+4,H-3);
  }
  function refreshView(){fmtFrame();drawAll();drawTimeline()}

  /* --- гВ≠гГ£гГ≥гГРгВєпЉИгГ°гГЗгВ£гВҐи°®з§ЇеЯЯгБЂгГХгВ£гГГгГИпЉЙ --- */
  function fit(){
    const r=wrap.getBoundingClientRect();
    const w=isVideo?media.videoWidth:media.naturalWidth;
    const h=isVideo?media.videoHeight:media.naturalHeight;
    if(!w||!h||!r.width)return;
    const s=Math.min(r.width/w,r.height/h);
    const cw=Math.max(1,Math.round(w*s)),ch=Math.max(1,Math.round(h*s));
    canvas.width=cw;canvas.height=ch;
    canvas.style.left=Math.round((r.width-cw)/2)+'px';
    canvas.style.top=Math.round((r.height-ch)/2)+'px';
    trace.style.left=canvas.style.left;trace.style.top=canvas.style.top;
    trace.style.width=cw+'px';trace.style.height=ch+'px';
    if(isVideo){const tw=tlWrap.clientWidth-24;if(tw>0){tl.width=tw;tl.height=46}}
    drawAll();drawTimeline();
  }
  window.addEventListener('resize',fit);
  new ResizeObserver(fit).observe(wrap);

  /* --- гВҐгГОгГЖгГЉгВЈгГІгГ≥жППзФїпЉИи°®з§ЇгГХгГђгГЉгГ†жХ∞гГїгВігГЉгВєгГИгГїгГђгВ§гГ§гГЉгГїгГИгГђгГЪеѓЊењЬпЉЙ --- */
  let ghostOn=false,annotVisible=true,traceOp=0,activeLayer=1;
  const layerVis=[true,true,true,true,true];
  const GHOST_RANGE=3;
  const durOf=n=>{const d=parseInt(n.dur);return isNaN(d)?1:d};
  const visibleAt=(n,f)=>!isVideo||(n.frame!=null&&f>=n.frame&&f<n.frame+durOf(n));
  const layerOn=s=>layerVis[((s.layer||1)-1)];
  /* гГђгВ§гГ§гГЉгГСгГНгГЂпЉЪжЧҐе≠ШгГЗгГЉгВњгБЃжЬАе§ІгГђгВ§гГ§гГЉгБЛгВЙеИЭжЬЯжЮЪжХ∞гВТж±ЇеЃЪ */
  let layerCount=1;
  for(const n of v.review.notes)for(const s of (n.drawing||[]))layerCount=Math.max(layerCount,s.layer||1);
  const lyrCards=[];
  function buildLayerPanel(){
    lyrList.innerHTML='';lyrCards.length=0;
    if(layerCount<5){
      const add=el('button','lyr-add','пЉЛ гГђгВ§гГ§гГЉгВТињљеК†');
      add.onclick=()=>{layerCount++;activeLayer=layerCount;buildLayerPanel();drawAll()};
      lyrList.appendChild(add);
    }
    /* дЄКгБМдЄКе±§гГїдЄАзХ™дЄЛгБМжЬАдЄЛе±§пЉИL1пЉЙгБЂгБ™гВЛгВИгБЖйЩНй†ЖгБІдЄ¶гБєгВЛ */
    for(let i=layerCount;i>=1;i--){
      const card=el('div','lyr-card');
      const h=el('div','lyr-head');
      h.appendChild(el('span','nm','L'+i));
      const eye=el('span','lyr-eye','рЯСБ');eye.title='гБУгБЃгГђгВ§гГ§гГЉгБЃи°®з§Ї/йЭЮи°®з§Ї';
      eye.onclick=ev=>{ev.stopPropagation();layerVis[i-1]=!layerVis[i-1];drawAll()};
      h.appendChild(eye);card.appendChild(h);
      const cv=el('canvas','lyr-prev');cv.width=134;cv.height=75;card.appendChild(cv);
      card.onclick=()=>{activeLayer=i;drawAll()};
      lyrList.appendChild(card);lyrCards.push({card,cv,eye,i});
    }
    updateLayerPanel();
  }
  function updateLayerPanel(){
    const f=dispFrame?dispFrame():null;
    const pdur=parseInt(durSel.value)||1;
    const inWin=p=>!isVideo||(p.f!=null&&f>=p.f&&f<p.f+pdur);
    for(const {card,cv,eye,i} of lyrCards){
      card.classList.toggle('act',activeLayer===i);
      card.classList.toggle('off',!layerVis[i-1]);
      eye.textContent=layerVis[i-1]?'рЯСБ':'вАФ';
      const c=cv.getContext('2d');c.fillStyle='#101013';c.fillRect(0,0,cv.width,cv.height);
      const list=[];
      for(const n of v.review.notes)if(n.drawing&&n.drawing.length&&visibleAt(n,f))for(const s of n.drawing)if((s.layer||1)===i)list.push(s);
      for(const p of pending)if(inWin(p)&&(p.layer||1)===i)list.push(p);
      if(stroke&&inWin(stroke)&&(stroke.layer||1)===i)list.push(stroke);
      paintStrokeList(c,cv.width,cv.height,list,1);
    }
  }
  eyeBtn.onclick=()=>{annotVisible=!annotVisible;eyeBtn.classList.toggle('active',annotVisible);eyeBtn.textContent=annotVisible?'рЯСБ':'вАФ';drawAll()};
  traceBtn.onclick=()=>{traceOp=(traceOp+25)%125;trace.style.opacity=traceOp/100;traceBtn.textContent='гГИгГђгГЪ '+traceOp+'%'};
  function paintStrokes(ctx,list,alpha){paintStrokeList(ctx,canvas.width,canvas.height,list,alpha)}
  function drawAll(){
    const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
    const f=dispFrame();
    if(annotVisible){
      /* гВігГЉгВєгГИпЉЪеЙНеЊМгГХгГђгГЉгГ†гБЃгВҐгГОгГЖгГЉгВЈгГІгГ≥гВТиЦДгБПи°®з§Ї */
      if(ghostOn&&isVideo){
        for(const n of v.review.notes){
          if(!n.drawing||!n.drawing.length||n.frame==null)continue;
          if(visibleAt(n,f))continue;
          const d=Math.min(Math.abs(n.frame-f),Math.abs(n.frame+durOf(n)-1-f));
          if(d<=GHOST_RANGE)paintStrokes(ctx,n.drawing.filter(layerOn),0.3-d*0.07);
        }
      }
      /* зПЊеЬ®гГХгГђгГЉгГ†гБЃгВҐгГОгГЖгГЉгВЈгГІгГ≥ */
      for(const n of v.review.notes)if(n.drawing&&n.drawing.length&&visibleAt(n,f))paintStrokes(ctx,n.drawing.filter(layerOn),1);
    }
    /* жЬ™йАБдњ°гБЃжППзФїпЉИжППгБДгБЯгГХгГђгГЉгГ†гБЛгВЙгАБйБЄжКЮдЄ≠гБЃи°®з§ЇFжХ∞гБЃгБВгБДгБ†и°®з§ЇпЉЙ */
    const pdur=parseInt(durSel.value)||1;
    const inWin=p=>!isVideo||(p.f!=null&&f>=p.f&&f<p.f+pdur);
    const pend=pending.filter(p=>inWin(p)&&layerOn(p));
    if(stroke&&inWin(stroke)&&layerOn(stroke))pend.push(stroke);
    paintStrokes(ctx,pend,1);
    updateLayerPanel();
  }
  durSel.onchange=()=>{drawAll();drawTimeline()};
  ghostBtn.onclick=()=>{ghostOn=!ghostOn;ghostBtn.classList.toggle('active',ghostOn);drawAll()};
  const pt=e=>{const r=canvas.getBoundingClientRect();return[(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height]};
  /* гГДгГЉгГЂеИЗжЫњпЉИжППзФї / жґИгБЧгВігГ†пЉЙ */
  function setTool(t){
    tool=t;
    drawBtn.classList.toggle('active',tool==='draw');
    eraserBtn.classList.toggle('active',tool==='erase');
    canvas.style.pointerEvents=tool?'auto':'none';
    if(tool){Zm.hand=false;handBtn.classList.remove('active');wrap.style.cursor='';if(isVideo)media.pause()}
  }
  drawBtn.onclick=()=>setTool(tool==='draw'?null:'draw');
  eraserBtn.onclick=()=>setTool(tool==='erase'?null:'erase');
  /* жґИгБЧгВігГ†пЉЪгГЦгГ©гВЈгБЃгВИгБЖгБЂгБ™гБЮгБ£гБЯйГ®еИЖгБ†гБСжґИгБЩпЉИйБЄжКЮдЄ≠гГђгВ§гГ§гГЉгБЃгБњгГїзЈЪгБѓеИЖеЙ≤пЉЙ */
  function eraseAt(e){
    const [x,y]=pt(e);
    const r=eraseW/2/canvas.width;
    const f=dispFrame();const pdur=parseInt(durSel.value)||1;
    const inWin=p=>!isVideo||(p.f!=null&&f>=p.f&&f<p.f+pdur);
    const cand=[],rest=[];
    for(const p of pending)(inWin(p)?cand:rest).push(p);
    const res=eraseFromList(cand,x,y,r,canvas.height/canvas.width,activeLayer);
    if(res){pending=rest.concat(res);drawAll();drawTimeline()}
  }
  canvas.onpointerdown=e=>{
    if(e.button!==0)return; // дЄ≠/еП≥гГЬгВњгГ≥гБѓгГСгГ≥з≠ЙгБЂи≠≤гВЛ
    if(tool==='draw'){canvas.setPointerCapture(e.pointerId);stroke={color:colorIn.value,points:[pt(e)],f:dispFrame(),layer:activeLayer,w:brushW/canvas.width}}
    else if(tool==='erase'){canvas.setPointerCapture(e.pointerId);erasing=true;eraseAt(e)}
  };
  canvas.onpointermove=e=>{if(stroke){stroke.points.push(pt(e));drawAll()}else if(erasing)eraseAt(e)};
  canvas.onpointerup=()=>{if(stroke){pending.push(stroke);stroke=null;drawAll();drawTimeline()}erasing=false};
  /* Alt+еП≥гГЙгГ©гГГгВ∞гБІгГЦгГ©гВЈ/жґИгБЧгВігГ†гВµгВ§гВЇи™њжХіпЉИгВµгВ§гВЇгГЧгГђгГУгГ•гГЉеЖЖдїШгБНпЉЙ */
  brushSel.onchange=()=>{brushW=parseInt(brushSel.value)||brushW};
  eraseSel.onchange=()=>{eraseW=parseInt(eraseSel.value)||eraseW};
  const sizeRing=el('div','size-ring');wrap.appendChild(sizeRing);
  let szAdj=null;
  function setSizeSel(sel,val,prefix){let o=[...sel.options].find(x=>x.dataset.live);if(!o){o=new Option('','');o.dataset.live='1';sel.appendChild(o)}const rv=Math.round(val);o.value=String(rv);o.textContent=prefix+rv+'px';sel.value=o.value}
  function fbShowRing(){const sz=(szAdj.tool==='erase'?eraseW:brushW)*Zm.s;sizeRing.style.display='block';sizeRing.style.left=szAdj.rl+'px';sizeRing.style.top=szAdj.rt+'px';sizeRing.style.width=sz+'px';sizeRing.style.height=sz+'px'}
  canvas.addEventListener('contextmenu',e=>{if(e.altKey)e.preventDefault()});
  canvas.addEventListener('pointerdown',e=>{if(e.button!==2||!e.altKey||!tool)return;e.preventDefault();canvas.setPointerCapture(e.pointerId);const r=wrap.getBoundingClientRect();szAdj={x:e.clientX,rl:e.clientX-r.left,rt:e.clientY-r.top,start:tool==='erase'?eraseW:brushW,tool};fbShowRing()});
  canvas.addEventListener('pointermove',e=>{if(!szAdj)return;const ns=Math.max(1,Math.min(200,szAdj.start+(e.clientX-szAdj.x)*0.4));if(szAdj.tool==='erase'){eraseW=ns;setSizeSel(eraseSel,ns,'жґИгБЧ ')}else{brushW=ns;setSizeSel(brushSel,ns,'гГЦгГ©гВЈ ')}fbShowRing()});
  canvas.addEventListener('pointerup',()=>{if(szAdj){szAdj=null;sizeRing.style.display='none'}});
  undoBtn.onclick=()=>{pending.pop();drawAll();drawTimeline()};
  clearBtn.onclick=()=>{pending=[];stroke=null;drawAll();drawTimeline()};
  buildLayerPanel();

  /* --- еЖНзФЯеРМжЬЯпЉИгГХгГђгГЉгГ†и°®з§ЇгГїгБЭгБЃгГХгГђгГЉгГ†гБЃжППзФїгГїгВњгВ§гГ†гГ©гВ§гГ≥пЉЙ --- */
  function sync(force){
    if(!document.getElementById('fbOverlay'))return;
    if(isVideo){
      const f=dispFrame();
      if(f!==lastFrame||force){lastFrame=f;refreshView()}
      requestAnimationFrame(()=>sync(false));
    }else drawAll();
  }
  if(isVideo)requestAnimationFrame(()=>sync(true));

  /* --- гВ≥гГ°гГ≥гГИ --- */
  function renderNotes(){
    list.innerHTML='';
    if(!v.review.notes.length)list.appendChild(el('div','log-empty-note','гВ≥гГ°гГ≥гГИгБѓгБЊгБ†гБВгВКгБЊгБЫгВУгАВ'));
    const refresh=async()=>{await persist();renderNotes();drawAll();drawTimeline()};
    for(const n of v.review.notes)list.appendChild(noteBlock(v,n,{refresh,onSeek:isVideo?seekFrame:null}));
    list.scrollTop=list.scrollHeight;
  }
  renderNotes();
  const send=async()=>{
    const txt=ta.value.trim();
    if(!txt&&!pending.length)return;
    const n={author:currentUser(),text:txt||'пЉИжППзФїгБЃгБњпЉЙ',time:nowIso()};
    if(isVideo)n.frame=dispFrame();
    if(pending.length){
      /* жППзФїгБѓгАМжППгБДгБЯгГХгГђгГЉгГ†гАНгБЂзіРгБ•гБСгВЛ */
      if(isVideo&&pending[0].f!=null)n.frame=pending[0].f;
      n.drawing=pending.map(p=>({color:p.color,points:p.points,layer:p.layer||1,w:p.w}));
      n.dur=parseInt(durSel.value)||1;
    }
    v.review.notes.push(n);pending=[];stroke=null;
    await persist();ta.value='';renderNotes();drawAll();drawTimeline();
  };
  sb.onclick=send;
  ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};

  /* --- гВ≠гГЉгГЬгГЉгГЙ --- */
  function onKey(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    if(e.key==='Escape')close();
    else if(isVideo&&e.key==='ArrowLeft'){e.preventDefault();seekFrame(dispFrame()-1)}
    else if(isVideo&&e.key==='ArrowRight'){e.preventDefault();seekFrame(dispFrame()+1)}
    else if(isVideo&&e.key===' '){e.preventDefault();playBtn.onclick()}
  }
  document.addEventListener('keydown',onKey);

  /* --- гГ°гГЗгВ£гВҐи™≠гБњиЊЉгБњ --- */
  (async()=>{const url=await storage.getURL(v.file);if(url)media.src=url;setTimeout(fit,60)})();
}

   еЕ®гВЈгГІгГГгГИгБЃжЬАжЦ∞еЛХзФїгВТгВњгВ§гГЂи°®з§ЇгАВйБЄжКЮгБІгГУгГ•гГЉгВҐгГЉгБЂе§ІгБНгБПи°®з§ЇгАВ

function slBuild(){
  if(!slWin||slWin.closed)return;

  if(!revs.length){grid.appendChild(ce2('div','empty','еЛХзФїгБЃгБВгВЛгВЈгГІгГГгГИгБМгБВгВКгБЊгБЫгВУ'));return}
  for(const n of revs){
    const v=[...n.versions].reverse().find(x=>x.type==='video');
    const tile=ce2('div','tile');
    const th=ce2('div','th');th.appendChild(icoEl('film',th.ownerDocument));

/* ============================================================
   йА≤жНЧзЃ°зРЖпЉИеИ•гВ¶гВ£гГ≥гГЙгВ¶пЉЙ

   еЈ•з®ЛпЉИгВєгГЖгГЉгВњгВєпЉЙгАВеЈ•з®ЛгБФгБ®гБЃжЬАжЦ∞еЛХзФїпЉИгВҐгГГгГЧгГ≠гГЉгГЙжЩВеИїпЉЙгВТжѓФиЉГгБЧгАБ
   жЬАгВВжЦ∞гБЧгБДеЛХзФїгБМгБВгВЛеЈ•з®ЛгБМгБЭгБЃгВЈгГІгГГгГИгБЃзПЊеЬ®гБЃйА≤жНЧгБЂгБ™гВЛгАВ

let pgWin=null;const pgUI={};
/* еЈ•з®ЛгБЃи°®з§Їй†ЖпЉИPipeline _stage_rank жЇЦжЛ†пЉЙ: layз≥ївЖТanmз≥ївЖТгБЭгБЃдїЦгАБеРМй†ЖдљНгБѓеРНеЙНй†Ж */
function stageRank(name){const low=(name||'').toLowerCase();let r;if(low.startsWith('lay')||low.startsWith('layout'))r=0;else if(low.startsWith('anm')||low.startsWith('anim'))r=1;else r=2;return [r,low];}
function stageRankCmp(a,b){const ra=stageRank(a),rb=stageRank(b);return ra[0]-rb[0]||(ra[1]<rb[1]?-1:ra[1]>rb[1]?1:0);}
/* еЈ•з®ЛгВЂгГ©гГЉпЉИPipeline stage_color жЇЦжЛ†пЉЪеЫЇеЃЪгГЮгГГгГЧпЉЛжЦЗе≠ЧгВ≥гГЉгГЙгГПгГГгВЈгГ•пЉЙ */
const STAGE_COLOR_MAP={lay_pri:'#4a90d9',lay_anm:'#5fb878',anm_pri:'#e8a838',anm_sec:'#d9734a'};
const STAGE_PALETTE=['#4a90d9','#5fb878','#e8a838','#d9734a','#9b6dd6','#46c4b8','#d96d9e','#c5c043'];
function stageColor(stage){if(!stage)return '#5a5a6a';const key=stage.toLowerCase().split('/').pop();if(STAGE_COLOR_MAP[key])return STAGE_COLOR_MAP[key];let h=0;for(const c of stage.toLowerCase())h+=c.charCodeAt(0);return STAGE_PALETTE[h%STAGE_PALETTE.length];}
/* гГОгГЉгГЙйЕНдЄЛпЉИиЗ™иЇЂпЉЛе≠Ре≠ЂпЉЙгБЂгБВгВЛжЬАжЦ∞еЛХзФїгБЃгВҐгГГгГЧгГ≠гГЉгГЙжЩВеИїпЉИISOжЦЗе≠ЧеИЧ/гБ™гБСгВМгБ∞nullпЉЙ */
function latestVideoTimeUnder(nodeId){let best=null;const ns=[getNode(nodeId),...descendants(nodeId)];for(const n of ns)if(n)for(const v of (n.versions||[]))if(v.type==='video'){const t=v.uploadedAt||'';if(best===null||t>best)best=t}return best;}
/* гВЈгГІгГГгГИгБЃеЈ•з®ЛдЄАи¶ІпЉИзЫідЄЛгГХгВ©гГЂгГАпЉЭеЈ•з®ЛпЉЙгАВtime гБѓеРДеЈ•з®ЛйЕНдЄЛгБЃжЬАжЦ∞еЛХзФїжЩВеИї */
function shotStages(shot){return childrenOf(shot.id).map(st=>({name:st.name,node:st,time:latestVideoTimeUnder(st.id)}));}
/* гВЈгГІгГГгГИгБЃзПЊеЬ®еЈ•з®Л = жЬАгВВжЦ∞гБЧгБДеЛХзФїгБМдЄКгБМгБ£гБ¶гБДгВЛеЈ•з®ЛпЉИPipeline _shot_latest гБЃ media еИЖе≤РзЫЄељУпЉЙ */
function shotCurrentStage(shot){const withVid=shotStages(shot).filter(s=>s.time);if(!withVid.length)return null;withVid.sort((a,b)=>a.time<b.time?-1:a.time>b.time?1:0);return withVid[withVid.length-1].name;}
/* гАМгВЈгГІгГГгГИи¶™гАНеАЩи£Ь = е≠ЂгВТжМБгБ§гГОгГЉгГЙпЉИпЉЭзЫідЄЛгБМгВЈгГІгГГгГИгАБгБЭгБЃдЄЛгБМеЈ•з®ЛпЉЙгАВзД°гБСгВМгБ∞гГЂгГЉгГИ */
function shotParentCandidates(){const c=DB.nodes.filter(n=>childrenOf(n.id).some(ch=>childrenOf(ch.id).length>0));return c.length?c:DB.nodes.filter(n=>!n.parentId);}
/* гГОгГЉгГЙйЕНдЄЛгБЃжЬАжЦ∞еЛХзФїгГРгГЉгВЄгГІгГ≥пЉИ{v,node,t}пЉПгБ™гБСгВМгБ∞nullпЉЙ */
function latestVideoVersionUnder(nodeId){let best=null;for(const n of [getNode(nodeId),...descendants(nodeId)])if(n)for(const v of (n.versions||[]))if(v.type==='video'){const t=v.uploadedAt||'';if(!best||t>best.t)best={v,node:n,t}}return best;}
/* tab: 'stage'пЉИеЈ•з®ЛеИ•пЉЙ| 'status'пЉИгВєгГЖгГЉгВњгВєеИ•пЉЙгАВеРДгВЈгГІгГГгГИгБЂ keyпЉИеИЖй°ЮпЉЙгВТдїШдЄО */
function progressData(parentId,tab){
  const parent=getNode(parentId);
  const shots=childrenOf(parentId);
  const statuses=projStatuses(parent||shots[0]||{});
  const perShot=shots.map(shot=>{
    const stages=childrenOf(shot.id).map(st=>({node:st,time:latestVideoTimeUnder(st.id)}));
    const withVid=stages.filter(s=>s.time).sort((a,b)=>a.time<b.time?-1:a.time>b.time?1:0);
    const curNode=withVid.length?withVid[withVid.length-1].node:null;
    return {shot,stageName:curNode?curNode.name:null,curNode,
            statusId:curNode?nodeStatus(curNode):'empty',
            latest:latestVideoVersionUnder(shot.id),stageCount:childrenOf(shot.id).length};
  });
  let rows;
  if(tab==='status'){
    const buckets=statuses.map(s=>({id:s.id,label:s.label,color:s.color,count:0}));
    const byId=Object.fromEntries(buckets.map(b=>[b.id,b]));
    const emptyB={id:'empty',label:'жЬ™зЭАжЙЛ',color:'#5a5a6a',count:0};
    for(const ps of perShot){const id=(byId[ps.statusId]?ps.statusId:'empty');ps.key=id;(id==='empty'?emptyB:byId[id]).count++}
    rows=buckets.concat(emptyB.count?[emptyB]:[]);
  }else{
    const stageNames=[...new Set(shots.flatMap(s=>childrenOf(s.id).map(c=>c.name)))].sort(stageRankCmp);
    const counts={};for(const ps of perShot){ps.key=ps.stageName||'__none__';counts[ps.key]=(counts[ps.key]||0)+1}
    rows=stageNames.map(nm=>({id:nm,label:nm,color:stageColor(nm),count:counts[nm]||0}));
    if(counts['__none__'])rows.push({id:'__none__',label:'жЬ™зЭАжЙЛ',color:'#5a5a6a',count:counts['__none__']});
  }
  return {parent,total:shots.length,rows,perShot,tab};
}
function drawDonut(cv,rows,total,onPick){
  const c=cv.getContext('2d');const W=cv.width,H=cv.height;c.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,rO=Math.min(W,H)/2-6,rI=rO*0.6,START=-Math.PI/2;
  const segs=[];
  if(!total){c.strokeStyle='#2a2a2f';c.lineWidth=rO-rI;c.beginPath();c.arc(cx,cy,(rO+rI)/2,0,Math.PI*2);c.stroke();cv.onclick=null;cv.style.cursor='default';return}
  let a=START;
  for(const r of rows){
    if(!r.count)continue;
    const frac=r.count/total;const a2=a+frac*Math.PI*2;
    c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,rO,a,a2);c.closePath();c.fillStyle=r.color;c.fill();
    segs.push({row:r,a1:a,a2});a=a2;
  }
  /* дЄ≠е§ЃгБПгВКжКЬгБН */
  c.beginPath();c.arc(cx,cy,rI,0,Math.PI*2);c.fillStyle='#141416';c.fill();
  c.fillStyle='#e8e8ec';c.textAlign='center';c.font='700 26px system-ui,sans-serif';
  c.fillText(String(total),cx,cy-2);
  if(onPick){
    cv.style.cursor='pointer';
    cv.onclick=e=>{const r=cv.getBoundingClientRect();const x=e.clientX-r.left-cx,y=e.clientY-r.top-cy;const dist=Math.hypot(x,y);if(dist<rI||dist>rO)return;let ca=Math.atan2(y,x);while(ca<START)ca+=Math.PI*2;while(ca>=START+Math.PI*2)ca-=Math.PI*2;for(const s of segs)if(ca>=s.a1&&ca<s.a2){onPick(s.row);return}};
  }else{cv.onclick=null;cv.style.cursor='default'}
  c.fillStyle='#8a8a9a';c.font='11px system-ui,sans-serif';c.fillText('гВЈгГІгГГгГИ',cx,cy+16);
}

  fpsS.onchange=async()=>{RV.FPS=parseInt(fpsS.value)||24;const dt=rvData();if(dt){dt.v.fps=RV.FPS;await persist()}RV.total=Math.max(1,Math.round((video.duration||0)*RV.FPS));RV.last=-1;drawFTL()};
  durS.onchange=()=>{drawAnno();drawFTL()};

  clrB.onclick=()=>{RV.pending.splice(0,RV.pending.length);RV.stroke=null;drawAnno();drawFTL()};
  /* гВ≥гГ°гГ≥гГИйАБдњ°пЉИFBгБ®еРМгБШгАВеРДгГђгГУгГ•гГЉгГЪгГЉгВЄгБЄеН≥еПНжШ†пЉЙ */
  const reelSend=async()=>{
    const dt=rvData();if(!dt)return;
    const txt=cta.value.trim();
    if(!txt&&!RV.pending.length)return;
    const n={author:currentUser(),text:txt||'пЉИжППзФїгБЃгБњпЉЙ',time:nowIso(),frame:RV.pending.length?RV.pending[0].f:dispF()};
    if(RV.pending.length){n.drawing=RV.pending.map(p=>({color:p.color,points:p.points,layer:p.layer||1,w:p.w}));n.dur=parseInt(durS.value)||1}
    dt.v.review.notes.push(n);RV.pending.splice(0,RV.pending.length);RV.stroke=null;cta.value='';
    await persist();drawAnno();drawFTL();reelNotes();
    /* гГ°гВ§гГ≥гВ¶гВ£гГ≥гГЙгВ¶гБЃгГђгГУгГ•гГЉгГЪгГЉгВЄгБЄеПНжШ† */
    try{render();resolveThumbs()}catch(_){}
  };
  csend.onclick=reelSend;
  cta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();reelSend()}};

  /* гВњгВ§гГ†гГ©гВ§гГ≥ */
  const tlwrap=ce(d,'div','tlwrap');
  const ruler=ce(d,'canvas','ruler');const track=ce(d,'div','track');
  const ph=ce(d,'div','ph');track.appendChild(ph);
  tlwrap.appendChild(ruler);tlwrap.appendChild(track);
  maincol.appendChild(tlwrap);
  Object.assign(reelUI,{d,video,empty,track,ruler,ph,play,time,totalLab,loopBtn,clearBtn,cur:0});
  /* еЖНзФЯгГ≠гВЄгГГгВѓ */
  const cs=()=>reelUI.clips;
  const sumPrev=i=>cs().slice(0,i).reduce((a,c)=>a+(c.dur||0),0);
  const total=()=>cs().reduce((a,c)=>a+(c.dur||0),0);
  function loadCur(auto){
    const c=cs()[reelUI.cur];
    /* гВѓгГ™гГГгГЧеИЗжЫњпЉЪжЬ™йАБдњ°гВҐгГОгГЖгБѓгВѓгГ™гГГгГЧгБФгБ®гБЂдњЭжМБпЉИиЈ®гБДгБІгВВжґИгБИгБ™гБДпЉЙ */
    RV.pending=(c&&(c.pending||(c.pending=[])))||[];
    RV.stroke=null;RV.last=-1;RV.layerCount=1;
    const dt=rvData();RV.FPS=dt?(dt.v.fps||24):24;fpsS.value=String(RV.FPS);
    buildLayerPanel();reelNotes();
    if(!c){video.removeAttribute('src');video.load();reelRender();return}
    video.src=c.url;if(auto)video.play().catch(()=>{});
    reelRender();
  }
  reelUI.loadCur=loadCur;
  play.onclick=()=>{if(!cs().length)return;if(video.paused){if(!video.src)loadCur(false);video.play().catch(()=>{})}else video.pause()};
  prev.onclick=()=>{if(!cs().length)return;reelUI.cur=Math.max(0,reelUI.cur-1);loadCur(true)};
  next.onclick=()=>{if(!cs().length)return;reelUI.cur=Math.min(cs().length-1,reelUI.cur+1);loadCur(true)};
  loopBtn.onclick=()=>{reelUI.loop=!reelUI.loop;loopBtn.classList.toggle('on',reelUI.loop)};
  clearBtn.onclick=()=>{if(!reelWin.confirm('гБЩгБєгБ¶гБЃгВѓгГ™гГГгГЧгВТе§ЦгБЧгБЊгБЩгБЛпЉЯ'))return;reelUI.clips=[];reelUI.cur=0;video.pause();video.removeAttribute('src');video.load();reelRender()};
  video.addEventListener('play',()=>{play.textContent='вПЄ еБЬж≠Ґ'});
  video.addEventListener('pause',()=>{play.textContent='вЦґ еЖНзФЯ'});
  video.addEventListener('ended',()=>{
    if(reelUI.cur<cs().length-1){reelUI.cur++;loadCur(true)}
    else if(reelUI.loop&&cs().length){reelUI.cur=0;loadCur(true)}
  });
  /* гГЧгГђгВ§гГШгГГгГЙжЫіжЦ∞ */
  (function tick(){
    if(!reelAlive())return;
    const elp=sumPrev(reelUI.cur)+(video.currentTime||0);
    ph.style.left=(elp*reelUI.pxs)+'px';
    time.textContent=fmtSec(elp)+' / '+fmtSec(total());
    const f=dispF();
    if(f!==RV.last){
      RV.last=f;
      /* еЛХзФїгБФгБ®гБЃгГХгГђгГЉгГ†пЉЛеЕ®дљУгГХгГђгГЉгГ†гБЃдЄ°жЦєгВТи°®з§Ї */
      fLab.textContent='F '+f+'/'+(RV.total-1)+'гААеЕ®дљУ '+(gOffset(reelUI.cur)+f)+'/'+(gTotal()-1);
      drawAnno();drawFTL();
    }
    reelUI.raf=reelWin.requestAnimationFrame(tick);
  })();
  /* гВЈгГІгГГгГИгГ™гВєгГИпЉИгГ°гВ§гГ≥гБЃгГДгГ™гГЉгБЛгВЙгГђгГУгГ•гГЉгВТйБЄгВУгБІињљеК†пЉЙ */
  function pathStr(id){const p=pathOf(id);return p.slice(0,-1).map(n=>n.name).join(' / ')||'пЉИгГИгГГгГЧпЉЙ'}
  function buildShotList(){
    rlist.innerHTML='';
    const revs=DB.nodes.filter(n=>n.type==='review'&&n.versions.some(x=>x.type==='video'));
    if(!revs.length){rlist.appendChild(ce(d,'div','pth','еЛХзФїгБЃгБВгВЛгГђгГУгГ•гГЉгГЪгГЉгВЄгБМгБВгВКгБЊгБЫгВУ'));return}
    for(const n of revs){
      const vids=n.versions.filter(x=>x.type==='video');
      const latest=vids[vids.length-1];
      const card=ce(d,'div','snode');
      const th=ce(d,'div','th');th.appendChild(icoEl('film',d));th.title='жЬАжЦ∞гБЃеЛХзФїгВТињљеК†';
      if(latest.thumb)storage.getURL(latest.thumb).then(u=>{if(u){th.textContent='';th.style.backgroundImage='url("'+u+'")'}});
      th.onclick=async()=>{await reelAddClip(getNode(n.id),latest)};

      const r2=ce(d,'div','nm2');

      r2.appendChild(tg);
      const sp=ce(d,'span','sp2');sp.appendChild(icoEl('film',d));sp.appendChild(d.createTextNode(' '+n.name));r2.appendChild(sp);
      r2.appendChild(ce(d,'span','pth',latest.name));
      bd.appendChild(r2);
      card.appendChild(bd);
      /* гВЈгГІгГГгГИгБЃдЄ≠гБЃеЛХзФїпЉИеЕ®гГРгГЉгВЄгГІгГ≥пЉЙгВТиЊњгБ£гБ¶еАЛеИ•гБЂињљеК†гБІгБНгВЛ */
      const vl=ce(d,'div','vl');vl.style.display='none';
      for(const vv of vids){

        row.appendChild(ce(d,'span','pth','вЦґ '+vv.name));
        row.appendChild(ce(d,'span','sp2'));
        const ab=ce(d,'button','addb','пЉЛ');
        ab.onclick=async ev=>{ev.stopPropagation();await reelAddClip(getNode(n.id),vv)};
        row.appendChild(ab);
        vl.appendChild(row);
      }
      card.appendChild(vl);
      tg.onclick=ev=>{ev.stopPropagation();const on=vl.style.display==='none';vl.style.display=on?'flex':'none';tg.textContent=on?'вЦЊ':'вЦЄ'};

  }
  rref.onclick=buildShotList;
  buildShotList();
  reelUI.drawFTL=drawFTL;
  buildLayerPanel();reelNotes();
  reelRender();
}

function reelRender(){
  if(!reelAlive())return;
  const {d,track,ruler,ph,empty,totalLab}=reelUI;const cs=reelUI.clips;
  empty.style.display=cs.length?'none':'';
  /* гВѓгГ™гГГгГЧгГЦгГ≠гГГгВѓпЉИеєЕ=е∞ЇгБЂжѓФдЊЛпЉЙ */
  [...track.querySelectorAll('.clip')].forEach(n=>n.remove());
  cs.forEach((c,i)=>{
    const b=ce(d,'div','clip'+(i===reelUI.cur?' cur':''));
    b.style.width=Math.max(78,(c.dur||2)*reelUI.pxs)+'px';
    b.appendChild(ce(d,'div','nm',(i+1)+'. '+c.name));
    b.appendChild(ce(d,'div','du',fmtSec(c.dur)));
    const ops=ce(d,'div','ops');
    const mk=(lab,fn,tt)=>{const x=ce(d,'button',null,lab);x.title=tt;x.onclick=e=>{e.stopPropagation();fn()};ops.appendChild(x)};
    mk('вЧА',()=>{if(i>0){[cs[i-1],cs[i]]=[cs[i],cs[i-1]];if(reelUI.cur===i)reelUI.cur--;else if(reelUI.cur===i-1)reelUI.cur++;reelRender()}},'еЈ¶гБЄ');
    mk('вЦґ',()=>{if(i<cs.length-1){[cs[i+1],cs[i]]=[cs[i],cs[i+1]];if(reelUI.cur===i)reelUI.cur++;else if(reelUI.cur===i+1)reelUI.cur--;reelRender()}},'еП≥гБЄ');
    mk('вЬХ',()=>{cs.splice(i,1);if(reelUI.cur>=cs.length)reelUI.cur=Math.max(0,cs.length-1);reelUI.loadCur(false);reelRender()},'е§ЦгБЩ');
    b.appendChild(ops);
    b.onclick=()=>{reelUI.cur=i;reelUI.loadCur(true)};
    track.appendChild(b);
  });
  /* гГЂгГЉгГ©гГЉпЉИзІТзЫЃзЫЫгВКпЉЙ */
  const total=cs.reduce((a,c)=>a+(c.dur||0),0);
  const W=Math.max(track.clientWidth,total*reelUI.pxs+40);
  ruler.width=W;ruler.height=18;
  const ctx=ruler.getContext('2d');ctx.clearRect(0,0,W,18);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='9px monospace';ctx.beginPath();
  for(let s=0;s<=Math.ceil(total)+1;s++){const x=s*reelUI.pxs+.5;ctx.moveTo(x,10);ctx.lineTo(x,18);if(s%5===0)ctx.fillText(fmtSec(s),x+2,8)}
  ctx.stroke();
  totalLab.textContent='и®И '+fmtSec(total)+'гГї'+cs.length+'гВѓгГ™гГГгГЧ';
  if(reelUI.drawFTL)reelUI.drawFTL();
}

async function reelAddClip(node,v){
  if(!reelAlive())return;
  if(v.type!=='video')return;
  const url=await storage.getURL(v.file);if(!url)return;
  const clip={name:node.name+' '+v.name,url,dur:0,nodeId:node.id,vId:v.id};
  reelUI.clips.push(clip);
  if(reelUI.clips.length===1&&reelUI.loadCur)reelUI.loadCur(false); // жЬАеИЭгБЃгВѓгГ™гГГгГЧгБѓеН≥гГ≠гГЉгГЙ
  /* е∞ЇгБЃеПЦеЊЧпЉИеЕ®дљУгГХгГђгГЉгГ†и®ИзЃЧгБЂгВВдљњзФ®пЉЙ */
  const probe=reelUI.d.createElement('video');probe.preload='metadata';probe.src=url;
  probe.onloadedmetadata=()=>{clip.dur=probe.duration||0;reelRender()};
  reelRender();
}

let accessCfg=null,AUTH_ON=false;
function roleFor(email){
  if(!accessCfg||!email)return null;const e=email.toLowerCase();
  const has=arr=>(arr||[]).some(x=>String(x).toLowerCase()===e);
  if(has(accessCfg.operatorEmails))return 'operator';
  if(has(accessCfg.adminEmails))return 'admin';
  if(has(accessCfg.allowedEmails))return 'member';
  const dom=e.split('@')[1]||'';
  if((accessCfg.allowedDomains||[]).some(d=>String(d).toLowerCase().replace(/^@/,'')===dom))return 'member';
  return null;
}
