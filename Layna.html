<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layna</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#7c6fff;--accent2:#5a4fff;
  --red:#ff5a5a;--green:#5affa0;--amber:#ffb85a;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  --cols:4;
}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{order:-1;display:inline-flex;flex-direction:column;align-items:flex-start;flex-shrink:0;line-height:1}
.logo .name{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:.5px}
.logo .name b{color:var(--accent)}
.logo .ver{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-top:2px}
.home-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:18px;background:var(--bg4);border:1px solid transparent;border-radius:var(--radius2);transition:all .15s}
.home-btn:hover{background:rgba(124,111,255,.15);border-color:var(--accent)}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.folder-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer}
.folder-status:hover{border-color:var(--border2)}
.folder-status .dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.folder-status.connected .dot{background:var(--green)}
.user-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.user-field input{width:100px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:12px}
.size-btns{display:flex;gap:2px}
.size-btn{width:30px;height:30px;border-radius:var(--radius2);border:1px solid var(--border);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center}
.size-btn.active{color:var(--green);border-color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,90,90,.12)}
.btn-icon{width:32px;height:32px;border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text2)}
.btn-icon:hover{background:var(--bg4);color:var(--text)}
.btn-sm{padding:4px 9px;font-size:12px}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:14px 10px}
.sidebar-section{margin-bottom:22px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius2);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:var(--bg4);color:var(--text)}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-item .ni-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:10px;padding:1px 6px;color:var(--text3)}
.nav-item .ni-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.main-head{display:flex;align-items:center;gap:12px;padding:16px 20px 0}
.main-head h1{font-family:var(--font-head);font-size:20px;font-weight:700}
.main-head .sub{color:var(--text3);font-size:12px}
.main-head .spacer{flex:1}
.grid-wrap{flex:1;overflow-y:auto;padding:16px 20px 24px}

/* GRID / CARDS (OGREF vcard) */
.grid{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,4),1fr)}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;position:relative}
.vcard:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.vcard-thumb-wrap{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-thumb-no-img{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.25);font-size:26px;gap:6px;background:linear-gradient(135deg,#161225 0%,#1e1830 100%)}
.vcard-thumb-no-img .no-img-label{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:1px;font-family:var(--font-head)}
.vcard-thumb-no-img .big{font-family:var(--font-head);font-size:34px;font-weight:700;color:rgba(124,111,255,.55)}
.vcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none}
.vcard-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px;z-index:3;backdrop-filter:blur(4px)}
.badge-pending{background:rgba(90,90,106,.75);color:#e8e8ec}
.badge-approved{background:rgba(42,157,92,.8);color:#fff}
.badge-retake{background:rgba(255,184,90,.85);color:#1a1200}
.badge-rejected{background:rgba(255,90,90,.8);color:#fff}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:4}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act-btn{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.vcard-act-btn:hover{background:rgba(255,90,90,.5)}
.vcard-overlay{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:2;pointer-events:none}
.vcard-overlay-title{font-size:12px;font-weight:500;color:#fff;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.vcard-overlay-meta{display:flex;flex-wrap:wrap;gap:3px}
.vcard-step{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:8px;font-size:9px;background:rgba(255,255,255,.13);color:rgba(255,255,255,.85)}
.vcard-step .d{width:6px;height:6px;border-radius:50%}
.empty{grid-column:1/-1;color:var(--text3);text-align:center;padding:70px 20px;border:1px dashed var(--border);border-radius:var(--radius)}
.empty .big{font-size:34px;margin-bottom:10px;opacity:.5}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:modalIn .25s cubic-bezier(.16,1,.3,1)}
.modal.lg{max-width:940px}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-title .sub{font-family:var(--font-body);font-size:12px;color:var(--text3);font-weight:400;margin-top:2px}
.modal-close{font-size:20px;color:var(--text3);width:30px;height:30px;border-radius:6px}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{height:72px;resize:vertical}
.section-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:20px 0 10px}

/* REVIEW */
.review-media{width:100%;background:#000;border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
.review-media img,.review-media video{width:100%;display:block;max-height:56vh;object-fit:contain}
.version-list{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.version-chip{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;color:var(--text2)}
.version-chip.active{border-color:var(--accent);background:rgba(124,111,255,.12);color:var(--text)}
.version-chip .status-dot{width:8px;height:8px;border-radius:50%}
.review-status-line{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:var(--text2)}
.rbadge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.review-actions{display:flex;gap:8px;margin:10px 0 4px;flex-wrap:wrap}
.review-actions .btn.ok{background:var(--green);color:#04120a}
.review-actions .btn.retake{background:var(--amber);color:#1a1200}
.review-actions .btn.reject{background:var(--red);color:#fff}
.notes{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.note .meta{color:var(--text3);font-size:11px;margin-bottom:4px}
.note-input{display:flex;gap:8px;margin-top:10px}
.note-input input{flex:1}
.step-grid{display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.step-row .name{flex:1;display:flex;align-items:center;gap:8px;font-size:13px}
.step-row select{padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)}
.uploading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin-top:10px}
.bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;flex:1}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}
.file-drop{border:1px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;color:var(--text3);font-size:13px;cursor:pointer}
.file-drop:hover{border-color:var(--accent);color:var(--text2)}
.file-drop input{display:none}
.step-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;color:#fff}

/* GATE (OGREF login/ws 風) */
.gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:44px 36px;max-width:520px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.gate-logo{font-family:var(--font-head);font-size:40px;font-weight:700}
.gate-logo b{color:var(--accent)}
.gate-sub{color:var(--text2);line-height:1.8;margin:14px 0 4px;font-size:13px}
.gate-sub code{background:var(--bg4);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent)}
.gate-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.gate-note{color:var(--text3);font-size:12px;margin-top:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:11px 18px;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:2000;font-size:13px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px;border:2px solid var(--bg)}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><span class="name">La<b>y</b>na</span><span class="ver">PROJECT</span></div>
  <button class="home-btn" id="homeBtn" title="ホーム">◐</button>
  <div class="search-wrap"><span class="si">⌕</span><input id="searchInput" type="text" placeholder="検索..." /></div>
  <div class="header-actions">
    <div class="size-btns" id="sizeBtns"></div>
    <div class="folder-status" id="folderStatus" title="保存先フォルダ / クリックで変更"><span class="dot"></span><span id="folderName">未接続</span></div>
    <label class="user-field"><span>👤</span><input id="currentUser" type="text" placeholder="名前" /></label>
    <button class="btn btn-primary" id="addBtn">+ 追加</button>
  </div>
</header>
<div class="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="main-head" id="mainHead"></div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  </main>
</div>

<div class="modal-overlay hidden" id="modal"><div class="modal" id="modalBody"></div></div>

<script>
'use strict';
/* ============================================================
   Layna — 単一HTML（OGREF と同じデザイン / サーバー不要）
   保存先はローカルフォルダ（File System Access API）。
   フォルダ内に layna_db.json / media/ / thumbnails/ を作成。
   非対応ブラウザは IndexedDB に退避保存。
   ============================================================ */

const STEP_STATUS={
  not_started:{label:'未着手',color:'#5a5a6a'},
  wip:{label:'作業中',color:'#7c6fff'},
  review:{label:'確認待ち',color:'#ffb85a'},
  retake:{label:'リテイク',color:'#ff9a5a'},
  approved:{label:'OK',color:'#5affa0'},
};
const REVIEW_STATUS={
  pending:{label:'チェック待ち',cls:'pending'},
  approved:{label:'OK',cls:'approved'},
  retake:{label:'リテイク',cls:'retake'},
  rejected:{label:'NG',cls:'rejected'},
};
const SEED_TEMPLATES=[
  {id:'tpl_cg_standard',name:'標準CGパイプライン',description:'OGPipeline の標準的なCG工程設定を踏襲',
   steps:[{id:'step_layout',name:'レイアウト',color:'#7c6fff',order:1},{id:'step_anim',name:'アニメーション',color:'#5a9bff',order:2},{id:'step_fx',name:'エフェクト',color:'#c06fff',order:3},{id:'step_light',name:'ライティング',color:'#ffb85a',order:4},{id:'step_comp',name:'コンポジット',color:'#5affa0',order:5}]},
  {id:'tpl_2d',name:'2D/作画パイプライン',description:'作画・仕上げ・撮影の2D向け工程',
   steps:[{id:'step_lo',name:'レイアウト',color:'#7c6fff',order:1},{id:'step_genga',name:'原画',color:'#5a9bff',order:2},{id:'step_douga',name:'動画',color:'#c06fff',order:3},{id:'step_shiage',name:'仕上げ',color:'#ffb85a',order:4},{id:'step_satsuei',name:'撮影',color:'#5affa0',order:5}]},
  {id:'tpl_simple',name:'シンプル（制作→チェック）',description:'工程を最小限にした汎用テンプレート',
   steps:[{id:'step_prod',name:'制作',color:'#5a9bff',order:1},{id:'step_check',name:'チェック',color:'#5affa0',order:2}]},
];

let _c=0;
function newId(p){_c++;return p+'_'+Date.now().toString(36)+_c.toString(36)}
function nowIso(){try{return new Date().toISOString()}catch(_){return''}}

/* ---------- IndexedDB ---------- */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('layna',1);r.onupgradeneeded=()=>{const d=r.result;for(const s of['handles','blobs','kv'])if(!d.objectStoreNames.contains(s))d.createObjectStore(s)};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbPut(s,k,v){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function idbGet(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
async function idbDel(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}

/* ---------- ストレージ抽象化 ---------- */
const storage={
  mode:null,rootHandle:null,_pending:null,urlCache:new Map(),
  supportsFolder(){return typeof window.showDirectoryPicker==='function'},
  async pickFolder(){const h=await window.showDirectoryPicker({mode:'readwrite',id:'layna-root'});if(!await this._perm(h))throw new Error('書き込み許可が必要です');this.rootHandle=h;this.mode='folder';await idbPut('handles','root',h);try{localStorage.setItem('layna_mode','folder')}catch(_){}return h.name},
  async tryReconnect(){if(!this.supportsFolder())return false;const h=await idbGet('handles','root');if(!h)return false;if(await h.queryPermission({mode:'readwrite'})==='granted'){this.rootHandle=h;this.mode='folder';return true}this._pending=h;return false},
  async resumePending(){if(!this._pending)return false;if(!await this._perm(this._pending))return false;this.rootHandle=this._pending;this.mode='folder';this._pending=null;return true},
  async _perm(h){const o={mode:'readwrite'};if(await h.queryPermission(o)==='granted')return true;return (await h.requestPermission(o))==='granted'},
  useIdb(){this.mode='idb';try{localStorage.setItem('layna_mode','idb')}catch(_){}},
  folderLabel(){if(this.mode==='folder'&&this.rootHandle)return this.rootHandle.name;if(this.mode==='idb')return 'ブラウザ内保存';return '未接続'},
  async _subdir(n){return this.rootHandle.getDirectoryHandle(n,{create:true})},
  async loadDb(){if(this.mode==='folder'){try{const fh=await this.rootHandle.getFileHandle('layna_db.json');return JSON.parse(await (await fh.getFile()).text())}catch(e){return null}}return (await idbGet('kv','db'))||null},
  async saveDb(db){if(this.mode==='folder'){const fh=await this.rootHandle.getFileHandle('layna_db.json',{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(db,null,2));await w.close()}else{await idbPut('kv','db',db)}},
  async putMedia(sub,fn,blob){if(this.mode==='folder'){const dir=await this._subdir(sub);const fh=await dir.getFileHandle(fn,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return sub+'/'+fn}const key='blob_'+newId('b')+'_'+fn;await idbPut('blobs',key,blob);return 'idb:'+key},
  async delMedia(ref){if(!ref)return;try{if(ref.startsWith('idb:'))await idbDel('blobs',ref.slice(4));else if(this.mode==='folder'){const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);await dir.removeEntry(fn)}}catch(e){}const u=this.urlCache.get(ref);if(u){URL.revokeObjectURL(u);this.urlCache.delete(ref)}},
  async getURL(ref){if(!ref)return null;if(this.urlCache.has(ref))return this.urlCache.get(ref);let blob=null;try{if(ref.startsWith('idb:'))blob=await idbGet('blobs',ref.slice(4));else{const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);blob=await (await dir.getFileHandle(fn)).getFile()}}catch(e){return null}if(!blob)return null;const url=URL.createObjectURL(blob);this.urlCache.set(ref,url);return url},
};

    const send=async()=>{if(!input.value.trim())return;version.review.notes.push({author:currentUser(),text:input.value.trim(),time:nowIso()});await persist();input.value='';refreshShotDetail()};
    sb.onclick=send;input.onkeydown=e=>{if(e.key==='Enter')send()};iw.appendChild(input);iw.appendChild(sb);notes.appendChild(iw);inner.appendChild(notes);

  const drop=el('label','file-drop');drop.innerHTML='<div>クリックして動画・画像を選択（ローカルフォルダに格納されます）</div>';
  const fileInput=el('input');fileInput.type='file';fileInput.accept='image/*,video/*';drop.appendChild(fileInput);
  const prog=el('div','uploading hidden');const bar=el('div','bar');const barI=el('i');bar.appendChild(barI);const pct=el('span',null,'処理中...');prog.appendChild(bar);prog.appendChild(pct);

  inner.appendChild(el('div','section-label','工程ステータス'));
  const grid=el('div','step-grid');
  for(const step of state.project.steps||[]){const row=el('div','step-row');const name=el('div','name');const d=el('span');d.style.cssText='width:10px;height:10px;border-radius:50%;background:'+step.color;name.appendChild(d);name.appendChild(document.createTextNode(step.name));const sel=el('select');for(const[k,info]of Object.entries(STEP_STATUS))sel.appendChild(new Option(info.label,k));sel.value=shot.stepStatuses[step.id]||'not_started';sel.onchange=async()=>{shot.stepStatuses[step.id]=sel.value;await persist();updateGridCardFor(shot)};row.appendChild(name);row.appendChild(sel);grid.appendChild(row)}
  inner.appendChild(grid);

  const del=el('button','btn btn-danger','このショットを削除');del.onclick=async()=>{await deleteShot(shot);closeModal()};
  modalFooter(body,[del]);
}

async function setReview(versionId,status){
  let owner=null;
  for(const shot of DB.shots){const v=shot.versions.find(x=>x.id===versionId);if(v){v.review.status=status;owner=shot;break}}
  await persist();refreshShotDetail();if(owner)updateGridCardFor(owner);
  toast('判定を更新: '+REVIEW_STATUS[status].label);
}
function updateGridCardFor(){if(state.view==='project'){renderGrid();resolveThumbs()}}

/* ---- アップロード ---- */
async function uploadVersion(shot,file,ui){
  ui.prog.classList.remove('hidden');ui.pct.textContent='サムネイル生成中...';ui.barI.style.width='30%';
  const isVideo=file.type.startsWith('video/');
  try{
    const thumbDataUrl=await generateThumbnail(file);
    ui.pct.textContent='保存中...';ui.barI.style.width='60%';
    const ext=(file.name.match(/\.[^.]+$/)||[''])[0];const id=newId('media');
    const mediaRef=await storage.putMedia('media',id+ext,file);
    let thumbRef=null;
    if(thumbDataUrl){const blob=await(await fetch(thumbDataUrl)).blob();thumbRef=await storage.putMedia('thumbnails',id+'.jpg',blob)}
    else if(!isVideo)thumbRef=mediaRef;
    const version={id:newId('ver'),name:'v'+(shot.versions.length+1),type:isVideo?'video':'image',file:mediaRef,thumb:thumbRef,uploadedBy:currentUser(),uploadedAt:nowIso(),review:{status:'pending',notes:[]}};
    shot.versions.push(version);if(thumbRef)shot.thumbnail=thumbRef;
    await persist();ui.barI.style.width='100%';state.activeVersionId=version.id;refreshShotDetail();updateGridCardFor(shot);toast('アップロード完了');
  }catch(e){ui.prog.classList.add('hidden');toast('アップロード失敗: '+e.message)}
}
function generateThumbnail(file){
  return new Promise(resolve=>{
    const isVideo=file.type.startsWith('video/');const url=URL.createObjectURL(file);
    const done=cv=>{URL.revokeObjectURL(url);resolve(cv?cv.toDataURL('image/jpeg',0.72):null)};
    const draw=(src,w,h)=>{const scale=Math.min(1,640/w);const cv=document.createElement('canvas');cv.width=Math.round(w*scale);cv.height=Math.round(h*scale);cv.getContext('2d').drawImage(src,0,0,cv.width,cv.height);return cv};
    if(isVideo){const vid=document.createElement('video');vid.preload='metadata';vid.muted=true;vid.src=url;vid.onloadeddata=()=>{try{vid.currentTime=Math.min(1,(vid.duration||2)/2)}catch(_){}};vid.onseeked=()=>{try{done(draw(vid,vid.videoWidth,vid.videoHeight))}catch(_){done(null)}};vid.onerror=()=>done(null)}
    else{const img=new Image();img.onload=()=>done(draw(img,img.naturalWidth,img.naturalHeight));img.onerror=()=>done(null);img.src=url}
  });
}

(async()=>{
  let prev=null;try{prev=localStorage.getItem('layna_mode')}catch(_){}
  try{
    if(await storage.tryReconnect()){await boot();return}
    if(storage._pending){renderGate();return}
    if(prev==='idb'){storage.useIdb();await boot();return}
    renderGate();
  }catch(e){renderGate()}
})();
