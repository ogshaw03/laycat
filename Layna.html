<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layna</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#c7c7cf;--accent2:#e8e8ec;
  --red:#e06a6a;--green:#7fbf9a;--amber:#d6a95f;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  --cols:4;
}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;cursor:pointer}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{order:-1;display:inline-flex;flex-direction:column;align-items:flex-start;flex-shrink:0;line-height:1}
.logo .name{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:.5px}
.logo .name b{color:#fff}
.logo .ver{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-top:2px}
.home-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:18px;background:var(--bg4);border:1px solid transparent;border-radius:var(--radius2);transition:all .15s}
.home-btn:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.folder-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer}
.folder-status:hover{border-color:var(--border2)}
.folder-status .dot{width:8px;height:8px;border-radius:50%;background:#5a5a6a}
.folder-status.connected .dot{background:#d8d8dc}
.user-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.user-field input{width:96px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:12px}
.size-btns{display:flex;gap:2px}
.size-btn{width:30px;height:30px;border-radius:var(--radius2);border:1px solid var(--border);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center}
.size-btn.active{color:#e8e8ec;border-color:#e8e8ec}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:#ececf0;color:#16161a}
.btn-primary:hover{background:#fff}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,90,90,.12)}
.btn-sm{padding:4px 9px;font-size:12px}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label .add{color:var(--accent);cursor:pointer;font-size:14px}
/* TREE */
.tree{font-size:13px}
.tree-row{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden}
.tree-row:hover{background:var(--bg4);color:var(--text)}
.tree-row.active{background:rgba(255,255,255,.08);color:var(--text)}
.tree-toggle{width:14px;text-align:center;color:var(--text3);flex-shrink:0;font-size:9px;transition:transform .1s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0 6px}
.tree-empty{color:var(--text3);font-size:12px;padding:8px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 20px 0;color:var(--text3);font-size:13px;flex-wrap:wrap}
.breadcrumb .sep{opacity:.5}
.breadcrumb .cur{color:var(--text)}
.main-head{display:flex;align-items:center;gap:12px;padding:8px 20px 0}
.main-head h1{font-family:var(--font-head);font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.main-head .desc{color:var(--text3);font-size:12px;margin-top:3px}
.main-head .spacer{flex:1}
.scroll{flex:1;overflow-y:auto;padding:14px 20px 28px}
.section-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label:first-child{margin-top:8px}
.section-label .acts{margin-left:auto;display:flex;gap:6px}

/* GRID / CARDS */
.grid{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,4),1fr)}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.vcard:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.vcard-thumb{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-noimg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#17171b,#232329);color:rgba(255,255,255,.4)}
.vcard-noimg .g{font-size:30px}
.vcard-noimg .lab{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;font-family:var(--font-head)}
.vcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none;transition:opacity .15s}
.vcard-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.vcard:hover .vcard-play{opacity:0}
.vcard-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:4}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.vcard-act:hover{background:rgba(255,90,90,.55)}
.vcard-cnt{position:absolute;bottom:6px;right:8px;font-size:10px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5);padding:1px 6px;border-radius:8px;z-index:3}
.vcard-ov{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:2;pointer-events:none}
.vcard-ov .t{font-size:12px;font-weight:500;color:#fff;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.badge-empty{background:rgba(90,90,106,.25);color:#9a9aaa}
.badge-pending{background:rgba(120,120,140,.3);color:#cbd5e1}
.badge-approved{background:rgba(127,191,154,.85);color:#0c1a12}
.badge-retake{background:rgba(214,169,95,.9);color:#1a1200}
.badge-rejected{background:rgba(224,106,106,.88);color:#fff}
.add-tile{border:1px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);cursor:pointer;min-height:130px;transition:all .15s}
.add-tile:hover{border-color:var(--border2);color:var(--text2);background:rgba(255,255,255,.03)}
.add-tile .p{font-size:26px}
.empty{color:var(--text3);text-align:center;padding:50px 20px;border:1px dashed var(--border);border-radius:var(--radius)}

/* LOG（縦積み・大型タイル / ShotGrid風） */
.log{display:flex;flex-direction:column;gap:16px;max-width:770px}
.log-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.log-item:hover{border-color:var(--border2)}
.log-media{position:relative;background:#000;cursor:pointer}
.log-media video,.log-media img{width:100%;display:block;max-height:50vh;object-fit:contain;background:#000}
.log-open{position:absolute;top:8px;right:8px;z-index:3;width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,.65);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.2)}
.log-open:hover{background:rgba(255,255,255,.18)}
.log-media .ph{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:34px}
.log-head{display:flex;align-items:center;gap:10px;padding:12px 16px 0}
.log-title{font-weight:600;font-size:15px;display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.log-meta{font-size:11px;color:var(--text3);white-space:nowrap}
.log-notes{padding:10px 16px 14px;display:flex;flex-direction:column;gap:8px}
.log-note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.log-note .m{font-size:11px;color:var(--text3);margin-bottom:4px}
.log-note .t{font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.65}
.log-note-input{display:flex;gap:8px;padding:0 16px 16px}
.log-note-input textarea{flex:1;min-height:38px;max-height:140px;resize:vertical;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.5}
.log-note-input textarea:focus{outline:none;border-color:var(--border2)}
.log-empty-note{font-size:12px;color:var(--text3)}
.note-acts{margin-left:auto;display:inline-flex;gap:4px}
.na{font-size:11px;color:var(--text3);padding:2px 6px;border-radius:4px}
.na:hover{color:var(--text);background:rgba(255,255,255,.08)}
.frame-chip{font-size:10px;font-family:monospace;padding:1px 7px;border-radius:9px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text2);margin-left:8px}
.frame-chip.link{cursor:pointer}
.frame-chip.link:hover{color:var(--text);border-color:var(--border2)}
.edit-row{display:flex;gap:6px;margin-top:6px}
.fb-edit-ta{width:100%;min-height:56px;resize:vertical;padding:8px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;line-height:1.5;margin-top:4px}

/* FB画面（シンクスケッチ風） */
.fb-overlay{position:fixed;inset:0;background:#0a0a0c;z-index:1500;display:flex;flex-direction:column}
.fb-top{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.fb-title{font-family:var(--font-head);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-body{flex:1;display:flex;min-height:0}
.fb-stage{flex:1;display:flex;flex-direction:column;min-width:0}
.fb-media-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#000;min-height:0;overflow:hidden}
.fb-media-wrap video,.fb-media-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.fb-canvas{position:absolute;z-index:5;cursor:crosshair;touch-action:none}
.fb-trace{position:absolute;z-index:4;background:#fff;opacity:0;pointer-events:none}
.clr-row{display:inline-flex;gap:4px;align-items:center}
.clr-chip{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.25);cursor:pointer;padding:0}
.clr-chip.sel{border-color:#fff;transform:scale(1.15)}
.layer-row{display:inline-flex;gap:3px;align-items:center}
.layer-chip{min-width:24px;height:24px;border-radius:5px;border:1px solid var(--border);color:var(--text3);font-size:11px;display:flex;align-items:center;justify-content:center}
.layer-chip.act{border-color:#e8e8ec;color:#e8e8ec;background:rgba(255,255,255,.1)}
.layer-chip.off{opacity:.35;text-decoration:line-through}
.fb-controls{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.fb-tl-wrap{background:var(--bg2);border-top:1px solid var(--border);padding:8px 12px 2px;flex-shrink:0}
.fb-timeline{display:block;width:100%;height:46px;cursor:ew-resize;touch-action:none;border-radius:6px}
.fb-frame{font-family:monospace;font-size:12px;color:var(--text2);min-width:96px;text-align:center}
.fb-controls select{padding:4px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px}
.fb-controls input[type=color]{width:30px;height:26px;background:none;border:1px solid var(--border);border-radius:6px;padding:1px;cursor:pointer}
.btn.tool.active{background:#ececf0;color:#16161a;border-color:#ececf0}
.fb-side{width:340px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;min-height:0;flex-shrink:0}
.fb-side-head{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:12px 14px 8px}
.fb-notes{flex:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.fb-input{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.fb-input textarea{flex:1;min-height:44px;max-height:140px;resize:vertical;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.5}
.fb-input textarea:focus{outline:none;border-color:var(--border2)}
@media (max-width:900px){.fb-side{width:280px}}
.file-drop{border:1px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px}
.file-drop:hover{border-color:var(--accent);color:var(--text2)}
.file-drop input{display:none}
.uploading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin-bottom:12px}
.bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;flex:1}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:in .25s cubic-bezier(.16,1,.3,1)}
.modal.lg{max-width:940px}
@keyframes in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-title .sub{font-family:var(--font-body);font-size:12px;color:var(--text3);font-weight:400;margin-top:2px}
.modal-close{font-size:20px;color:var(--text3);width:30px;height:30px;border-radius:6px}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{height:70px;resize:vertical}
.divider{border-top:1px solid var(--border);margin:18px 0}
.review-media{width:100%;background:#000;border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
.review-media img,.review-media video{width:100%;display:block;max-height:56vh;object-fit:contain}
.review-actions{display:flex;gap:8px;margin:6px 0 4px;flex-wrap:wrap}
.review-actions .btn.ok{background:var(--green);color:#04120a}
.review-actions .btn.retake{background:var(--amber);color:#1a1200}
.review-actions .btn.reject{background:var(--red);color:#fff}
.notes{margin-top:14px}
.note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.note .m{color:var(--text3);font-size:11px;margin-bottom:4px}
.note-input{display:flex;gap:8px;margin-top:10px}
.note-input input{flex:1}
.tmpl-pick{display:flex;flex-direction:column;gap:8px}
.tmpl-opt{border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer}
.tmpl-opt:hover{border-color:var(--accent)}
.tmpl-opt .tn{font-weight:600;font-size:13px}
.tmpl-opt .ts{font-size:11px;color:var(--text3);margin-top:3px}
.seg{display:flex;gap:6px}
.seg-opt{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;text-align:center;line-height:1.5}
.seg-opt small{display:block;font-size:10px;color:var(--text3)}
.seg-opt.active{border-color:#e8e8ec;background:rgba(255,255,255,.08);color:var(--text)}
.seg-opt.active small{color:var(--text2)}
.type-chip{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.vcard-type{position:absolute;bottom:6px;left:8px;font-size:10px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.5);padding:1px 7px;border-radius:8px;z-index:3}
.gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:44px 36px;max-width:520px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.gate-logo{font-family:var(--font-head);font-size:40px;font-weight:700}
.gate-logo b{color:#fff}
.gate-sub{color:var(--text2);line-height:1.8;margin:14px 0 4px;font-size:13px}
.gate-sub code{background:var(--bg4);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent)}
.gate-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.gate-note{color:var(--text3);font-size:12px;margin-top:16px}
.gbtn{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;background:#fff;color:#1a1a1a;border-radius:8px;font-weight:600;font-size:14px}
.gbtn:hover{filter:brightness(.94)}
.gbtn .gg{font-weight:700;color:#4285F4}
.spin{width:34px;height:34px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:6px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);object-fit:cover}
.hd-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.hd-user .lo{color:var(--text3);cursor:pointer;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.hd-user .lo:hover{color:var(--text);border-color:var(--border2)}
.deny-email{font-size:13px;color:var(--text3);margin:8px 0 18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:11px 18px;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:2000;font-size:13px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px;border:2px solid var(--bg)}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><span class="name">La<b>y</b>na</span><span class="ver">PROJECT</span></div>
  <button class="home-btn" id="homeBtn" title="トップへ">◐</button>
  <div class="search-wrap"><span class="si">⌕</span><input id="searchInput" type="text" placeholder="この階層を検索..." /></div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="reelBtn" title="REEL — 動画を並べて順番に見るシーケンスプレイヤー（別ウィンドウ）">🎞 REEL</button>
    <div class="size-btns" id="sizeBtns"></div>
    <div class="folder-status" id="folderStatus" title="保存先フォルダ / クリックで変更"><span class="dot"></span><span id="folderName">未接続</span></div>
    <label class="user-field" id="nameField"><span>👤</span><input id="currentUser" type="text" placeholder="名前" /></label>
    <div class="hd-user hidden" id="authUserBox"></div>
    <button class="btn btn-primary" id="addBtn">+ 追加</button>
  </div>
</header>
<div class="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="main-head" id="mainHead"></div>
    <div class="scroll" id="scroll"></div>
  </main>
</div>
<div class="modal-overlay hidden" id="modal"><div class="modal" id="modalBody"></div></div>

<script>
'use strict';
/* ============================================================
   Layna — 任意階層ツリー版（ShotGrid ライク / OGREF デザイン）
   どのノードも「子（枝分かれ）」と「動画ログ（工程ごとの履歴）」を持てる。
   階層の数・名前はユーザーが自由に作成。保存はローカルフォルダ。
   ============================================================ */

const STATUS={
  empty:{label:'—',cls:'empty',color:'#3a3a42'},
  pending:{label:'チェック待ち',cls:'pending',color:'#8a8a92'},
  approved:{label:'OK',cls:'approved',color:'#7fbf9a'},
  retake:{label:'リテイク',cls:'retake',color:'#d6a95f'},
  rejected:{label:'NG',cls:'rejected',color:'#e06a6a'},
};
function defaultTemplates(){return[
  {id:'tpl_anim',name:'アニメ工程（レイアウト→アニメ→セカンダリ）',steps:[{name:'レイアウト',color:'#7c6fff'},{name:'アニメーション',color:'#5a9bff'},{name:'セカンダリ',color:'#c06fff'}]},
  {id:'tpl_cg',name:'CG工程（モデリング〜コンポジット）',steps:[{name:'モデリング',color:'#7c6fff'},{name:'アニメーション',color:'#5a9bff'},{name:'ライティング',color:'#ffb85a'},{name:'コンポジット',color:'#5affa0'}]},
  {id:'tpl_shots',name:'ショット3つ（ショット01〜03）',steps:[{name:'ショット01',color:'#7c6fff'},{name:'ショット02',color:'#7c6fff'},{name:'ショット03',color:'#7c6fff'}]},
];}

let _c=0;
function newId(p){_c++;return p+'_'+Date.now().toString(36)+_c.toString(36)}
function nowIso(){try{return new Date().toISOString()}catch(_){return''}}

/* ---------- IndexedDB ---------- */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('layna',1);r.onupgradeneeded=()=>{const d=r.result;for(const s of['handles','blobs','kv'])if(!d.objectStoreNames.contains(s))d.createObjectStore(s)};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbPut(s,k,v){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function idbGet(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
async function idbDel(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}

/* ---------- ストレージ抽象化（folder / idb） ---------- */
const storage={
  mode:null,rootHandle:null,_pending:null,urlCache:new Map(),
  supportsFolder(){return typeof window.showDirectoryPicker==='function'},
  async pickFolder(){const h=await window.showDirectoryPicker({mode:'readwrite',id:'layna-root'});if(!await this._perm(h))throw new Error('書き込み許可が必要です');this.rootHandle=h;this.mode='folder';await idbPut('handles','root',h);try{localStorage.setItem('layna_mode','folder')}catch(_){}return h.name},
  async tryReconnect(){if(!this.supportsFolder())return false;const h=await idbGet('handles','root');if(!h)return false;if(await h.queryPermission({mode:'readwrite'})==='granted'){this.rootHandle=h;this.mode='folder';return true}this._pending=h;return false},
  async resumePending(){if(!this._pending)return false;if(!await this._perm(this._pending))return false;this.rootHandle=this._pending;this.mode='folder';this._pending=null;return true},
  async _perm(h){const o={mode:'readwrite'};if(await h.queryPermission(o)==='granted')return true;return (await h.requestPermission(o))==='granted'},
  useIdb(){this.mode='idb';try{localStorage.setItem('layna_mode','idb')}catch(_){}},
  folderLabel(){if(this.mode==='folder'&&this.rootHandle)return this.rootHandle.name;if(this.mode==='idb')return 'ブラウザ内保存';return '未接続'},
  async _subdir(n){return this.rootHandle.getDirectoryHandle(n,{create:true})},
  async loadDb(){if(this.mode==='folder'){try{const fh=await this.rootHandle.getFileHandle('layna_db.json');return JSON.parse(await (await fh.getFile()).text())}catch(e){return null}}return (await idbGet('kv','db'))||null},
  async saveDb(db){if(this.mode==='folder'){const fh=await this.rootHandle.getFileHandle('layna_db.json',{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(db,null,2));await w.close()}else{await idbPut('kv','db',db)}},
  async putMedia(sub,fn,blob){if(this.mode==='folder'){const dir=await this._subdir(sub);const fh=await dir.getFileHandle(fn,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return sub+'/'+fn}const key='blob_'+newId('b')+'_'+fn;await idbPut('blobs',key,blob);return 'idb:'+key},
  async delMedia(ref){if(!ref)return;try{if(ref.startsWith('idb:'))await idbDel('blobs',ref.slice(4));else if(this.mode==='folder'){const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);await dir.removeEntry(fn)}}catch(e){}const u=this.urlCache.get(ref);if(u){URL.revokeObjectURL(u);this.urlCache.delete(ref)}},
  async getURL(ref){if(!ref)return null;if(this.urlCache.has(ref))return this.urlCache.get(ref);let blob=null;try{if(ref.startsWith('idb:'))blob=await idbGet('blobs',ref.slice(4));else{const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);blob=await (await dir.getFileHandle(fn)).getFile()}}catch(e){return null}if(!blob)return null;const url=URL.createObjectURL(blob);this.urlCache.set(ref,url);return url},
};

/* ---------- 状態 / DB ---------- */
let DB=null;let curUploadUI=null;
const state={currentId:null,search:'',expanded:new Set(),frameOrder:false};
function defaultDb(){return{version:2,templates:defaultTemplates(),nodes:[]}}
async function persist(){await storage.saveDb(DB)}

/* v1(projects/shots) → v2(nodes) 移行 */
function migrate(old){
  const nodes=[];
  for(const p of old.projects||[])nodes.push({id:p.id,parentId:null,name:p.name,description:p.description||'',thumbnail:p.thumbnail||null,createdAt:p.createdAt||nowIso(),versions:[]});
  for(const s of old.shots||[])nodes.push({id:s.id,parentId:s.projectId,name:s.name,description:s.description||'',thumbnail:s.thumbnail||null,createdAt:s.createdAt||nowIso(),versions:(s.versions||[]).map(v=>({...v,thumb:v.thumb||v.thumbnail||null}))});
  const templates=(old.pipelineTemplates&&old.pipelineTemplates.length)?old.pipelineTemplates.map(t=>({id:t.id,name:t.name,steps:(t.steps||[]).map(st=>({name:st.name,color:st.color||'#7c6fff'}))})):defaultTemplates();
  return{version:2,templates,nodes};
}

/* ---------- ツリー操作 ---------- */
const getNode=id=>DB.nodes.find(n=>n.id===id)||null;
const childrenOf=id=>DB.nodes.filter(n=>n.parentId===id).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
function pathOf(id){const p=[];let n=getNode(id);while(n){p.unshift(n);n=n.parentId?getNode(n.parentId):null}return p}
function descendants(id){const out=[];const walk=pid=>{for(const c of childrenOf(pid)){out.push(c);walk(c.id)}};walk(id);return out}
function nodeStatus(node){
  if(node.versions&&node.versions.length)return node.versions[node.versions.length-1].review.status;
  const ch=childrenOf(node.id);
  if(!ch.length)return 'empty';
  const sts=ch.map(nodeStatus);
  if(sts.every(s=>s==='approved'))return 'approved';
  if(sts.some(s=>s==='rejected'))return 'rejected';
  if(sts.some(s=>s==='retake'))return 'retake';
  if(sts.some(s=>s!=='empty'))return 'pending';
  return 'empty';
}
function reviewToStatus(st){return st}

/* ---------- utils ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e};
let authUser=null; // {name,email,photo,role} when Google認証時
const currentUser=()=>authUser?authUser.name:(($('#currentUser').value||'').trim()||'anonymous');
function toast(m){const t=el('div','toast',m);document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
function fmt(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return iso;const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}

/* ============================================================
   ゲート
   ============================================================ */
function chrome(on){$('.header').style.display=on?'':'none';$('.app-body').style.display=on?'':'none'}
function renderGate(){
  chrome(false);const g0=$('#gateScreen');if(g0)g0.remove();
  const g=el('div','gate');g.id='gateScreen';const box=el('div','gate-box');
  box.innerHTML='<div class="gate-logo">La<b>y</b>na</div>';
  const support=storage.supportsFolder();const sub=el('div','gate-sub');
  if(storage._pending)sub.innerHTML='前回のフォルダ「<b>'+storage._pending.name+'</b>」に再接続します。';
  else if(support)sub.innerHTML='このツール専用の<b>保存先フォルダ</b>を選んでください。<br>フォルダ内に <code>layna_db.json</code> と <code>media/</code> を作成します。';
  else sub.innerHTML='お使いのブラウザはフォルダ保存に未対応です。<br><b>Chrome / Edge</b> 推奨。ブラウザ内保存でも続けられます。';
  box.appendChild(sub);const acts=el('div','gate-actions');
  if(storage._pending){const b=el('button','btn btn-primary','フォルダに再接続');b.onclick=async()=>{try{if(await storage.resumePending())await boot();else toast('許可されませんでした')}catch(e){toast('接続失敗: '+e.message)}};acts.appendChild(b);const b2=el('button','btn btn-ghost','別のフォルダ');b2.onclick=connectFlow;acts.appendChild(b2);}
  else if(support){const b=el('button','btn btn-primary','保存先フォルダを選択');b.onclick=connectFlow;acts.appendChild(b);const b2=el('button','btn btn-ghost','ブラウザ内保存で続ける');b2.onclick=async()=>{storage.useIdb();await boot()};acts.appendChild(b2);}
  else{const b=el('button','btn btn-primary','ブラウザ内保存で開始');b.onclick=async()=>{storage.useIdb();await boot()};acts.appendChild(b);}
  box.appendChild(acts);g.appendChild(box);document.body.appendChild(g);
}
async function connectFlow(){try{await storage.pickFolder();await boot()}catch(e){if(e.name!=='AbortError')toast('フォルダ選択が使えない環境です。「ブラウザ内保存」をご利用ください')}}

/* ============================================================
   起動
   ============================================================ */
async function boot(){
  const g=$('#gateScreen');if(g)g.remove();chrome(true);
  let raw=await storage.loadDb();
  if(!raw)DB=defaultDb();
  else if(raw.nodes)DB=raw;               // v2
  else DB=migrate(raw);                    // v1 → v2
  if(!Array.isArray(DB.nodes))DB.nodes=[];
  if(!Array.isArray(DB.templates)||!DB.templates.length)DB.templates=defaultTemplates();
  // ページ種別の補完（未設定は: 動画があればレビュー、なければセクション）
  for(const n of DB.nodes)if(!n.type)n.type=(n.versions&&n.versions.length)?'review':'section';
  await persist();
  updateFolderStatus();initSizeBtns();
  state.currentId=null;go(null);
}
function updateFolderStatus(){$('#folderStatus').classList.toggle('connected',!!storage.mode);$('#folderName').textContent=storage.folderLabel()}
function initSizeBtns(){const wrap=$('#sizeBtns');wrap.innerHTML='';let cols=4;try{cols=parseInt(localStorage.getItem('layna_cols')||'4')}catch(_){}document.documentElement.style.setProperty('--cols',cols);[['S',6],['M',4],['L',3]].forEach(([lab,n])=>{const b=el('button','size-btn'+(n===cols?' active':''),lab);b.onclick=()=>{document.documentElement.style.setProperty('--cols',n);try{localStorage.setItem('layna_cols',n)}catch(_){}for(const x of wrap.children)x.classList.remove('active');b.classList.add('active')};wrap.appendChild(b)})}

/* ============================================================
   ナビ / レンダリング
   ============================================================ */
function go(id){state.currentId=id;state.search='';$('#searchInput').value='';for(const n of pathOf(id))state.expanded.add(n.id);render()}
function render(){renderSidebar();renderBreadcrumb();renderMainHead();renderBody();resolveThumbs()}

/* サイドバー：ツリー */
function renderSidebar(){
  const sb=$('#sidebar');sb.innerHTML='';
  const lab=el('div','sidebar-label');lab.appendChild(el('span',null,'プロジェクト'));const add=el('span','add','＋');add.title='プロジェクトを追加';add.onclick=()=>openAddModal(null);lab.appendChild(add);sb.appendChild(lab);
  const roots=childrenOf(null);
  if(!roots.length){sb.appendChild(el('div','tree-empty','プロジェクトなし'));return}
  const tree=el('div','tree');
  for(const r of roots)renderTreeNode(tree,r,0);
  sb.appendChild(tree);
}
function renderTreeNode(container,node,depth){
  const kids=childrenOf(node.id);const row=el('div','tree-row'+(node.id===state.currentId?' active':''));
  row.style.paddingLeft=(6+depth*13)+'px';
  const tg=el('span','tree-toggle'+(state.expanded.has(node.id)?' open':''),kids.length?'▶':'');
  if(kids.length)tg.onclick=e=>{e.stopPropagation();if(state.expanded.has(node.id))state.expanded.delete(node.id);else state.expanded.add(node.id);renderSidebar()};
  row.appendChild(tg);
  const dot=el('span','tree-dot');dot.style.background=STATUS[nodeStatus(node)].color;row.appendChild(dot);
  const ico=el('span',null,node.type==='review'?'🎬':'📁');ico.style.cssText='font-size:11px;flex-shrink:0';row.appendChild(ico);
  row.appendChild(el('span','tree-name',node.name));
  if(node.type==='review'&&node.versions.length)row.appendChild(el('span','tree-badge','▶'+node.versions.length));
  else if(kids.length)row.appendChild(el('span','tree-badge','📁'+kids.length));
  row.onclick=()=>go(node.id);
  container.appendChild(row);
  if(kids.length&&state.expanded.has(node.id)){const wrap=el('div');for(const c of kids)renderTreeNode(wrap,c,depth+1);container.appendChild(wrap)}
}

/* パンくず */
function renderBreadcrumb(){
  const bc=$('#breadcrumb');bc.innerHTML='';
  const home=el('a',null,'▦ トップ');home.onclick=()=>go(null);bc.appendChild(home);
  for(const n of pathOf(state.currentId)){bc.appendChild(el('span','sep','/'));const isCur=n.id===state.currentId;const a=el(isCur?'span':'a',isCur?'cur':null,n.name);if(!isCur)a.onclick=()=>go(n.id);bc.appendChild(a)}
}

/* メインヘッダ */
function renderMainHead(){
  const h=$('#mainHead');h.innerHTML='';const cur=state.currentId?getNode(state.currentId):null;
  const box=el('div');
  const title=el('h1');
  if(cur){
    title.appendChild(document.createTextNode(cur.name));
    const st=STATUS[nodeStatus(cur)];title.appendChild(el('span','badge badge-'+st.cls,st.label));
    title.appendChild(el('span','type-chip',cur.type==='review'?'🎬 レビュー':'📁 セクション'));
  }else title.textContent='プロジェクト一覧';
  box.appendChild(title);
  if(cur&&cur.description)box.appendChild(el('div','desc',cur.description));
  h.appendChild(box);h.appendChild(el('div','spacer'));
  if(cur){
    const rn=el('button','btn btn-ghost btn-sm','設定');rn.onclick=()=>openRename(cur);h.appendChild(rn);
    const del=el('button','btn btn-danger btn-sm','削除');del.onclick=()=>deleteNode(cur);h.appendChild(del);
  }
  const addBtn=$('#addBtn');addBtn.style.display='';
  addBtn.textContent=cur?(cur.type==='review'?'+ 動画':'+ 項目'):'+ プロジェクト';
}

/* 本体：ページ種別で分岐 */
function renderBody(){
  const s=$('#scroll');s.innerHTML='';curUploadUI=null;
  const cur=state.currentId?getNode(state.currentId):null;
  if(cur&&cur.type==='review')renderReviewBody(s,cur);
  else renderSectionBody(s,cur);
}

/* セクションページ（子項目タイルのみ・動画追加不可） */
function renderSectionBody(s,cur){
  const parentId=cur?cur.id:null;
  const q=state.search.trim().toLowerCase();
  let kids=childrenOf(parentId);
  if(q)kids=kids.filter(n=>n.name.toLowerCase().includes(q));
  const secl=el('div','section-label');secl.appendChild(el('span',null,cur?'サブ項目 / 工程':'プロジェクト'));
  const acts=el('div','acts');
  const addBtn=el('button','btn btn-ghost btn-sm','+ 追加');addBtn.onclick=()=>openAddModal(parentId);acts.appendChild(addBtn);
  if(cur){const tb=el('button','btn btn-ghost btn-sm','テンプレートから作成');tb.onclick=()=>openTemplateModal(parentId);acts.appendChild(tb)}
  secl.appendChild(acts);s.appendChild(secl);
  if(!kids.length){s.appendChild(el('div','empty',cur?'まだ項目がありません。「+ 追加」で工程（レビュー）や下位セクションを作成してください。':'プロジェクトがまだありません。「+ プロジェクト」から作成してください。'));return}
  const grid=el('div','grid');
  for(const n of kids)grid.appendChild(nodeCard(n));
  const addTile=el('div','add-tile');addTile.innerHTML='<div class="p">＋</div><div>追加</div>';addTile.onclick=()=>openAddModal(parentId);grid.appendChild(addTile);
  s.appendChild(grid);
}

/* レビューページ（動画FBログを縦に蓄積・ShotGrid型／子項目なし） */
function renderReviewBody(s,cur){
  const ll=el('div','section-label');ll.appendChild(el('span',null,'動画FBログ / ディレクターチェック'));
  const acts=el('div','acts');
  const fo=el('button','btn btn-ghost btn-sm'+(state.frameOrder?' tool active':''),state.frameOrder?'フレーム順 ✓':'フレーム順');
  fo.title='コメントをフレーム番号順に表示（Fチップでタイル内動画がそのフレームへ移動）';
  fo.onclick=()=>{state.frameOrder=!state.frameOrder;renderBody();resolveThumbs()};
  acts.appendChild(fo);ll.appendChild(acts);
  s.appendChild(ll);
  const prog=el('div','uploading hidden');const bar=el('div','bar');const bi=el('i');bar.appendChild(bi);const pct=el('span',null,'処理中...');prog.appendChild(bar);prog.appendChild(pct);
  curUploadUI={prog,bi,pct};
  s.appendChild(prog);
  if(!cur.versions.length){s.appendChild(el('div','empty','まだ動画・画像がありません。右上の「＋ 動画」ボタンから追加してください。'));return}
  const log=el('div','log');
  [...cur.versions].reverse().forEach(v=>log.appendChild(logItem(cur,v)));
  s.appendChild(log);
}

function nodeCard(node){
  const isRev=node.type==='review';const kids=childrenOf(node.id);const card=el('div','vcard');
  const tw=el('div','vcard-thumb');const lv=node.versions[node.versions.length-1];
  if(node.thumbnail){
    if(isRev&&lv&&lv.type==='video'){
      const v=el('video','vcard-video');v.dataset.vref=lv.file;v.dataset.poster=node.thumbnail;v.muted=true;v.loop=true;v.playsInline=true;v.preload='metadata';
      v.onmouseenter=()=>{v.play().catch(()=>{})};v.onmouseleave=()=>{try{v.pause();v.currentTime=0}catch(_){}};
      tw.appendChild(v);tw.appendChild(el('div','vcard-play','▶'));
    }else{
      const img=el('img');img.dataset.ref=node.thumbnail;tw.appendChild(img);
      if(lv&&lv.type==='video')tw.appendChild(el('div','vcard-play','▶'));
    }
  }
  else{const ni=el('div','vcard-noimg');ni.appendChild(el('div','g',isRev?'🎬':'▦'));ni.appendChild(el('div','lab',isRev?(node.versions.length?node.versions.length+' 本':'レビュー'):(kids.length?kids.length+' 項目':'空セクション')));tw.appendChild(ni)}
  const st=STATUS[nodeStatus(node)];tw.appendChild(el('div','vcard-badge badge-'+st.cls,st.label));
  if(isRev){if(node.versions.length)tw.appendChild(el('div','vcard-cnt','▶ '+node.versions.length))}
  else if(kids.length)tw.appendChild(el('div','vcard-cnt','📁 '+kids.length));
  const a=el('div','vcard-actions');const d=el('button','vcard-act','🗑');d.title='削除';d.onclick=e=>{e.stopPropagation();deleteNode(node)};a.appendChild(d);tw.appendChild(a);
  const ov=el('div','vcard-ov');ov.appendChild(el('div','t',(isRev?'🎬 ':'📁 ')+node.name));tw.appendChild(ov);

}

/* 共通コメントブロック（編集・削除・フレームジャンプ対応） */
function noteBlock(v,n,opts){
  opts=opts||{};
  const note=el('div','log-note');
  const m=el('div','m');
  m.appendChild(el('span',null,n.author+'・'+fmt(n.time)+(n.edited?'（編集済）':'')));
  if(n.frame!=null){
    const fc=el('span','frame-chip'+(opts.onSeek?' link':''),'F'+n.frame);
    if(opts.onSeek)fc.onclick=()=>opts.onSeek(n.frame);
    fc.title='フレーム '+n.frame;
    m.appendChild(fc);
  }
  if(n.drawing&&n.drawing.length)m.appendChild(el('span','frame-chip','✎ 描画'));
  const acts=el('span','note-acts');
  const ed=el('button','na','✎ 編集');
  const del=el('button','na','✕');del.title='削除';
  acts.appendChild(ed);acts.appendChild(del);m.appendChild(acts);
  const t=el('div','t',n.text);
  note.appendChild(m);note.appendChild(t);
  ed.onclick=()=>{
    if(note.querySelector('textarea'))return;
    const ta=el('textarea','fb-edit-ta');ta.value=n.text;
    const row=el('div','edit-row');
    const save=el('button','btn btn-primary btn-sm','保存');
    const cancel=el('button','btn btn-ghost btn-sm','キャンセル');
    save.onclick=async()=>{const txt=ta.value.trim();if(!txt)return;n.text=txt;n.edited=true;if(opts.refresh)await opts.refresh()};
    cancel.onclick=()=>{ta.remove();row.remove();t.style.display=''};
    t.style.display='none';
    note.appendChild(ta);note.appendChild(row);row.appendChild(save);row.appendChild(cancel);
    ta.focus();
  };
  del.onclick=async()=>{if(!confirm('コメントを削除しますか？'))return;v.review.notes=v.review.notes.filter(x=>x!==n);if(opts.refresh)await opts.refresh()};
  return note;
}

function logItem(node,v){
  const it=el('div','log-item');
  // 大型メディア（動画はインライン再生可・画像はそのまま表示）
  const media=el('div','log-media');
  if(v.type==='video'){
    const vid=el('video');vid.dataset.vref=v.file;if(v.thumb)vid.dataset.poster=v.thumb;
    vid.controls=true;vid.preload='metadata';vid.playsInline=true;
    media.appendChild(vid);
  }else{
    const img=el('img');img.dataset.ref=v.file;img.alt=v.name;
    img.style.cursor='zoom-in';img.onclick=()=>openReview(node.id,v.id);
    media.appendChild(img);
  }
  const openBtn=el('button','log-open','⤢');openBtn.title='FB画面を開く（アノテーション・フレームコメント）';
  openBtn.onclick=e=>{e.stopPropagation();openReview(node.id,v.id)};
  media.appendChild(openBtn);
  it.appendChild(media);
  // ヘッダ行：バージョン名・判定・メタ・詳細ボタン

  head.appendChild(title);
  head.appendChild(el('span','log-meta','by '+(v.uploadedBy||'-')+'・'+fmt(v.uploadedAt)));
  if(v.type==='video'){const rb=el('button','btn btn-ghost btn-sm','🎞');rb.title='REEL に送る';rb.onclick=()=>sendToReel(node,v);head.appendChild(rb)}
  const detail=el('button','btn btn-ghost btn-sm','チェック / 詳細');detail.onclick=()=>openReview(node.id,v.id);head.appendChild(detail);
  it.appendChild(head);
  // コメント全文（改行込み）をタイルの下に表示（編集・削除可）
  // フレーム順モードではフレーム番号順にソートし、Fチップでタイル内動画がジャンプ
  const notes=el('div','log-notes');
  if(!v.review.notes.length)notes.appendChild(el('div','log-empty-note','コメントはまだありません。'));
  const refresh=async()=>{await persist();renderBody();resolveThumbs()};
  const seekInline=v.type==='video'?f=>{const vd=media.querySelector('video');if(vd){vd.pause();vd.currentTime=f/(v.fps||24)+0.0001}}:null;
  let arr=[...v.review.notes];
  if(state.frameOrder)arr.sort((a,b)=>((a.frame??1e9)-(b.frame??1e9))||String(a.time).localeCompare(String(b.time)));
  for(const n of arr)notes.appendChild(noteBlock(v,n,{refresh,onSeek:seekInline}));
  it.appendChild(notes);
  // インラインのコメント入力（Shift+Enterで改行、Enterで送信）
  const iw=el('div','log-note-input');
  const ta=el('textarea');ta.placeholder='コメントを書く…（Shift+Enterで改行）';
  const sb=el('button','btn btn-primary btn-sm','送信');
  const send=async()=>{const txt=ta.value.trim();if(!txt)return;v.review.notes.push({author:currentUser(),text:txt,time:nowIso()});await persist();renderBody();resolveThumbs()};
  sb.onclick=send;
  ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};
  iw.appendChild(ta);iw.appendChild(sb);
  it.appendChild(iw);
  return it;
}

async function resolveThumbs(){
  for(const img of document.querySelectorAll('#scroll img[data-ref],#scroll .log-thumb[data-ref]')){const ref=img.dataset.ref;const url=await storage.getURL(ref);if(url){if(img.tagName==='IMG')img.src=url;else img.style.backgroundImage='url("'+url+'")'}}
  for(const v of document.querySelectorAll('#scroll video[data-vref]')){if(v.dataset.poster){const p=await storage.getURL(v.dataset.poster);if(p)v.poster=p}const src=await storage.getURL(v.dataset.vref);if(src&&v.src!==src)v.src=src}
}

/* 削除（子孫・メディアも） */
async function deleteNode(node){
  const desc=descendants(node.id);const cnt=desc.length;
  if(!confirm('「'+node.name+'」'+(cnt?('と配下の'+cnt+'項目'):'')+'を削除しますか？（動画も削除されます）'))return;
  const all=[node,...desc];
  for(const n of all)for(const v of n.versions||[]){await storage.delMedia(v.file);await storage.delMedia(v.thumb)}
  const ids=new Set(all.map(n=>n.id));
  DB.nodes=DB.nodes.filter(n=>!ids.has(n.id));
  await persist();
  const parent=node.parentId;go(getNode(parent)?parent:null);
}

   アップロード / レビュー
   ============================================================ */
async function uploadVersion(node,file,ui){
  ui.prog.classList.remove('hidden');ui.pct.textContent='サムネイル生成中...';ui.bi.style.width='30%';
  const isVideo=file.type.startsWith('video/');
  try{
    const thumbDataUrl=await genThumb(file);ui.pct.textContent='保存中...';ui.bi.style.width='60%';
    const ext=(file.name.match(/\.[^.]+$/)||[''])[0];const id=newId('media');
    const mediaRef=await storage.putMedia('media',id+ext,file);
    let thumbRef=null;if(thumbDataUrl){const blob=await(await fetch(thumbDataUrl)).blob();thumbRef=await storage.putMedia('thumbnails',id+'.jpg',blob)}else if(!isVideo)thumbRef=mediaRef;
    const version={id:newId('ver'),name:'v'+String(node.versions.length+1).padStart(2,'0'),type:isVideo?'video':'image',file:mediaRef,thumb:thumbRef,uploadedBy:currentUser(),uploadedAt:nowIso(),review:{status:'pending',notes:[]}};
    node.versions.push(version);if(thumbRef)node.thumbnail=thumbRef;
    await persist();ui.bi.style.width='100%';render();resolveThumbs();toast('アップロード完了: '+version.name);
  }catch(e){ui.prog.classList.add('hidden');toast('アップロード失敗: '+e.message)}
}
function genThumb(file){return new Promise(resolve=>{const isVideo=file.type.startsWith('video/');const url=URL.createObjectURL(file);const done=cv=>{URL.revokeObjectURL(url);resolve(cv?cv.toDataURL('image/jpeg',0.72):null)};const draw=(src,w,h)=>{const scale=Math.min(1,640/w);const cv=document.createElement('canvas');cv.width=Math.round(w*scale);cv.height=Math.round(h*scale);cv.getContext('2d').drawImage(src,0,0,cv.width,cv.height);return cv};if(isVideo){const vid=document.createElement('video');vid.preload='metadata';vid.muted=true;vid.src=url;vid.onloadeddata=()=>{try{vid.currentTime=Math.min(1,(vid.duration||2)/2)}catch(_){}}; vid.onseeked=()=>{try{done(draw(vid,vid.videoWidth,vid.videoHeight))}catch(_){done(null)}};vid.onerror=()=>done(null)}else{const img=new Image();img.onload=()=>done(draw(img,img.naturalWidth,img.naturalHeight));img.onerror=()=>done(null);img.src=url}})}

/* ============================================================
   FB画面（シンクスケッチ風）
   アノテーション描画 / フレーム単位スクラブ / フレーム紐付きコメント
   ============================================================ */
function openReview(nodeId,versionId){
  const node=getNode(nodeId);const v=node.versions.find(x=>x.id===versionId);
  const isVideo=v.type==='video';
  const old=$('#fbOverlay');if(old)old.remove();
  const ov=el('div','fb-overlay');ov.id='fbOverlay';

  let FPS=v.fps||24,totalFrames=1,lastFrame=-1;
  let drawMode=false,pending=[],stroke=null;

  function close(){document.removeEventListener('keydown',onKey);ov.remove();render();resolveThumbs()}

  /* --- トップバー --- */
  const top=el('div','fb-top');
  const back=el('button','btn btn-ghost btn-sm','← 戻る');back.onclick=close;top.appendChild(back);
  const tt=el('div','fb-title',node.name+' — '+v.name);top.appendChild(tt);
  const stEl=el('span');function updSt(){const st=STATUS[v.review.status];stEl.className='badge badge-'+st.cls;stEl.textContent=st.label}updSt();
  top.appendChild(stEl);
  top.appendChild(el('span','log-meta','by '+(v.uploadedBy||'-')+'・'+fmt(v.uploadedAt)));
  top.appendChild(el('div','spacer'));
  const mk=(l,c,s)=>{const b=el('button','btn '+c+' btn-sm',l);b.onclick=async()=>{v.review.status=s;await persist();updSt()};return b};
  top.appendChild(mk('OK','ok','approved'));top.appendChild(mk('リテイク','retake','retake'));
  top.appendChild(mk('NG','reject','rejected'));top.appendChild(mk('保留','btn-ghost','pending'));
  if(isVideo){const rb=el('button','btn btn-ghost btn-sm','🎞');rb.title='REEL に送る';rb.onclick=()=>sendToReel(node,v);top.appendChild(rb)}
  const delBtn=el('button','btn btn-danger btn-sm','🗑');delBtn.title='このバージョンを削除';
  delBtn.onclick=async()=>{if(!confirm(v.name+' を削除しますか？'))return;await storage.delMedia(v.file);await storage.delMedia(v.thumb);node.versions=node.versions.filter(x=>x.id!==v.id);node.thumbnail=node.versions.length?node.versions[node.versions.length-1].thumb:null;await persist();close()};
  top.appendChild(delBtn);
  const x=el('button','modal-close','×');x.onclick=close;top.appendChild(x);
  ov.appendChild(top);

  /* --- ステージ（メディア + 描画キャンバス） --- */
  const body=el('div','fb-body');
  const stage=el('div','fb-stage');
  const wrap=el('div','fb-media-wrap');
  const media=isVideo?el('video'):el('img');
  if(isVideo){media.playsInline=true;media.preload='auto'}
  wrap.appendChild(media);
  const trace=el('div','fb-trace');wrap.appendChild(trace); // トラッキングペーパー（白レイヤー）
  const canvas=el('canvas','fb-canvas');canvas.style.pointerEvents='none';wrap.appendChild(canvas);
  stage.appendChild(wrap);

  /* --- タイムライン（フレーム目盛り・シンクスケッチ風） --- */
  const tlWrap=el('div','fb-tl-wrap');
  const tl=el('canvas','fb-timeline');tlWrap.appendChild(tl);
  if(isVideo)stage.appendChild(tlWrap);

  /* --- コントロールバー --- */
  const ctr=el('div','fb-controls');
  const playBtn=el('button','btn btn-ghost btn-sm','▶');
  const prevBtn=el('button','btn btn-ghost btn-sm','−1F');
  const nextBtn=el('button','btn btn-ghost btn-sm','+1F');
  const frameLab=el('span','fb-frame','F 0 / 0');
  const fpsSel=el('select');[12,24,25,30,60].forEach(n=>fpsSel.appendChild(new Option(n+' fps',n)));fpsSel.value=String(FPS);
  const drawBtn=el('button','btn btn-ghost btn-sm tool','✎ 描画');
  const colorIn=el('input');colorIn.type='color';colorIn.value='#ff4d4d';colorIn.title='カスタム色';
  /* ブラシカラープリセット */
  const clrRow=el('span','clr-row');
  ['#ff4d4d','#ff9f2e','#ffe34d','#4dff88','#4da6ff','#ffffff','#111111'].forEach((c,i)=>{
    const b=el('button','clr-chip'+(i===0?' sel':''));b.style.background=c;b.title=c;
    b.onclick=()=>{colorIn.value=c;for(const x of clrRow.children)x.classList.remove('sel');b.classList.add('sel')};
    clrRow.appendChild(b);
  });
  colorIn.oninput=()=>{for(const x of clrRow.children)x.classList.remove('sel')};
  const durSel=el('select');[[1,'1F'],[2,'2F'],[3,'3F'],[5,'5F'],[10,'10F'],[9999,'持続']].forEach(([val,l])=>durSel.appendChild(new Option('表示 '+l,val)));
  durSel.title='アノテーションを表示し続けるフレーム数';
  const ghostBtn=el('button','btn btn-ghost btn-sm tool','ゴースト');ghostBtn.title='前後フレームのアノテーションを半透明表示';
  const eyeBtn=el('button','btn btn-ghost btn-sm tool active','👁');eyeBtn.title='アノテーションの表示/非表示';
  const traceBtn=el('button','btn btn-ghost btn-sm','トレペ 0%');traceBtn.title='白レイヤー（トラッキングペーパー）の濃さを25%ずつ切替';
  /* レイヤー L1〜L5（クリック=選択 / 選択中を再クリック=表示切替） */
  const layerRow=el('span','layer-row');layerRow.title='レイヤー：クリックで選択、選択中をもう一度クリックで表示/非表示';
  const undoBtn=el('button','btn btn-ghost btn-sm','↩');undoBtn.title='直前の線を取り消し';
  const clearBtn=el('button','btn btn-ghost btn-sm','クリア');clearBtn.title='未送信の描画を消す';
  if(isVideo){ctr.appendChild(playBtn);ctr.appendChild(prevBtn);ctr.appendChild(nextBtn);ctr.appendChild(frameLab);ctr.appendChild(fpsSel)}
  ctr.appendChild(drawBtn);ctr.appendChild(clrRow);ctr.appendChild(colorIn);
  if(isVideo){ctr.appendChild(durSel);ctr.appendChild(ghostBtn)}
  ctr.appendChild(eyeBtn);ctr.appendChild(traceBtn);ctr.appendChild(layerRow);
  ctr.appendChild(undoBtn);ctr.appendChild(clearBtn);
  stage.appendChild(ctr);
  body.appendChild(stage);

  /* --- サイドパネル（コメント） --- */
  const side=el('div','fb-side');
  side.appendChild(el('div','fb-side-head','コメント / FB'));
  const list=el('div','fb-notes');side.appendChild(list);
  const iw=el('div','fb-input');
  const ta=el('textarea');ta.placeholder=isVideo?'このフレームにコメント…（Shift+Enterで改行）':'コメント…（Shift+Enterで改行）';
  const sb=el('button','btn btn-primary btn-sm','送信');
  iw.appendChild(ta);iw.appendChild(sb);side.appendChild(iw);
  body.appendChild(side);
  ov.appendChild(body);
  document.body.appendChild(ov);

  /* --- フレーム制御（リアルタイムスクラブ対応） --- */
  const curFrame=()=>isVideo?Math.min(totalFrames-1,Math.max(0,Math.round(media.currentTime*FPS))):null;
  let scrubbing=false,scrubTarget=-1,seekBusy=false,seekPend=-1;
  const dispFrame=()=>scrubbing&&scrubTarget>=0?scrubTarget:(curFrame()||0);
  function fmtFrame(){frameLab.textContent='F '+dispFrame()+' / '+(totalFrames-1)}
  let seekGuard=0;
  function seekRT(f){
    f=Math.max(0,Math.min(f,totalFrames-1));
    const t=f/FPS+0.0001;
    if(Math.abs(media.currentTime-t)<0.0005){refreshView();return} // 同一時刻はスキップ（seeked不発でも詰まらない）
    if(seekBusy){seekPend=f;return}
    seekBusy=true;
    clearTimeout(seekGuard);
    /* seeked が発火しない環境/ケースでも 300ms で自動復帰 */
    seekGuard=setTimeout(()=>{seekBusy=false;if(seekPend>=0){const p=seekPend;seekPend=-1;seekRT(p)}},300);
    if(scrubbing&&typeof media.fastSeek==='function'){try{media.fastSeek(t)}catch(_){media.currentTime=t}}
    else media.currentTime=t;
  }
  function seekFrame(f){if(!isVideo)return;media.pause();seekRT(f)}
  function setupDuration(){totalFrames=Math.max(1,Math.round((media.duration||0)*FPS));fmtFrame();drawTimeline()}
  /* 1F境界へのスナップ：停止・シーク後は必ずフレームぴったりの時刻に合わせる */
  function snapToFrame(){
    if(!isVideo||scrubbing||!media.paused)return;
    const f=Math.min(totalFrames-1,Math.max(0,Math.round(media.currentTime*FPS)));
    if(Math.abs(media.currentTime-(f/FPS+0.0001))>(0.02/FPS))seekRT(f);
  }
  if(isVideo){
    media.addEventListener('loadedmetadata',()=>{setupDuration();fit();sync(true)});
    media.addEventListener('seeked',()=>{clearTimeout(seekGuard);seekBusy=false;if(seekPend>=0){const p=seekPend;seekPend=-1;seekRT(p)}else snapToFrame()});
    playBtn.onclick=()=>{if(media.paused)media.play();else media.pause()};
    media.addEventListener('play',()=>{playBtn.textContent='⏸'});
    media.addEventListener('pause',()=>{playBtn.textContent='▶';snapToFrame()});
    prevBtn.onclick=()=>seekFrame(dispFrame()-1);
    nextBtn.onclick=()=>seekFrame(dispFrame()+1);
    fpsSel.onchange=async()=>{FPS=parseInt(fpsSel.value);v.fps=FPS;await persist();setupDuration();sync(true)};
    /* タイムラインでのスクラブ（押下即シーク・ドラッグ追従） */
    const frameFromX=e=>{const r=tl.getBoundingClientRect();return Math.max(0,Math.min(totalFrames-1,Math.floor((e.clientX-r.left)/r.width*totalFrames)))};
    tl.onpointerdown=e=>{scrubbing=true;tl.setPointerCapture(e.pointerId);media.pause();scrubTarget=frameFromX(e);seekRT(scrubTarget);refreshView()};
    tl.onpointermove=e=>{if(!scrubbing)return;const f=frameFromX(e);if(f!==scrubTarget){scrubTarget=f;seekRT(f);refreshView()}};
    tl.onpointerup=()=>{const f=scrubTarget;scrubbing=false;scrubTarget=-1;if(f>=0)seekRT(f);refreshView()}; // 離した位置へ精密シーク（1Fスナップ）
  }else{
    media.addEventListener('load',()=>{fit();drawAll()});
  }

  /* --- タイムライン描画（フレーム目盛り・コメントマーカー・プレイヘッド） --- */
  function drawTimeline(){
    if(!isVideo||!tl.width)return;
    const W=tl.width,H=tl.height,ctx=tl.getContext('2d');
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#141416';ctx.fillRect(0,0,W,H);
    const fw=W/totalFrames;
    /* 毎フレームの目盛り */
    if(fw>=2.5){
      ctx.strokeStyle='rgba(255,255,255,.12)';ctx.beginPath();
      for(let f=0;f<totalFrames;f++){const x=Math.round(f*fw)+.5;ctx.moveTo(x,H-11);ctx.lineTo(x,H)}
      ctx.stroke();
    }
    /* 秒目盛り（FPSごと）＋フレーム番号 */
    let step=FPS;while(step*fw<46)step*=2;
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='9px monospace';ctx.beginPath();
    for(let f=0;f<totalFrames;f+=step){const x=Math.round(f*fw)+.5;ctx.moveTo(x,H-18);ctx.lineTo(x,H);ctx.fillText(String(f),x+3,H-20)}
    ctx.stroke();
    /* マーカー：アノテ＝下レイヤー（オレンジのバー）、コメント＝上レイヤー（赤の菱形） */
    for(const n of v.review.notes){
      if(n.frame==null||!(n.drawing&&n.drawing.length))continue;
      ctx.fillStyle='#e08a4a';ctx.fillRect(n.frame*fw,2,Math.max(3,fw*(parseInt(n.dur)||1)),7);
    }
    /* 未送信の描画のプレビューマーカー（半透明オレンジ） */
    const pdur=parseInt(durSel.value)||1;
    ctx.fillStyle='rgba(224,138,74,.5)';
    for(const p of pending)if(p.f!=null)ctx.fillRect(p.f*fw,2,Math.max(3,fw*pdur),7);
    /* コメント＝赤の菱形（最前面レイヤー） */
    for(const n of v.review.notes){
      if(n.frame==null||(n.drawing&&n.drawing.length))continue;
      const cx=n.frame*fw+fw/2;
      ctx.fillStyle='#ff5a5a';
      ctx.beginPath();ctx.moveTo(cx,2);ctx.lineTo(cx+5,7);ctx.lineTo(cx,12);ctx.lineTo(cx-5,7);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1;ctx.stroke();
    }
    /* プレイヘッド */
    const f=dispFrame();const x=f*fw+fw/2;
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.fillRect(x-1,0,2,H);
    const lab='F'+f;ctx.font='10px monospace';const tw=ctx.measureText(lab).width+8;
    const bx=Math.min(W-tw,Math.max(0,x-tw/2));
    ctx.fillStyle='#e8e8ec';ctx.fillRect(bx,H-13,tw,13);
    ctx.fillStyle='#16161a';ctx.fillText(lab,bx+4,H-3);
  }
  function refreshView(){fmtFrame();drawAll();drawTimeline()}

  /* --- キャンバス（メディア表示域にフィット） --- */
  function fit(){
    const r=wrap.getBoundingClientRect();
    const w=isVideo?media.videoWidth:media.naturalWidth;
    const h=isVideo?media.videoHeight:media.naturalHeight;
    if(!w||!h||!r.width)return;
    const s=Math.min(r.width/w,r.height/h);
    const cw=Math.max(1,Math.round(w*s)),ch=Math.max(1,Math.round(h*s));
    canvas.width=cw;canvas.height=ch;
    canvas.style.left=Math.round((r.width-cw)/2)+'px';
    canvas.style.top=Math.round((r.height-ch)/2)+'px';
    trace.style.left=canvas.style.left;trace.style.top=canvas.style.top;
    trace.style.width=cw+'px';trace.style.height=ch+'px';
    if(isVideo){const tw=tlWrap.clientWidth-24;if(tw>0){tl.width=tw;tl.height=46}}
    drawAll();drawTimeline();
  }
  window.addEventListener('resize',fit);
  new ResizeObserver(fit).observe(wrap);

  /* --- アノテーション描画（表示フレーム数・ゴースト・レイヤー・トレペ対応） --- */
  let ghostOn=false,annotVisible=true,traceOp=0,activeLayer=1;
  const layerVis=[true,true,true,true,true];
  const GHOST_RANGE=3;
  const durOf=n=>{const d=parseInt(n.dur);return isNaN(d)?1:d};
  const visibleAt=(n,f)=>!isVideo||(n.frame!=null&&f>=n.frame&&f<n.frame+durOf(n));
  const layerOn=s=>layerVis[((s.layer||1)-1)];
  /* レイヤーチップ */
  function redrawLayers(){[...layerRow.children].forEach((c,i)=>{c.classList.toggle('act',activeLayer===i+1);c.classList.toggle('off',!layerVis[i])})}
  for(let i=1;i<=5;i++){
    const c=el('button','layer-chip',String(i));
    c.onclick=()=>{if(activeLayer===i)layerVis[i-1]=!layerVis[i-1];else activeLayer=i;redrawLayers();drawAll()};
    layerRow.appendChild(c);
  }
  redrawLayers();
  eyeBtn.onclick=()=>{annotVisible=!annotVisible;eyeBtn.classList.toggle('active',annotVisible);eyeBtn.textContent=annotVisible?'👁':'—';drawAll()};
  traceBtn.onclick=()=>{traceOp=(traceOp+25)%125;trace.style.opacity=traceOp/100;traceBtn.textContent='トレペ '+traceOp+'%'};
  function paintStrokes(ctx,list,alpha){
    ctx.globalAlpha=alpha;
    for(const st of list){
      if(!st.points||st.points.length<2)continue;
      ctx.strokeStyle=st.color||'#ff4d4d';ctx.lineWidth=Math.max(2,canvas.width*0.004);ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(st.points[0][0]*canvas.width,st.points[0][1]*canvas.height);
      for(let i=1;i<st.points.length;i++)ctx.lineTo(st.points[i][0]*canvas.width,st.points[i][1]*canvas.height);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
  function drawAll(){
    const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);
    const f=dispFrame();
    if(annotVisible){
      /* ゴースト：前後フレームのアノテーションを薄く表示 */
      if(ghostOn&&isVideo){
        for(const n of v.review.notes){
          if(!n.drawing||!n.drawing.length||n.frame==null)continue;
          if(visibleAt(n,f))continue;
          const d=Math.min(Math.abs(n.frame-f),Math.abs(n.frame+durOf(n)-1-f));
          if(d<=GHOST_RANGE)paintStrokes(ctx,n.drawing.filter(layerOn),0.3-d*0.07);
        }
      }
      /* 現在フレームのアノテーション */
      for(const n of v.review.notes)if(n.drawing&&n.drawing.length&&visibleAt(n,f))paintStrokes(ctx,n.drawing.filter(layerOn),1);
    }
    /* 未送信の描画（描いたフレームから、選択中の表示F数のあいだ表示） */
    const pdur=parseInt(durSel.value)||1;
    const inWin=p=>!isVideo||(p.f!=null&&f>=p.f&&f<p.f+pdur);
    const pend=pending.filter(p=>inWin(p)&&layerOn(p));
    if(stroke&&inWin(stroke)&&layerOn(stroke))pend.push(stroke);
    paintStrokes(ctx,pend,1);
  }
  durSel.onchange=()=>{drawAll();drawTimeline()};
  ghostBtn.onclick=()=>{ghostOn=!ghostOn;ghostBtn.classList.toggle('active',ghostOn);drawAll()};
  const pt=e=>{const r=canvas.getBoundingClientRect();return[(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height]};
  drawBtn.onclick=()=>{drawMode=!drawMode;drawBtn.classList.toggle('active',drawMode);canvas.style.pointerEvents=drawMode?'auto':'none';if(drawMode&&isVideo)media.pause()};
  canvas.onpointerdown=e=>{if(!drawMode)return;canvas.setPointerCapture(e.pointerId);stroke={color:colorIn.value,points:[pt(e)],f:dispFrame(),layer:activeLayer}};
  canvas.onpointermove=e=>{if(stroke){stroke.points.push(pt(e));drawAll()}};
  canvas.onpointerup=()=>{if(stroke){pending.push(stroke);stroke=null;drawAll()}};
  undoBtn.onclick=()=>{pending.pop();drawAll()};
  clearBtn.onclick=()=>{pending=[];stroke=null;drawAll()};

  /* --- 再生同期（フレーム表示・そのフレームの描画・タイムライン） --- */
  function sync(force){
    if(!document.getElementById('fbOverlay'))return;
    if(isVideo){
      const f=dispFrame();
      if(f!==lastFrame||force){lastFrame=f;refreshView()}
      requestAnimationFrame(()=>sync(false));
    }else drawAll();
  }
  if(isVideo)requestAnimationFrame(()=>sync(true));

  /* --- コメント --- */
  function renderNotes(){
    list.innerHTML='';
    if(!v.review.notes.length)list.appendChild(el('div','log-empty-note','コメントはまだありません。'));
    const refresh=async()=>{await persist();renderNotes();drawAll();drawTimeline()};
    for(const n of v.review.notes)list.appendChild(noteBlock(v,n,{refresh,onSeek:isVideo?seekFrame:null}));
    list.scrollTop=list.scrollHeight;
  }
  renderNotes();
  const send=async()=>{
    const txt=ta.value.trim();
    if(!txt&&!pending.length)return;
    const n={author:currentUser(),text:txt||'（描画のみ）',time:nowIso()};
    if(isVideo)n.frame=dispFrame();
    if(pending.length){
      /* 描画は「描いたフレーム」に紐づける */
      if(isVideo&&pending[0].f!=null)n.frame=pending[0].f;
      n.drawing=pending.map(p=>({color:p.color,points:p.points,layer:p.layer||1}));
      n.dur=parseInt(durSel.value)||1;
    }
    v.review.notes.push(n);pending=[];stroke=null;
    await persist();ta.value='';renderNotes();drawAll();drawTimeline();
  };
  sb.onclick=send;
  ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};

  /* --- キーボード --- */
  function onKey(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    if(e.key==='Escape')close();
    else if(isVideo&&e.key==='ArrowLeft'){e.preventDefault();seekFrame(dispFrame()-1)}
    else if(isVideo&&e.key==='ArrowRight'){e.preventDefault();seekFrame(dispFrame()+1)}
    else if(isVideo&&e.key===' '){e.preventDefault();playBtn.onclick()}
  }
  document.addEventListener('keydown',onKey);

  /* --- メディア読み込み --- */
  (async()=>{const url=await storage.getURL(v.file);if(url)media.src=url;setTimeout(fit,60)})();
}

/* ============================================================
   REEL — シーケンスプレイヤー（別ウィンドウ）
   メインから動画を送り、タイムラインに並べて順番に再生する。
   ============================================================ */
let reelWin=null;const reelUI={clips:[],cur:0,loop:false,raf:0,pxs:30};
function reelAlive(){return reelWin&&!reelWin.closed&&reelUI.video}
function ce(d,t,c,x){const e=d.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e}
function fmtSec(s){s=Math.max(0,s||0);const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0')}

function openReel(){
  if(reelAlive()){reelWin.focus();return}
  reelWin=window.open('','layna_reel','width=1140,height=780');
  if(!reelWin){toast('ポップアップがブロックされました。許可してください');return}
  const d=reelWin.document;
  d.open();d.write('<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>Layna REEL</title></head><body></body></html>');d.close();
  const st=d.createElement('style');
  st.textContent='*{margin:0;padding:0;box-sizing:border-box}body{background:#0d0d0f;color:#e8e8ec;font-family:system-ui,"Noto Sans JP",sans-serif;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}'
   +'.hd{display:flex;align-items:center;gap:12px;padding:9px 14px;background:#141416;border-bottom:1px solid #2a2a2f}'
   +'.hd .logo{font-weight:700;font-size:16px;letter-spacing:1px}.hd .logo b{color:#e8e8ec;opacity:.6}.hd .sub{color:#5a5a6a;font-size:11px}.hd .sp{flex:1}'
   +'.btn{background:none;border:1px solid #2a2a2f;color:#9a9aaa;border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit}'
   +'.btn:hover{border-color:#3a3a42;color:#e8e8ec}.btn.on{background:#ececf0;color:#16161a;border-color:#ececf0}'
   +'.stage{flex:1;display:flex;align-items:center;justify-content:center;background:#000;min-height:0;position:relative}'
   +'.stage video{max-width:100%;max-height:100%}'
   +'.stage .empty{color:#5a5a6a;text-align:center;line-height:1.9}'
   +'.ctr{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#141416;border-top:1px solid #2a2a2f}'
   +'.ctr .time{font-family:monospace;font-size:12px;color:#9a9aaa;min-width:110px}'
   +'.tlwrap{background:#141416;border-top:1px solid #2a2a2f;padding:8px 14px 12px;overflow-x:auto;flex-shrink:0}'
   +'.ruler{position:relative;height:18px;margin-bottom:4px}'
   +'.track{display:flex;gap:2px;position:relative;min-height:64px}'
   +'.clip{position:relative;flex-shrink:0;background:#1c1c1f;border:1px solid #3a3a42;border-radius:6px;padding:6px 8px;cursor:pointer;overflow:hidden;min-width:78px}'
   +'.clip.cur{border-color:#e8e8ec;background:#232327}'
   +'.clip .nm{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}'
   +'.clip .du{font-family:monospace;font-size:10px;color:#5a5a6a}'
   +'.clip .ops{position:absolute;top:3px;right:4px;display:flex;gap:2px;opacity:0}'
   +'.clip:hover .ops{opacity:1}'
   +'.clip .ops button{background:rgba(0,0,0,.6);border:none;color:#e8e8ec;border-radius:4px;font-size:10px;padding:2px 5px;cursor:pointer}'
   +'.ph{position:absolute;top:0;bottom:0;width:2px;background:#fff;pointer-events:none;z-index:5}';
  d.head.appendChild(st);
  /* ヘッダ */
  const hd=ce(d,'div','hd');
  const lg=ce(d,'div','logo');lg.innerHTML='🎞 REEL <b>/ Layna</b>';hd.appendChild(lg);
  hd.appendChild(ce(d,'span','sub','シーケンスプレイヤー — メインから動画を送って並べる'));
  hd.appendChild(ce(d,'div','sp'));
  const totalLab=ce(d,'span','sub','計 0:00');hd.appendChild(totalLab);
  const loopBtn=ce(d,'button','btn','ループ');hd.appendChild(loopBtn);
  const clearBtn=ce(d,'button','btn','全クリア');hd.appendChild(clearBtn);
  d.body.appendChild(hd);
  /* プレビュー */
  const stage=ce(d,'div','stage');
  const video=ce(d,'video');video.controls=false;video.playsInline=true;stage.appendChild(video);
  const empty=ce(d,'div','empty');empty.innerHTML='クリップがありません。<br>メインウィンドウの各動画の 🎞 ボタンで送ってください。';stage.appendChild(empty);
  d.body.appendChild(stage);
  /* コントロール */
  const ctr=ce(d,'div','ctr');
  const prev=ce(d,'button','btn','⏮');const play=ce(d,'button','btn','▶ 再生');const next=ce(d,'button','btn','⏭');
  const time=ce(d,'span','time','0:00 / 0:00');
  ctr.appendChild(prev);ctr.appendChild(play);ctr.appendChild(next);ctr.appendChild(time);
  d.body.appendChild(ctr);
  /* タイムライン */
  const tlwrap=ce(d,'div','tlwrap');
  const ruler=ce(d,'canvas','ruler');const track=ce(d,'div','track');
  const ph=ce(d,'div','ph');track.appendChild(ph);
  tlwrap.appendChild(ruler);tlwrap.appendChild(track);
  d.body.appendChild(tlwrap);
  Object.assign(reelUI,{d,video,empty,track,ruler,ph,play,time,totalLab,loopBtn,clearBtn,cur:0});
  /* 再生ロジック */
  const cs=()=>reelUI.clips;
  const sumPrev=i=>cs().slice(0,i).reduce((a,c)=>a+(c.dur||0),0);
  const total=()=>cs().reduce((a,c)=>a+(c.dur||0),0);
  function loadCur(auto){
    const c=cs()[reelUI.cur];
    if(!c){video.removeAttribute('src');video.load();reelRender();return}
    video.src=c.url;if(auto)video.play().catch(()=>{});
    reelRender();
  }
  reelUI.loadCur=loadCur;
  play.onclick=()=>{if(!cs().length)return;if(video.paused){if(!video.src)loadCur(false);video.play().catch(()=>{})}else video.pause()};
  prev.onclick=()=>{if(!cs().length)return;reelUI.cur=Math.max(0,reelUI.cur-1);loadCur(true)};
  next.onclick=()=>{if(!cs().length)return;reelUI.cur=Math.min(cs().length-1,reelUI.cur+1);loadCur(true)};
  loopBtn.onclick=()=>{reelUI.loop=!reelUI.loop;loopBtn.classList.toggle('on',reelUI.loop)};
  clearBtn.onclick=()=>{if(!reelWin.confirm('すべてのクリップを外しますか？'))return;reelUI.clips=[];reelUI.cur=0;video.pause();video.removeAttribute('src');video.load();reelRender()};
  video.addEventListener('play',()=>{play.textContent='⏸ 停止'});
  video.addEventListener('pause',()=>{play.textContent='▶ 再生'});
  video.addEventListener('ended',()=>{
    if(reelUI.cur<cs().length-1){reelUI.cur++;loadCur(true)}
    else if(reelUI.loop&&cs().length){reelUI.cur=0;loadCur(true)}
  });
  /* プレイヘッド更新 */
  (function tick(){
    if(!reelAlive())return;
    const el=sumPrev(reelUI.cur)+(video.currentTime||0);
    ph.style.left=(el*reelUI.pxs)+'px';
    time.textContent=fmtSec(el)+' / '+fmtSec(total());
    reelUI.raf=reelWin.requestAnimationFrame(tick);
  })();
  reelRender();
}

function reelRender(){
  if(!reelAlive())return;
  const {d,track,ruler,ph,empty,totalLab}=reelUI;const cs=reelUI.clips;
  empty.style.display=cs.length?'none':'';
  /* クリップブロック（幅=尺に比例） */
  [...track.querySelectorAll('.clip')].forEach(n=>n.remove());
  cs.forEach((c,i)=>{
    const b=ce(d,'div','clip'+(i===reelUI.cur?' cur':''));
    b.style.width=Math.max(78,(c.dur||2)*reelUI.pxs)+'px';
    b.appendChild(ce(d,'div','nm',(i+1)+'. '+c.name));
    b.appendChild(ce(d,'div','du',fmtSec(c.dur)));
    const ops=ce(d,'div','ops');
    const mk=(lab,fn,tt)=>{const x=ce(d,'button',null,lab);x.title=tt;x.onclick=e=>{e.stopPropagation();fn()};ops.appendChild(x)};
    mk('◀',()=>{if(i>0){[cs[i-1],cs[i]]=[cs[i],cs[i-1]];if(reelUI.cur===i)reelUI.cur--;else if(reelUI.cur===i-1)reelUI.cur++;reelRender()}},'左へ');
    mk('▶',()=>{if(i<cs.length-1){[cs[i+1],cs[i]]=[cs[i],cs[i+1]];if(reelUI.cur===i)reelUI.cur++;else if(reelUI.cur===i+1)reelUI.cur--;reelRender()}},'右へ');
    mk('✕',()=>{cs.splice(i,1);if(reelUI.cur>=cs.length)reelUI.cur=Math.max(0,cs.length-1);reelUI.loadCur(false);reelRender()},'外す');
    b.appendChild(ops);
    b.onclick=()=>{reelUI.cur=i;reelUI.loadCur(true)};
    track.appendChild(b);
  });
  /* ルーラー（秒目盛り） */
  const total=cs.reduce((a,c)=>a+(c.dur||0),0);
  const W=Math.max(track.clientWidth,total*reelUI.pxs+40);
  ruler.width=W;ruler.height=18;
  const ctx=ruler.getContext('2d');ctx.clearRect(0,0,W,18);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='9px monospace';ctx.beginPath();
  for(let s=0;s<=Math.ceil(total)+1;s++){const x=s*reelUI.pxs+.5;ctx.moveTo(x,10);ctx.lineTo(x,18);if(s%5===0)ctx.fillText(fmtSec(s),x+2,8)}
  ctx.stroke();
  totalLab.textContent='計 '+fmtSec(total)+'・'+cs.length+'クリップ';
}

async function sendToReel(node,v){
  if(v.type!=='video'){toast('REEL に送れるのは動画のみです');return}
  const url=await storage.getURL(v.file);
  if(!url){toast('動画の読み込みに失敗しました');return}
  openReel();if(!reelAlive())return;
  const clip={name:node.name+' '+v.name,url,dur:0};
  reelUI.clips.push(clip);
  /* 尺の取得 */
  const probe=reelUI.d.createElement('video');probe.preload='metadata';probe.src=url;
  probe.onloadedmetadata=()=>{clip.dur=probe.duration||0;reelRender()};
  reelRender();toast('REEL に送りました: '+clip.name);
}

$('#homeBtn').onclick=()=>{if(storage.mode)go(null)};

async function startAppFlow(){
  let prev=null;try{prev=localStorage.getItem('layna_mode')}catch(_){}
  try{
    if(await storage.tryReconnect()){await boot();return}
    if(storage._pending){renderGate();return}
    if(prev==='idb'){storage.useIdb();await boot();return}
    renderGate();
  }catch(e){renderGate()}
}

/* ===== 認証（Googleログイン + git許可リスト access.json）===== */
let accessCfg=null,AUTH_ON=false;
function roleFor(email){
  if(!accessCfg||!email)return null;const e=email.toLowerCase();
  const has=arr=>(arr||[]).some(x=>String(x).toLowerCase()===e);
  if(has(accessCfg.operatorEmails))return 'operator';
  if(has(accessCfg.adminEmails))return 'admin';
  if(has(accessCfg.allowedEmails))return 'member';
  const dom=e.split('@')[1]||'';
  if((accessCfg.allowedDomains||[]).some(d=>String(d).toLowerCase().replace(/^@/,'')===dom))return 'member';
  return null;
}
function authScreen(build){chrome(false);let s=$('#authScreen');if(s)s.remove();s=el('div','gate');s.id='authScreen';const box=el('div','gate-box');build(box);s.appendChild(box);document.body.appendChild(s)}
function clearAuthScreen(){const s=$('#authScreen');if(s)s.remove()}
function renderAuthLoading(){authScreen(box=>{box.innerHTML='<div class="gate-logo">La<b>y</b>na</div><div class="spin"></div><div class="gate-sub">認証を確認しています…</div>'})}
function renderLogin(msg){authScreen(box=>{
  box.innerHTML='<div class="gate-logo">La<b>y</b>na</div>';
  box.appendChild(el('div','gate-sub','社内メンバー専用。Googleアカウントでログインしてください。'));
  const acts=el('div','gate-actions');const b=el('button','gbtn');b.innerHTML='<span class="gg">G</span> Google でログイン';
  b.onclick=async()=>{if(window.__laynaFB){try{await window.__laynaFB.login()}catch(e){toast('ログイン失敗: '+e.message)}}else toast('認証を初期化中です。数秒後に再試行してください。')};
  acts.appendChild(b);box.appendChild(acts);
  if(msg)box.appendChild(el('div','gate-note',msg));
})}
function renderDenied(user){authScreen(box=>{
  box.innerHTML='<div class="gate-logo">La<b>y</b>na</div>';
  box.appendChild(el('div','gate-sub','このアカウントにはアクセス権がありません。'));
  box.appendChild(el('div','deny-email','ログイン中: '+(user.email||'')));
  const acts=el('div','gate-actions');const b=el('button','btn btn-ghost','別のアカウントでログイン');b.onclick=async()=>{if(window.__laynaFB)await window.__laynaFB.logout()};acts.appendChild(b);box.appendChild(acts);
  box.appendChild(el('div','gate-note','管理者に access.json の allowedEmails への追加を依頼してください。'));
})}
function showAuthedHeader(){
  $('#nameField').classList.add('hidden');
  const bx=$('#authUserBox');bx.classList.remove('hidden');bx.innerHTML='';
  if(authUser.photo){const img=el('img','avatar');img.src=authUser.photo;img.referrerPolicy='no-referrer';bx.appendChild(img)}
  bx.appendChild(el('span',null,authUser.name+((authUser.role==='admin'||authUser.role==='operator')?'（管理者）':'')));
  const lo=el('span','lo','ログアウト');lo.onclick=async()=>{if(window.__laynaFB)await window.__laynaFB.logout()};bx.appendChild(lo);
}
async function onAuthChanged(u){
  if(!u){authUser=null;renderLogin();return}
  const role=roleFor(u.email);
  if(!role){authUser=null;renderDenied(u);return}
  authUser={name:u.displayName||u.email,email:u.email,photo:u.photoURL,role};
  clearAuthScreen();showAuthedHeader();startAppFlow();
}
async function initApp(){
  try{accessCfg=await (await fetch('./access.json',{cache:'no-store'})).json()}catch(_){accessCfg=null}
  AUTH_ON=!!(accessCfg&&accessCfg.authRequired)&&location.hostname==='ogshaw03.github.io';
  if(!AUTH_ON){startAppFlow();return}       // exe/ローカル/プレビューは自動的に認証オフ
  window.__laynaAuthChanged=onAuthChanged;
  renderAuthLoading();
  if(window.__laynaFBUser!==undefined)onAuthChanged(window.__laynaFBUser);
  setTimeout(()=>{if(AUTH_ON&&!authUser&&!window.__laynaFB)renderLogin('認証の初期化に時間がかかっています。ネットワークをご確認ください。')},6000);
}
initApp();
