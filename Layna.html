/* 比較相手の選択：REEL読み込みと同様のタイル表示＋検索。既定で現在の工程を展開しておく */
function openComparePicker(aNode,aVer,onPick){
  onPick=onPick||((bN,bV)=>openReview(aNode.id,aVer.id,{compare:{nodeId:bN.id,verId:bV.id}}));
  const root=rootOf(aNode);
  const revs=descendants(root.id).filter(n=>n.type==='review'&&n.versions.some(x=>x.type==='video'));
  const modal=el('div','subpick');const pk=el('div','pk');
  const pkh=el('div','pkh');pkh.appendChild(el('div',null,'比較する動画を選択'));const hsp=el('div');hsp.style.flex='1';pkh.appendChild(hsp);
  const search=el('input','cmp-search');search.type='text';search.placeholder='🔍 ショット・工程を検索';pkh.appendChild(search);
  const pkb=el('div','pkb');const list=el('div','cmp-grid');pkb.appendChild(list);
  /* ショット（工程の親セクション）でグループ化。ショットを開くと配下の工程タイルが下に出る */
  const curShotId=aNode.parentId; /* 比較元の工程が属するショット */
  const groups=[];const gmap=new Map();
  for(const n of revs){
    const sid=n.parentId;
    if(!gmap.has(sid)){const g={id:sid,shot:getNode(sid),revs:[]};gmap.set(sid,g);groups.push(g)}
    gmap.get(sid).revs.push(n);
  }
  groups.sort((a,b)=>(a.id===curShotId?-1:0)-(b.id===curShotId?-1:0)); /* 現在のショットを先頭に */
  const openSet=new Set([curShotId]); /* 既定で現在のショットを開いておく */
  const vidsOf=n=>n.versions.filter(x=>x.type==='video').slice().reverse();
  function taskMatch(n,q){return (n.name+' '+n.versions.map(v=>v.name).join(' ')).toLowerCase().includes(q)}
  function paint(){
    list.innerHTML='';const q=(search.value||'').trim().toLowerCase();let shown=0;
    for(const g of groups){
      const shotName=g.shot?g.shot.name:root.name;
      const path=g.shot?pathOf(g.shot.id).slice(1,-1).map(x=>x.name).join(' / '):'';
      const shotHit=shotName.toLowerCase().includes(q);
      const visRevs=(q&&!shotHit)?g.revs.filter(n=>taskMatch(n,q)):g.revs;
      if(q&&!shotHit&&!visRevs.length)continue;
      shown++;
      const isOpen=q?true:openSet.has(g.id); /* 検索中は該当を全て開く */
      const card=el('div','cmp-shot'+(isOpen?' open':''));
      const hd=el('div','cmp-shot-hd');
      const th=el('div','th');const lv=latestVideoVersionUnder(g.id);if(lv&&lv.v.thumb)storage.getURL(lv.v.thumb).then(u=>{if(u)th.style.backgroundImage='url("'+u+'")'});else th.appendChild(thumbPh());
      hd.appendChild(th);
      const info=el('div','info');if(path)info.appendChild(el('div','pth',path));info.appendChild(el('div','nm',shotName));info.appendChild(el('div','cnt',g.revs.length+' 工程'+(g.id===curShotId?'・比較元のショット':'')));
      hd.appendChild(info);
      hd.appendChild(el('span','cmp-caret',isOpen?'▾':'▸'));
      if(!q)hd.onclick=()=>{if(openSet.has(g.id))openSet.delete(g.id);else openSet.add(g.id);paint()};
      card.appendChild(hd);
      if(isOpen){
        const tasks=el('div','cmp-tasks');
        for(const n of visRevs){
          const vids=vidsOf(n);
          const task=el('div','cmp-task');
          const tnm=el('div','tnm',n.name);task.appendChild(tnm);
          if(vids.length<=1){
            const only=vids[0];const self=(n.id===aNode.id&&only&&only.id===aVer.id);
            task.appendChild(el('div','tsub',only?only.name:'—'));
            if(self){task.classList.add('self');tnm.appendChild(el('span','vcur','比較元'))}
            else if(only)task.onclick=()=>{modal.remove();onPick(n,only)};
          }else{
            const chips=el('div','cmp-vchips');
            for(const vv of vids){
              const self=(n.id===aNode.id&&vv.id===aVer.id);
              const chip=el('button','cmp-vchip'+(self?' self':''),vv.name);
              if(self)chip.appendChild(el('span','vcur','元'));
              else chip.onclick=()=>{modal.remove();onPick(n,vv)};
              chips.appendChild(chip);
            }
            task.classList.add('multi');task.appendChild(chips);
          }
          tasks.appendChild(task);
        }
        card.appendChild(tasks);
      }
      list.appendChild(card);
    }
    if(!shown)list.appendChild(el('div','sub-empty','動画のあるタスクがありません。'));
  }
  search.oninput=paint;paint();
  const pkf=el('div','pkf');pkf.appendChild(el('span','sub','比較元: '+((shotOf(aNode)?shotOf(aNode)+' / ':'')+aNode.name+' '+aVer.name)));
  const cancel=el('button','btn btn-ghost btn-sm','キャンセル');cancel.onclick=()=>modal.remove();pkf.appendChild(cancel);
  pk.appendChild(pkh);pk.appendChild(pkb);pk.appendChild(pkf);modal.appendChild(pk);
  modal.onclick=e=>{if(e.target===modal)modal.remove()};document.body.appendChild(modal);
  setTimeout(()=>{try{search.focus()}catch(_){}},0);
}

function roleFor(email){
  if(!accessCfg||!email)return null;const e=email.toLowerCase();
  const has=arr=>(arr||[]).some(x=>String(x).toLowerCase()===e);
  if(has(accessCfg.operatorEmails))return 'operator';
  if(has(accessCfg.adminEmails))return 'admin';
  if(has(accessCfg.allowedEmails))return 'member';
  const dom=e.split('@')[1]||'';
  if((accessCfg.allowedDomains||[]).some(d=>String(d).toLowerCase().replace(/^@/,'')===dom))return 'member';
  return null;
}
