<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LayCAT</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#c7c7cf;--accent2:#e8e8ec;
  --red:#e06a6a;--green:#7fbf9a;--amber:#d6a95f;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  --cols:4;
  --tile-ar:16/9; /* プロジェクトタイルの縦横比（トリミング編集と共通） */
  --drawer-w:min(680px,52vw); /* 右側スライド（レビュー）の幅 */
}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;cursor:pointer}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{order:-1;display:inline-flex;align-items:center;flex-shrink:0;line-height:1}
.logo .brand-img{height:40px;width:auto;display:block}
.home-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:18px;background:var(--bg4);border:1px solid transparent;border-radius:var(--radius2);transition:all .15s}
.home-btn:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.app-ver{flex-shrink:0;align-self:center;font-family:var(--font-head);font-size:10px;letter-spacing:.5px;color:var(--text3);padding:2px 7px;border:1px solid var(--border);border-radius:6px;background:var(--bg);white-space:nowrap}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.folder-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer}
.folder-status:hover{border-color:var(--border2)}
.folder-status .dot{width:8px;height:8px;border-radius:50%;background:#5a5a6a}
.folder-status.connected .dot{background:#d8d8dc}
.folder-status.warn{color:#e0a63a;border-color:rgba(224,166,58,.5)}
.folder-status.warn .dot{background:#e0a63a}
.user-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.user-field input{width:96px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:12px}
.size-btns{display:flex;gap:2px}
.size-btn{width:30px;height:30px;border-radius:var(--radius2);border:1px solid var(--border);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center}
.size-btn.active{color:#e8e8ec;border-color:#e8e8ec}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:#ececf0;color:#16161a}
.btn-primary:hover{background:#fff}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
/* 「タブに追加」系：白い主要ボタン（送信/REELに送る）と区別するため、明るいアウトライン＋薄い地色 */
.btn-open{background:rgba(232,232,236,.07);border:1px solid var(--accent2);color:var(--accent2);font-weight:700}
.btn-open:hover{background:var(--accent2);color:#16161a;border-color:var(--accent2)}
.btn-danger{border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,90,90,.12)}
.btn-sm{padding:4px 9px;font-size:12px}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label .add{color:var(--accent);cursor:pointer;font-size:14px}
.sidebar-label .side-ctrls{display:flex;align-items:center;gap:11px}
.sidebar-label .side-ctrls .add:hover{color:var(--text)}
/* サイドバー内 検索＋作業者フィルタ */
.side-filter{display:flex;flex-direction:column;gap:7px;padding:0 8px 10px;margin-bottom:6px;border-bottom:1px solid var(--border)}
.side-search{width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);padding:6px 9px;font-size:12px;font-family:inherit}
.side-search:focus{outline:none;border-color:var(--border2)}
.side-asg.form-row{margin:0}
.side-asg .form-label{font-size:10px;color:var(--text3);letter-spacing:.04em;margin:0 0 3px}
.side-asg .mps-input{font-size:12px;padding:6px 8px}
.side-clr{align-self:flex-start;padding:3px 9px;font-size:11px}
.tree-row.hit .tree-name{color:var(--text);font-weight:700}
.tree-row.hit{background:rgba(96,165,255,.08)}
/* TREE */
.tree{font-size:13px}
.tree-row{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden}
.tree-row:hover{background:var(--bg4);color:var(--text)}
.tree-row.active{background:rgba(255,255,255,.08);color:var(--text)}
.tree-toggle{width:14px;text-align:center;color:var(--text3);flex-shrink:0;font-size:9px;transition:transform .1s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0 6px}
.tree-empty{color:var(--text3);font-size:12px;padding:8px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.mh-row1{display:flex;align-items:center;gap:12px;min-height:42px}
.vdiv{width:1px;height:20px;background:var(--border2);flex-shrink:0;align-self:center;margin:0 2px}
/* タスクページ/カテゴリページ左上の固定バー（スクロール追従） */
.task-topbar{position:sticky;top:0;z-index:15;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 -20px 16px;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.task-topbar .tt-head{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap}
.task-topbar .tt-proc{font-family:var(--font-head);font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;margin:0}
.task-topbar .tt-shot{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 9px;flex-shrink:0}
/* 上部バーの作業者/チェック者ピッカー（設定ボタンの左に横並び） */
.task-topbar .tt-asg.form-row{margin:0;display:flex;flex-direction:row;align-items:center;gap:6px;width:auto}
.task-topbar .tt-asg .form-label{margin:0;font-size:10px;color:var(--text3);white-space:nowrap}
.task-topbar .tt-asg .mps{width:130px}
.task-topbar .tt-asg .mps-input{font-size:12px;padding:5px 8px}
.task-topbar .tt-asg-a .mps-input{border-left:3px solid var(--green)}
.task-topbar .tt-asg-r .mps-input{border-left:3px solid var(--amber)}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 20px 0;color:var(--text3);font-size:13px;flex-wrap:wrap}
.breadcrumb .sep{opacity:.5}
.breadcrumb .cur{color:var(--text)}
.main-head{display:flex;flex-direction:column;align-items:stretch;gap:0;padding:8px 20px 0}
.main-head h1{font-family:var(--font-head);font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.main-head .desc{color:var(--text3);font-size:12px;margin-top:3px}
.main-head .spacer,.task-topbar .spacer{flex:1}
/* ショット担当（作業/チェック）ピッカー・バッジ・フィルタ */
.mp-fl{display:inline-flex;align-items:center;gap:6px}
.mp-lab{font-size:11px;color:var(--text2);white-space:nowrap}
.mp-sel{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:var(--radius2);padding:5px 8px;font-size:12px;font-family:inherit;cursor:pointer;max-width:160px}
.mp-sel:focus{outline:none;border-color:var(--border2)}
.mp-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.mp-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 7px 2px 6px}
.mp-badge .mp-bl{color:var(--text3);font-size:9px;letter-spacing:.02em}
.mp-badge .mp-bn{color:var(--text);font-weight:600}
.mp-badge .mp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* 作業担当＝グリーン系 / チェック担当＝アンバー系 で色分け */
.mp-badge.mp-a{background:rgba(127,191,154,.13);border-color:rgba(127,191,154,.4)}
.mp-badge.mp-a .mp-bl{color:var(--green)}
.mp-badge.mp-r{background:rgba(214,169,95,.13);border-color:rgba(214,169,95,.42)}
.mp-badge.mp-r .mp-bl{color:var(--amber)}
/* 検索付き担当ピッカー */
.mps{position:relative}
.mps-input{width:100%}
.mps-dd{position:absolute;top:calc(100% + 3px);left:0;right:0;z-index:30;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius2);max-height:230px;overflow-y:auto;box-shadow:0 10px 28px rgba(0,0,0,.5)}
.mps-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;font-size:13px}
.mps-opt:hover,.mps-opt.on{background:var(--bg4)}
.mps-opt .mps-nm{font-weight:600;color:var(--text);white-space:nowrap}
.mps-opt .mps-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:auto}
.mps-opt .mps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mps-empty{padding:9px 10px;color:var(--text3);font-size:12px}
.mp-filter{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:4px 0 14px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2)}
/* プロジェクト パスワード解錠画面 */
.proj-lock{display:flex;justify-content:center;align-items:flex-start;padding:60px 20px}
.pl-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:30px 26px;text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center}
.pl-ic{font-size:34px;line-height:1}
.pl-title{font-family:var(--font-head);font-size:19px;font-weight:700}
.pl-sub{color:var(--text2);font-size:12px}
.pl-row{display:flex;gap:8px;width:100%;margin-top:6px}
.pl-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);padding:9px 11px;font-size:13px;font-family:inherit}
.pl-input:focus{outline:none;border-color:var(--border2)}
.pl-err{color:var(--red);font-size:12px}
/* メンション チップ & 候補ドロップダウン */
.mention{color:var(--accent2);background:var(--bg4);border-radius:4px;padding:0 3px;font-weight:600}
.mention-role{color:var(--amber)}
.mention-pop{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 26px rgba(0,0,0,.55);overflow:hidden;max-height:260px;overflow-y:auto}
.mention-opt{display:flex;align-items:baseline;gap:8px;padding:7px 11px;cursor:pointer;font-size:13px}
.mention-opt.on,.mention-opt:hover{background:var(--bg3)}
.mention-opt .mo-nm{font-weight:600;color:var(--text);white-space:nowrap}
.mention-opt.is-role .mo-nm{color:var(--amber)}
.mention-opt .mo-sub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scroll{flex:1;overflow-y:auto;padding:0 20px 28px}
.home-main{padding-top:14px}
/* 単色ラインアイコン */
.ico{width:1.05em;height:1.05em;vertical-align:-0.16em;flex-shrink:0}
button .ico,.tree-row .ico,.hs-item .ico,.tl-title .ico,.breadcrumb .ico,.type-chip .ico{margin-right:.4em}
.ico+*{vertical-align:middle}
/* プロジェクトのタブ（タイムライン / 進捗 / ショット） */
/* プロジェクトタブ（ヘッダ内・タイトルの右） */
.head-tabs{display:flex;gap:2px;align-items:flex-end;align-self:stretch}
.ptab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.5px;padding:8px 16px;cursor:pointer}
.ptab:hover{color:var(--text)}
.ptab.on{color:var(--text);border-bottom-color:var(--accent2)}
/* タスクタブ列（ヘッダ内・開いているタスクページを下線付きテキストタブで複数並べる） */
.task-tabs{display:flex;align-items:flex-end;gap:2px;flex-wrap:wrap;margin:0 -20px 0;padding:2px 20px 0;border-bottom:1px solid var(--border);min-height:34px}
.task-tabs-empty{font-size:12px;color:var(--text3);padding:6px 2px}
.task-tab{display:inline-flex;align-items:center;gap:5px;max-width:260px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.5px;padding:8px 8px 8px 12px;cursor:pointer;margin-bottom:-1px}
.task-tab .tt-shot{color:var(--text2);font-weight:700;flex-shrink:0}
.task-tab:hover{color:var(--text)}
.task-tab.on{color:var(--text);border-bottom-color:var(--accent2)}
.task-tab .tt-name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.task-tab .tt-close{border:none;background:none;color:var(--text3);font-size:10px;padding:0 3px;line-height:1;border-radius:4px;flex-shrink:0;opacity:.5}
.task-tab:hover .tt-close,.task-tab.on .tt-close{opacity:1}
.task-tab .tt-close:hover{background:rgba(255,255,255,.14);color:var(--text)}
/* タブ内の進捗・ショット（メインウィンドウ埋め込み版） */
.pm-sel{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.pm-sel label{font-size:11px;color:var(--text3)}
.pm-sel select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;max-width:460px}
.pm-tabs{display:flex;gap:6px;margin-bottom:16px}
.pm-stab{background:var(--bg3);border:1px solid var(--border);color:var(--text3);border-radius:7px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer}
.pm-stab:hover{color:var(--text)}
.pm-stab.on{background:rgba(96,165,255,.16);border-color:var(--edge);color:var(--text)}
/* チェック待ち：チェック担当者タブ（本体のタブUI＝アンダーライン/モノクロに統一） */
.chk-tabs{display:flex;flex-wrap:wrap;gap:2px;align-items:flex-end;margin:2px 0 18px;border-bottom:1px solid var(--border)}
.chk-tab{display:inline-flex;align-items:center;gap:7px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:.4px;padding:8px 14px;cursor:pointer;margin-bottom:-1px}
.chk-tab:hover{color:var(--text2)}
.chk-tab.on{color:var(--text);border-bottom-color:var(--accent2)}
.chk-tab .chk-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chk-tab .chk-cnt{font-size:11px;font-weight:700;color:var(--text3);background:var(--bg3);border-radius:999px;padding:1px 7px;min-width:18px;text-align:center}
.chk-tab.on .chk-cnt{color:var(--text);background:var(--bg4)}
.tl-item.tl-done{opacity:.5}
.chk-done-chip{font-size:10px;font-weight:700;color:var(--green);background:rgba(127,191,154,.14);border:1px solid rgba(127,191,154,.4);border-radius:5px;padding:1px 7px;white-space:nowrap}
.pm-card{border:1px solid var(--border);border-radius:12px;background:var(--bg2);padding:16px 18px;margin-bottom:6px}
.pm-body{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
.pm-body canvas{flex-shrink:0;cursor:pointer}
.pm-ptbl{flex:1;min-width:320px;border-collapse:collapse}
.pm-ptbl th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:4px 8px;border-bottom:1px solid var(--border)}
.pm-ptbl td{padding:6px 8px;border-bottom:1px solid var(--bg3);vertical-align:middle;cursor:pointer}
.pm-ptbl tr:hover td{background:var(--bg3)}
.pm-ptbl tr.pick td{background:rgba(96,165,255,.12)}
.pm-sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:7px;vertical-align:-1px}
.pm-bar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;min-width:80px}
.pm-bar>i{display:block;height:100%;border-radius:4px}
.pm-num{text-align:right;font-variant-numeric:tabular-nums}
.pm-pct{color:var(--text3);font-variant-numeric:tabular-nums}
.pm-h{font-family:var(--font-head);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 2px 10px}
.pm-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700;color:#101013}
.pm-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.pm-tile{border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;background:var(--bg2)}
.pm-tile:hover{border-color:var(--edge);box-shadow:0 0 10px var(--edgeglow)}
.pm-tile .th{position:relative;aspect-ratio:16/9;background:#000 center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--text3);overflow:hidden}
.pm-tile .th img{width:100%;height:100%;object-fit:cover}
.pm-tile .th video.tvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;opacity:0;transition:opacity .15s}
.pm-tile .th video.tvid.on{opacity:1}
.pm-tile .bd{padding:7px 9px}.pm-tile .nm{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-tile .mt{display:flex;align-items:center;gap:6px;margin-top:5px}.pm-tile .pth{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-stbl{border-collapse:collapse;width:100%}
.pm-stbl th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:5px 8px;border-bottom:1px solid var(--border)}
.pm-stbl td{padding:7px 8px;border-bottom:1px solid var(--bg3)}
.pm-stbl .sn{font-weight:600}
.pm-empty{color:var(--text3);padding:44px;text-align:center}
.pm-mod{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;z-index:400}
.pm-mod.on{display:flex}
.pm-mod .top{display:flex;align-items:center;gap:10px;padding:12px 16px;color:var(--text)}
.pm-mod .top .sp{flex:1}
.pm-mod .bd{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:0 16px 16px}
.pm-mod video{max-width:100%;max-height:100%}
/* プロジェクトのタイムライン・ホーム */
/* ホーム画面（プロジェクト選択）— シンプルなランチャー風 */
.home-screen{max-width:1120px;margin:0 auto;padding:30px 10px 50px}
.home-hd{margin:8px 4px 30px}
.home-hd .ht{font-family:var(--font-head);font-size:30px;font-weight:800;letter-spacing:.5px}
.home-hd .hs{color:var(--text3);font-size:13px;margin-top:7px}
.home-acts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
/* 新規プロジェクト作成モーダル（セクション作成と区別） */
.modal.proj-modal .modal-title{color:var(--text)}
.modal.proj-modal .modal-title:before{content:'';display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--edge);box-shadow:0 0 8px var(--edgeglow);margin-right:9px;vertical-align:middle}
.modal.proj-modal .modal-header{border-bottom:1px solid var(--edge);box-shadow:0 1px 10px var(--edgeglow)}
.pc-thumb{position:relative;width:100%;aspect-ratio:16/9;max-height:200px;border:2px dashed var(--border2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:13px;cursor:pointer;overflow:hidden;background:#000 center/cover no-repeat;margin-bottom:6px}
.pc-thumb .ph{font-size:12px}
.pc-thumb svg{width:26px;height:26px;opacity:.7}
.pc-thumb.drag{border-color:var(--edge);color:var(--text);background-color:rgba(96,165,255,.08)}
.pc-thumb.has{border-style:solid;border-color:var(--border)}
.pc-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pc-thumb .rep{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);border-radius:6px;padding:2px 8px;font-size:11px;color:#fff}
.folder-warn{display:flex;align-items:center;gap:12px;margin:0 0 14px;padding:12px 15px;border:1px solid #b98a2e;border-left:3px solid #e0a63a;border-radius:10px;background:rgba(224,166,58,.10)}
.folder-warn .wi{color:#e0a63a;display:flex;flex-shrink:0}.folder-warn .wi svg{width:20px;height:20px}
.folder-warn .wtx{flex:1;min-width:0}
.folder-warn .wt{font-weight:700;font-size:13px;color:#f0c877}
.folder-warn .ws{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5}
.proj-nofolder{color:#e0a63a;border-color:rgba(224,166,58,.5)!important;background:rgba(224,166,58,.12)!important}
.proj-grid{display:grid;gap:24px;grid-template-columns:repeat(auto-fill,272px);justify-content:center}
.proj-card{border:1px solid var(--edge);border-radius:16px;overflow:hidden;background:var(--bg);cursor:pointer;box-shadow:0 0 10px var(--edgeglow);transition:box-shadow .2s ease,border-color .2s ease}
.proj-card:hover{animation:tile-beat 2.6s ease-in-out infinite}
@keyframes tile-beat{
  0%,100%{box-shadow:0 0 8px rgba(96,165,255,.14);border-color:rgba(96,165,255,.5)}
  50%{box-shadow:0 0 16px rgba(96,165,255,.4);border-color:rgba(120,180,255,.85)}
}
.proj-media{aspect-ratio:var(--tile-ar);background:#000 center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative}
.proj-media img{width:100%;height:100%;object-fit:cover;display:block}
.proj-media.ph{background:linear-gradient(135deg,#1a2338,#0e131d)}
.proj-initial{font-family:var(--font-head);font-size:56px;font-weight:800;color:rgba(150,180,255,.34)}
.proj-body{padding:15px 17px 17px}
.proj-name{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap}
.proj-badge{font-size:11px;font-weight:700;padding:2px 11px;border-radius:20px;border:1px solid}
.proj-cnt,.proj-upd{font-size:11px;color:var(--text3)}
.proj-add{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:216px;border:none;box-shadow:none;color:var(--text3);gap:8px;background:transparent}
.proj-add:hover{color:var(--text);animation:none;box-shadow:none;border:none}
.proj-add .p{font-size:36px;font-weight:300;line-height:1}
.proj-empty{color:var(--text3);padding:60px 10px;text-align:center;grid-column:1/-1}
.home-flex{display:flex;gap:20px;align-items:flex-start}
.home-main{flex:1;min-width:0}
.home-side{width:236px;flex-shrink:0;position:sticky;top:0}
.home-side h3{font-family:var(--font-head);font-size:10px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:2px 4px 10px}
.hs-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);cursor:pointer;margin-bottom:8px}
.hs-item:hover{border-color:var(--edge);box-shadow:0 0 8px var(--edgeglow)}
.hs-item .ic{font-size:14px}.hs-item .nm{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs-item .ct{font-size:10px;color:var(--text3)}
.tl{display:flex;flex-direction:column}
.tl-item{display:flex;gap:13px;padding:13px 10px;margin:0 -10px;border-bottom:1px solid var(--border);border-radius:8px;cursor:pointer}
.tl-item:hover{background:var(--bg2)}
.tl-thumb{width:124px;height:70px;flex-shrink:0;border-radius:6px;background:#000 center/cover no-repeat;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.tl-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tl-path{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-title{font-size:14px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-stage{display:inline-block;padding:1px 9px;border-radius:5px;font-size:10px;font-weight:700;color:#101013}
.tl-kind{font-size:10px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:0 6px}
.tl-fchip{font-size:10px;color:#9ec5ff;border:1px solid rgba(96,165,255,.5);border-radius:4px;padding:0 6px}
.tl-comment{font-size:13px;color:var(--text);margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.tl-meta{font-size:11px;color:var(--text3);margin-top:4px}
.tl-item.is-comment .tl-thumb{opacity:.85}
.filter-dd{position:relative;display:inline-block}
.filter-panel{position:absolute;right:0;top:calc(100% + 6px);background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:210px;max-height:340px;overflow-y:auto;z-index:30;box-shadow:0 8px 26px rgba(0,0,0,.55)}
.filter-panel.hidden{display:none}
.filter-tools{display:flex;gap:6px;padding:2px 2px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.filter-row{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:13px}
.filter-row:hover{background:var(--bg3)}
.filter-row input{accent-color:#5aa2ff;cursor:pointer}
.section-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label:first-child{margin-top:8px}
.section-label .acts{margin-left:auto;display:flex;gap:6px}

/* GRID / CARDS */
.grid{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,4),1fr)}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.vcard:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.vcard-thumb{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-noimg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#17171b,#232329);color:rgba(255,255,255,.4)}
.vcard-noimg .g{font-size:30px}
.vcard-noimg .lab{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;font-family:var(--font-head)}
.vcard-noimg.ph{padding:0}
/* サムネ未取得タイルのプレースホルダ（未着手ねこ）。グレー背景＋中央に小さめ表示。.xxx .th img{object-fit:cover} より優先させる */
.thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#2d2d34;box-sizing:border-box}
.thumb-ph img{position:static!important;inset:auto!important;width:auto!important;height:auto!important;max-width:50%!important;max-height:45%!important;object-fit:contain!important;opacity:.9;pointer-events:none;user-select:none}
.vcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none;transition:opacity .15s}
.vcard-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
.vcard:hover .vcard-play{opacity:0}
.vcard-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:4}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.vcard-act:hover{background:rgba(255,90,90,.55)}
.vcard-cnt{position:absolute;bottom:6px;right:8px;font-size:10px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5);padding:1px 6px;border-radius:8px;z-index:3}
.vcard-reel{position:absolute;bottom:6px;left:8px;max-width:70%;font-size:10px;color:rgba(255,255,255,.9);background:rgba(96,165,255,.32);border:1px solid rgba(96,165,255,.5);padding:1px 6px;border-radius:8px;z-index:4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-reel:hover{background:rgba(96,165,255,.5)}
.vcard-ov{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:2;pointer-events:none}
.vcard-ov .t{font-size:12px;font-weight:500;color:#fff;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.vcard-name-big{font-family:var(--font-head);font-size:18px;font-weight:700;padding:10px 12px 12px;line-height:1.3}
.log-gen{padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);background:var(--bg2)}
.log-gen-head{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.badge-empty{background:rgba(90,90,106,.25);color:#9a9aaa}
.badge-pending{background:rgba(120,120,140,.3);color:#cbd5e1}
.badge-approved{background:rgba(127,191,154,.85);color:#0c1a12}
.badge-retake{background:rgba(214,169,95,.9);color:#1a1200}
.badge-rejected{background:rgba(224,106,106,.88);color:#fff}
.add-tile{border:1px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);cursor:pointer;min-height:130px;transition:all .15s}
.add-tile:hover{border-color:var(--border2);color:var(--text2);background:rgba(255,255,255,.03)}
.add-tile .p{font-size:26px}
.empty{color:var(--text3);text-align:center;padding:50px 20px;border:1px dashed var(--border);border-radius:var(--radius)}

/* LOG（縦積み・大型タイル / ShotGrid風。コメントは動画右側） */
.log{display:flex;flex-direction:column;gap:16px;max-width:1200px}
.log-flex{display:flex;min-height:200px}
.log-left{flex:1.55;min-width:0;background:#000;display:flex;flex-direction:column;justify-content:center}
.log-left .log-media{width:100%}
.log-side{width:340px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;max-height:62vh}
.log-side-head{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:10px 12px 4px}
.log-side-list{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:8px}
.log-side .log-note-input{padding:10px 12px;border-top:1px solid var(--border)}
.note-shot{width:100%;display:block;border:1px solid var(--border);border-radius:6px;margin-top:6px;background:#000;cursor:pointer}
.log-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.log-item:hover{border-color:var(--border2)}
.log-media{position:relative;background:#000;cursor:pointer}
.log-media video,.log-media img{width:100%;display:block;max-height:50vh;object-fit:contain;background:#000}
.log-open{position:absolute;top:8px;right:8px;z-index:6;width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,.65);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.2)}
.log-open:hover{background:rgba(255,255,255,.18)}

/* カスタム動画プレイヤー（タイル内） */
.vp-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:52px;color:rgba(255,255,255,.85);text-shadow:0 4px 18px rgba(0,0,0,.8);pointer-events:none;z-index:3;transition:opacity .2s,transform .2s;opacity:0}
.log-media:hover .vp-center:not(.off){opacity:1}
.vp-center.off{opacity:0;transform:scale(1.4)}
.vp-bar{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:10px;padding:10px 14px 9px 10px;background:linear-gradient(transparent,rgba(0,0,0,.88));opacity:0;transition:opacity .18s;z-index:5}
.log-media:hover .vp-bar{opacity:1}
.vp-play{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.45);background:rgba(0,0,0,.45);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);flex-shrink:0;transition:all .15s}
.vp-play:hover{background:rgba(255,255,255,.16);border-color:#fff;transform:scale(1.06)}
.vp-time{font-family:monospace;font-size:11px;color:rgba(255,255,255,.85);min-width:82px;text-align:center;letter-spacing:.5px}
.vp-track{flex:1;height:20px;display:flex;align-items:center;cursor:pointer;position:relative}
.vp-track .ticks{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:9px;display:flex;justify-content:space-between;pointer-events:none}
.vp-track .ticks i{width:1px;height:100%;background:rgba(255,255,255,.18)}
.vp-track .rail{width:100%;height:3px;background:rgba(255,255,255,.22);border-radius:2px;position:relative}
.vp-track .fill{position:absolute;left:0;top:0;bottom:0;background:#fff;border-radius:2px}
.vp-track .knob{position:absolute;top:50%;width:9px;height:9px;background:#fff;transform:translate(-50%,-50%) rotate(45deg);box-shadow:0 0 8px rgba(255,255,255,.55)}

/* エクスプローラーからの D&D アップロード */
.drop-overlay{position:fixed;inset:12px;z-index:1300;background:rgba(13,13,15,.85);border:2px dashed rgba(255,255,255,.75);border-radius:16px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.drop-overlay .dz{text-align:center;color:#e8e8ec;font-size:17px;line-height:2}
.drop-overlay .dz small{color:var(--text2);font-size:12px}
.drop-overlay .dz .big{font-size:44px;display:block;margin-bottom:6px}
.log-media .ph{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:34px}
.log-head{display:flex;align-items:center;gap:10px;padding:12px 16px 0}
.log-title{font-weight:600;font-size:15px;display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.log-meta{font-size:11px;color:var(--text3);white-space:nowrap}
.log-notes{padding:10px 16px 14px;display:flex;flex-direction:column;gap:8px}
.log-note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.log-note .m{font-size:11px;color:var(--text3);margin-bottom:4px}
.log-note .t{font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.65}
.log-note-input{display:flex;gap:8px;padding:0 16px 16px}
.log-note-input textarea{flex:1;min-height:38px;max-height:140px;resize:vertical;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.5}
.log-note-input textarea:focus{outline:none;border-color:var(--border2)}
.log-empty-note{font-size:12px;color:var(--text3)}
/* メッセージ（動画FBとは独立） */
.shot-comments{max-width:1200px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-top:6px}
.shot-comments .section-label{margin:0 0 10px}
.shot-comments .sc-count{font-weight:600;color:var(--text2);letter-spacing:0}
.sc-input{display:flex;gap:8px;align-items:flex-start}
.sc-input textarea{flex:1;min-height:40px;max-height:160px;resize:vertical;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.5;font-family:inherit}
.sc-input textarea:focus{outline:none;border-color:var(--border2)}
.sc-input .btn{flex-shrink:0}
/* ログ内の独立コメント（動画タイルと時系列で混在表示） */
.log-note.sc-item{border-left:3px solid rgba(96,165,255,.55)}
.sc-item .m{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.sc-chip{font-size:10px;font-weight:700;color:#9cc4ff;background:rgba(96,165,255,.14);border:1px solid rgba(96,165,255,.4);border-radius:9px;padding:1px 7px}
.note-acts{margin-left:auto;display:inline-flex;gap:4px}
.na{font-size:11px;color:var(--text3);padding:2px 6px;border-radius:4px}
.na:hover{color:var(--text);background:rgba(255,255,255,.08)}
.frame-chip{font-size:10px;font-family:monospace;padding:1px 7px;border-radius:9px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text2);margin-left:8px}
.frame-chip.link{cursor:pointer}
.frame-chip.link:hover{color:var(--text);border-color:var(--border2)}
.edit-row{display:flex;gap:6px;margin-top:6px}
.fb-edit-ta{width:100%;min-height:56px;resize:vertical;padding:8px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;line-height:1.5;margin-top:4px}

/* FB画面（シンクスケッチ風） */
/* サブミット */
.sub-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1400;display:flex;align-items:center;justify-content:center;padding:24px}
.sub-modal{background:var(--bg);width:min(1080px,96vw);max-height:90vh;display:flex;flex-direction:column;border:1px solid var(--edge);border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.6);overflow:hidden}
.sub-top{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.sub-top .logo{font-family:var(--font-head);font-weight:700;font-size:15px}
.sub-top .sub{color:var(--text3);font-size:11px}.sub-top .sp{flex:1}
.sub-body{flex:1;min-height:0;overflow-y:auto;padding:18px 20px}
.sub-wrap{max-width:100%;margin:0 auto}
.subl-item{display:flex;align-items:center;gap:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);padding:14px 16px;margin-bottom:12px;cursor:pointer}
.subl-item:hover{border-color:var(--edge);box-shadow:0 0 10px var(--edgeglow)}
.subl-item .nm{font-family:var(--font-body);font-weight:700;font-size:16px;letter-spacing:.02em;font-variant-numeric:tabular-nums}
.subl-item .mt{color:var(--text3);font-size:12px}
.subl-item .thumbs{display:flex;gap:5px;margin-left:auto}
.subl-item .thumbs .th{width:60px;height:34px;border-radius:4px;background:#000 center/cover no-repeat;border:1px solid var(--border)}
.sub-block{border:1px solid var(--border);border-radius:12px;background:var(--bg2);margin-bottom:16px;overflow:hidden}
.sub-block .bh{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.sub-block .bh .st{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700;color:#101013}
.sub-block .bh .sn{font-weight:600}.sub-block .bh .sp2{color:var(--text3);font-size:11px}

.fb-controls select{padding:4px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px}
.fb-controls input[type=color]{width:30px;height:26px;background:none;border:1px solid var(--border);border-radius:6px;padding:1px;cursor:pointer}
.btn.tool.active{background:#ececf0;color:#16161a;border-color:#ececf0}
.fb-side{width:272px;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;min-height:0;flex-shrink:0}
.fb-side-head{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:12px 14px 8px}
.fb-notes{flex:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.fb-input{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.fb-submit-bar{display:flex;align-items:center;gap:8px;padding:0 12px 12px}
.fb-unsent-lab{flex:1;font-size:11px;color:var(--amber);font-weight:600}
.log-note.draft-note{border-color:var(--amber);border-style:dashed;background:rgba(214,169,95,.06)}
.draft-chip{font-size:10px;font-weight:700;color:#1a1200;background:var(--amber);border-radius:8px;padding:1px 7px;margin-right:6px}
.fb-input textarea{flex:1;min-height:44px;max-height:140px;resize:vertical;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;line-height:1.5}
.fb-input textarea:focus{outline:none;border-color:var(--border2)}
@media (max-width:900px){.fb-side{width:230px}}
.file-drop{border:1px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px}
.file-drop:hover{border-color:var(--accent);color:var(--text2)}
.file-drop input{display:none}
.uploading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin-bottom:12px}
.bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;flex:1}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:in .25s cubic-bezier(.16,1,.3,1)}
.modal.lg{max-width:940px}
@keyframes in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-title .sub{font-family:var(--font-body);font-size:12px;color:var(--text3);font-weight:400;margin-top:2px}
.modal-close{font-size:20px;color:var(--text3);width:30px;height:30px;border-radius:6px}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{height:70px;resize:vertical}
.divider{border-top:1px solid var(--border);margin:18px 0}
.review-media{width:100%;background:#000;border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
.review-media img,.review-media video{width:100%;display:block;max-height:56vh;object-fit:contain}
.review-actions{display:flex;gap:8px;margin:6px 0 4px;flex-wrap:wrap}
.review-actions .btn.ok{background:var(--green);color:#04120a}
.review-actions .btn.retake{background:var(--amber);color:#1a1200}
.review-actions .btn.reject{background:var(--red);color:#fff}
.notes{margin-top:14px}
.note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.note .m{color:var(--text3);font-size:11px;margin-bottom:4px}
.note-input{display:flex;gap:8px;margin-top:10px}
.note-input input{flex:1}
.seg{display:flex;gap:6px}
.seg-opt{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;text-align:center;line-height:1.5}
.seg-opt small{display:block;font-size:10px;color:var(--text3)}
.seg-opt.active{border-color:#e8e8ec;background:rgba(255,255,255,.08);color:var(--text)}
.seg-opt.active small{color:var(--text2)}
.type-chip{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.vcard-type{position:absolute;bottom:6px;left:8px;font-size:10px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.5);padding:1px 7px;border-radius:8px;z-index:3}
.gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:44px 36px;max-width:520px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.gate-logo{font-family:var(--font-head);font-size:40px;font-weight:700}
.gate-logo b{color:#fff}
.gate-sub{color:var(--text2);line-height:1.8;margin:14px 0 4px;font-size:13px}
.gate-sub code{background:var(--bg4);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent)}
.gate-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.gate-note{color:var(--text3);font-size:12px;margin-top:16px}
.gbtn{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;background:#fff;color:#1a1a1a;border-radius:8px;font-weight:600;font-size:14px}
.gbtn:hover{filter:brightness(.94)}
.gbtn .gg{font-weight:700;color:#4285F4}
.spin{width:34px;height:34px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:6px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);object-fit:cover}
.hd-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.hd-user .lo{color:var(--text3);cursor:pointer;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.hd-user .lo:hover{color:var(--text);border-color:var(--border2)}
.deny-email{font-size:13px;color:var(--text3);margin:8px 0 18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:11px 18px;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:2000;font-size:13px}
/* 通知 */
.hd-bell{position:relative;background:none;border:1px solid var(--border);color:var(--text2);width:34px;height:34px;border-radius:var(--radius2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hd-bell:hover{color:var(--text);border-color:var(--border2)}
.hd-bell .ico{width:17px;height:17px}
.nb-badge{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:#ff5a5a;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 0 0 2px var(--bg2)}
.nb-badge.hidden{display:none}
.notif-panel{position:fixed;top:52px;right:14px;width:346px;max-height:460px;overflow-y:auto;background:var(--bg2);border:1px solid var(--edge);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.55),0 0 14px var(--edgeglow);z-index:300}
.notif-panel.hidden{display:none}
.notif-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
.notif-hd .t{font-weight:700;font-size:13px}
.notif-hd .clr{background:none;border:none;color:var(--text3);font-size:11px;cursor:pointer;padding:2px 4px}
.notif-hd .clr:hover{color:var(--text)}
.notif-list{display:flex;flex-direction:column}
.notif-item{display:flex;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:rgba(96,165,255,.08)}
.notif-item .dot{width:7px;height:7px;border-radius:50%;background:var(--edge);flex-shrink:0;margin-top:5px}
.notif-item.read .dot{background:transparent;box-shadow:inset 0 0 0 1px var(--border2)}
.notif-item .bd{flex:1;min-width:0}
.notif-item .nt{font-size:13px;font-weight:600}
.notif-item .nx{font-size:12px;color:var(--text2);margin-top:3px;white-space:pre-wrap;word-break:break-word}
.notif-item .nm{font-size:10px;color:var(--text3);margin-top:5px}
.notif-empty{color:var(--text3);padding:40px 14px;text-align:center;font-size:12px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px;border:2px solid var(--bg)}

/* 構造境界線：明るい青＋軽量グロー（静的box-shadowのみ・アニメなし） */
:root{--edge:rgba(96,165,255,.7);--edgeglow:rgba(96,165,255,.22);--edge-grad:linear-gradient(135deg,#5cc7ef 0%,#7a5cff 100%)}
.header{border-bottom-color:var(--edge);box-shadow:0 1px 10px var(--edgeglow)}
.sidebar{border-right-color:var(--edge);box-shadow:1px 0 10px var(--edgeglow)}
.fb-top{border-bottom-color:var(--edge);box-shadow:0 1px 10px var(--edgeglow)}
.fb-side{border-left-color:var(--edge);box-shadow:-1px 0 10px var(--edgeglow)}
.fb-layers{border-left-color:var(--edge);box-shadow:-1px 0 10px var(--edgeglow)}
.log-side{border-left-color:var(--edge)}
.fb-controls,.fb-tl-wrap{border-top-color:var(--edge)}
/* 水色→寒色系の紫のグラデーション線（ツール全体の水色ラインを置換）。単辺ボーダーの要素のみ、その辺にグラデが乗る */
.header,.sidebar,.fb-top,.fb-side,.fb-layers,.log-side,.fb-controls,.fb-tl-wrap,
.drawer,.drawer-hd,.sub-detail,.fb-pane-b,.modal.proj-modal .modal-header{border-image:var(--edge-grad) 1}
</style>
</head>

    <button class="btn btn-ghost" id="submitBtn" title="サブミット — 複数ショットの提出をまとめてレビュー"><svg class="ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="5" rx="1"/><rect x="3" y="11" width="14" height="5" rx="1"/></svg>サブミット</button>
    <div class="folder-status" id="folderStatus" title="このプロジェクトの保存先 / クリックでプロジェクト設定"><span class="dot"></span><span id="folderName">ブラウザ内保存</span></div>

<script>
'use strict';
/* ============================================================
   Layna — 任意階層ツリー版（ShotGrid ライク / OGREF デザイン）
   どのノードも「子（枝分かれ）」と「動画ログ（工程ごとの履歴）」を持てる。
   階層の数・名前はユーザーが自由に作成。保存はローカルフォルダ。
   ============================================================ */

const DEFAULT_STATUSES=[
  {id:'pending',label:'チェック待ち',color:'#9a9ab0'},
  {id:'approved',label:'OK',color:'#5affa0'},
  {id:'retake',label:'リテイク',color:'#ffb85a'},
  {id:'rejected',label:'NG',color:'#ff5a5a'},
];
function hexA(hex,a){const m=/^#?([0-9a-fA-F]{2})([0-9a-fA-F]{2})([0-9a-fA-F]{2})/.exec(hex||'')||[];return 'rgba('+parseInt(m[1]||'7a',16)+','+parseInt(m[2]||'7a',16)+','+parseInt(m[3]||'90',16)+','+a+')'}
const STATUS={
  empty:{label:'—',cls:'empty',color:'#3a3a42'},
  pending:{label:'チェック待ち',cls:'pending',color:'#8a8a92'},
  approved:{label:'OK',cls:'approved',color:'#7fbf9a'},
  retake:{label:'リテイク',cls:'retake',color:'#d6a95f'},
  rejected:{label:'NG',cls:'rejected',color:'#e06a6a'},
};

let _c=0;
function newId(p){_c++;return p+'_'+Date.now().toString(36)+_c.toString(36)}
function nowIso(){try{return new Date().toISOString()}catch(_){return''}}

/* ---------- IndexedDB ---------- */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('layna',1);r.onupgradeneeded=()=>{const d=r.result;for(const s of['handles','blobs','kv'])if(!d.objectStoreNames.contains(s))d.createObjectStore(s)};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbPut(s,k,v){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function idbGet(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
async function idbDel(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}

/* ---------- ストレージ抽象化（folder / idb） ---------- */
const storage={
  /* DB（layna_db.json 相当）は常にブラウザ内保存(IndexedDB)。
     動画・画像はプロジェクトごとに指定したフォルダへ、未指定ならブラウザ内保存へ格納。 */
  mode:'idb',rootHandle:null,urlCache:new Map(),
  supportsFolder(){return typeof window.showDirectoryPicker==='function'},
  useIdb(){this.mode='idb';try{localStorage.setItem('layna_mode','idb')}catch(_){}},
  /* ヘッダー表示：プロジェクトを開いていて専用フォルダ指定があればその名前、なければブラウザ内保存 */
  folderLabel(){const cur=(DB&&state&&state.currentId)?getNode(state.currentId):null;const root=cur?rootOf(cur):null;if(root&&root.folderName)return root.folderName;return '⚠ フォルダ未設定';},
  async _subdir(n,root,create){let dir=root;for(const p of String(n).split('/'))if(p)dir=await dir.getDirectoryHandle(p,{create:create!==false});return dir},
  /* プロジェクト別フォルダ（設定済みなら directory handle を返す） */
  projHandles:new Map(),
  async projRoot(projectId){if(!projectId)return null;if(this.projHandles.has(projectId))return this.projHandles.get(projectId);let h=null;try{h=await idbGet('handles','proj_'+projectId)}catch(_){}if(h){try{if(await h.queryPermission({mode:'readwrite'})!=='granted'){if(await h.requestPermission({mode:'readwrite'})!=='granted')h=null}}catch(_){h=null}}this.projHandles.set(projectId,h);return h;},
  async setProjRoot(projectId,handle){await idbPut('handles','proj_'+projectId,handle);this.projHandles.set(projectId,handle);},
  async clearProjRoot(projectId){try{await idbDel('handles','proj_'+projectId)}catch(_){}this.projHandles.set(projectId,null);},
  /* ===== ストレージ方針 =====
     ・IndexedDB は「フォルダの鍵（handles）」の保持のみに使用（ブラウザ仕様上ここにしか保存できない）
     ・個人設定/接続一覧/プロジェクトのメタデータ（軽量JSON）→ localStorage
     ・動画・画像の実体 → プロジェクトフォルダ（フォルダ未設定なら保存不可＝要警告）
     ・旧IndexedDB(kv/blobs) は移行のため「読み込みのみ」フォールバック */
  _ls(key){try{const s=localStorage.getItem(key);return s?JSON.parse(s):null}catch(_){return null}},
  _lsSet(key,obj){try{localStorage.setItem(key,JSON.stringify(obj));return true}catch(e){return false}},
  async loadLocal(){return this._ls('layna_local')||(await idbGet('kv','local'))||null},
  async saveLocal(obj){if(!this._lsSet('layna_local',obj))toast('設定の保存に失敗しました（localStorage容量超過の可能性）')},
  async loadRegistry(){const v=this._ls('layna_registry');if(v)return v;return (await idbGet('kv','registry'))||null},
  async saveRegistry(arr){this._lsSet('layna_registry',arr)},
  _projFileName:'layna.project.json',
  async loadProject(id){
    const ph=await this.projRoot(id);
    if(ph){try{const fh=await ph.getFileHandle(this._projFileName);const t=await (await fh.getFile()).text();return JSON.parse(t)}catch(e){}}
    return this._ls('layna_proj_'+id)||(await idbGet('kv','proj_'+id))||null;
  },
  async saveProject(id,data){
    const ph=await this.projRoot(id);
    if(ph){try{const fh=await ph.getFileHandle(this._projFileName,{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(data,null,2));await w.close();
      /* フォルダに保存できたら localStorage の複製は残さない（データはフォルダ側を正とする） */
      try{localStorage.removeItem('layna_proj_'+id)}catch(_){}return}catch(e){}}
    /* フォルダ未設定：メタデータのみ localStorage に保持 */
    if(!this._lsSet('layna_proj_'+id,data))toast('プロジェクトデータの保存に失敗（フォルダ未設定・容量超過）');
  },
  async delProject(id){try{localStorage.removeItem('layna_proj_'+id)}catch(_){}try{await idbDel('kv','proj_'+id)}catch(_){}try{const ph=await this.projRoot(id);if(ph)await ph.removeEntry(this._projFileName)}catch(_){}},
  /* リール：プロジェクトフォルダ内 reels/reels.json に格納（共有可能）。フォルダ未設定なら localStorage */
  async loadReels(id){
    const ph=await this.projRoot(id);
    if(ph){try{const dir=await ph.getDirectoryHandle('reels');const fh=await dir.getFileHandle('reels.json');return JSON.parse(await (await fh.getFile()).text())}catch(e){}}
    return this._ls('layna_reels_'+id)||null;
  },
  async saveReels(id,reels){
    const ph=await this.projRoot(id);
    if(ph){try{const dir=await this._subdir('reels',ph,true);const fh=await dir.getFileHandle('reels.json',{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(reels,null,2));await w.close();
      try{localStorage.removeItem('layna_reels_'+id)}catch(_){}return}catch(e){}}
    this._lsSet('layna_reels_'+id,reels);
  },
  /* 旧: 単一DB（移行用に読むだけ） */
  async loadLegacyDb(){return (await idbGet('kv','db'))||null},
  /* 動画・画像はプロジェクトフォルダへ保存（ref は p:<id>|<path>）。
     フォルダ未設定なら保存できないため null を返す（呼び出し側で警告）。 */
  async putMedia(sub,fn,blob,opts){
    opts=opts||{};
    if(opts.projectId){const ph=await this.projRoot(opts.projectId);if(ph){const dir=await this._subdir(sub,ph,true);const fh=await dir.getFileHandle(fn,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return 'p:'+opts.projectId+'|'+sub+'/'+fn}}
    return null;
  },
  _parseRef(ref){if(ref.startsWith('p:')){const i=ref.indexOf('|');return{proj:ref.slice(2,i),path:ref.slice(i+1)}}return{proj:null,path:ref}},
  async _fileHandle(ref,create){const {proj,path}=this._parseRef(ref);const parts=path.split('/');const fn=parts.pop();let root=this.rootHandle;if(proj){root=await this.projRoot(proj);if(!root)return null}if(!root)return null;let dir=root;for(const p of parts)if(p)dir=await dir.getDirectoryHandle(p,{create:create===true});return{dir,fn};},
  async delMedia(ref){if(!ref)return;try{if(ref.startsWith('idb:'))await idbDel('blobs',ref.slice(4));else{const h=await this._fileHandle(ref);if(h)await h.dir.removeEntry(h.fn)}}catch(e){}const u=this.urlCache.get(ref);if(u){URL.revokeObjectURL(u);this.urlCache.delete(ref)}},
  async getURL(ref){if(!ref)return null;if(this.urlCache.has(ref))return this.urlCache.get(ref);let blob=null;try{if(ref.startsWith('idb:'))blob=await idbGet('blobs',ref.slice(4));else{const h=await this._fileHandle(ref);if(h)blob=await (await h.dir.getFileHandle(h.fn)).getFile()}}catch(e){return null}if(!blob)return null;const url=URL.createObjectURL(blob);this.urlCache.set(ref,url);return url},
};

/* ---------- 状態 / DB ---------- */
let DB=null;let curUploadUI=null;
let REG=[]; /* 接続プロジェクト一覧（このユーザーが使うプロジェクト）: [{id,name,folderName}] */
const state={currentId:null,search:'',expanded:new Set(),tabDrawers:{},openTasks:[]};
function defaultDb(){return{version:3,nodes:[],reels:[],notifications:[],submits:[]}}
/* プロジェクト（ルート）ID を求める */
function projectIdOf(nodeId){const n=getNode(nodeId);return n?rootOf(n).id:null}
/* リールが属するプロジェクト（最初のクリップのノードのルート） */
function reelProjectId(r){const c=(r.clips||[])[0];if(!c)return null;const n=getNode(c.nodeId);return n?rootOf(n).id:null}
/* あるプロジェクトに属する node/submit をまとめてプロジェクトデータ化 */
function projectData(pid){
  const root=getNode(pid);if(!root)return null;
  const nodes=[root,...descendants(pid)];
  const submits=(DB.submits||[]).filter(s=>s.projectId===pid);
  return{v:3,id:pid,name:root.name,nodes,submits};
}
/* registry を最新のルート情報に同期（追加・更新のみ。
   除去は削除/接続解除で明示的に行う＝フォルダ一時未接続でも登録は保持） */
function syncRegistryFromDb(){
  for(const root of childrenOf(null)){
    let e=REG.find(x=>x.id===root.id);
    if(!e){e={id:root.id,name:root.name,folderName:root.folderName||null};REG.push(e)}
    else{e.name=root.name;e.folderName=root.folderName||null}
  }
}
/* 変更検知用キャッシュ（未変更のファイル書き込みを省略） */
const _saveCache={local:'',reg:'',proj:{},reels:{}};
/* 保存：グローバル(local=通知のみ)＋registry＋各プロジェクト（データ・リール、変更分のみ） */
async function persist(){
  if(!DB)return;
  syncRegistryFromDb();
  const local={notifications:DB.notifications};
  const ls=JSON.stringify(local);if(ls!==_saveCache.local){await storage.saveLocal(local);_saveCache.local=ls}
  const rs=JSON.stringify(REG);if(rs!==_saveCache.reg){await storage.saveRegistry(REG);_saveCache.reg=rs}
  /* リールをプロジェクトごとに集約（フォルダ内 reels/ に格納して共有可能に） */
  const reelsByProj={};
  for(const r of (DB.reels||[])){const pid=r.projectId||reelProjectId(r);if(!pid)continue;r.projectId=pid;(reelsByProj[pid]=reelsByProj[pid]||[]).push(r)}
  for(const e of REG){
    const data=projectData(e.id);if(!data)continue;
    const ps=JSON.stringify(data);
    if(_saveCache.proj[e.id]!==ps){await storage.saveProject(e.id,data);_saveCache.proj[e.id]=ps}
    const rls=reelsByProj[e.id]||[];const rk=JSON.stringify(rls);
    if(_saveCache.reels[e.id]!==rk){await storage.saveReels(e.id,rls);_saveCache.reels[e.id]=rk}
  }
}

/* v1(projects/shots) → v2(nodes) 移行 */
function migrate(old){
  const nodes=[];
  for(const p of old.projects||[])nodes.push({id:p.id,parentId:null,name:p.name,description:p.description||'',thumbnail:p.thumbnail||null,createdAt:p.createdAt||nowIso(),versions:[]});
  for(const s of old.shots||[])nodes.push({id:s.id,parentId:s.projectId,name:s.name,description:s.description||'',thumbnail:s.thumbnail||null,createdAt:s.createdAt||nowIso(),versions:(s.versions||[]).map(v=>({...v,thumb:v.thumb||v.thumbnail||null}))});
  return{version:2,nodes};
}

/* ---------- ツリー操作 ---------- */
const getNode=id=>DB.nodes.find(n=>n.id===id)||null;
const childrenOf=id=>DB.nodes.filter(n=>n.parentId===id).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
function pathOf(id){const p=[];let n=getNode(id);while(n){p.unshift(n);n=n.parentId?getNode(n.parentId):null}return p}
function descendants(id){const out=[];const walk=pid=>{for(const c of childrenOf(pid)){out.push(c);walk(c.id)}};walk(id);return out}
/* プロジェクト（ルート）ごとのステータス定義。未設定はデフォルト4種 */
function projStatuses(node){
  let n=node;
  while(n&&n.parentId){const p=getNode(n.parentId);if(!p)break;n=p}
  return (n&&Array.isArray(n.statuses)&&n.statuses.length)?n.statuses:DEFAULT_STATUSES;
}
function nodeStatus(node){
  if(node.type==='review'){
    if(!(node.versions&&node.versions.length))return 'empty';
    return node.status||projStatuses(node)[0].id;
  }
  const ch=childrenOf(node.id);
  if(!ch.length)return 'empty';
  const sts=ch.map(nodeStatus).filter(s=>s!=='empty');
  if(!sts.length)return 'empty';
  if(sts.every(s=>s===sts[0]))return sts[0];
  return projStatuses(node)[0].id; /* 混在は先頭ステータス扱い */
}
function stInfo(node){
  const id=nodeStatus(node);
  if(id==='empty')return{label:'—',color:'#5a5a6a'};
  return projStatuses(node).find(s=>s.id===id)||{label:'—',color:'#5a5a6a'};
}
function reviewToStatus(st){return st}
/* 「完了」扱いのステータス判定（id か ラベルで判断） */
function isDoneStatus(root,statusId){
  if(!statusId||statusId==='empty')return false;
  if(statusId==='approved')return true;
  const s=projStatuses(root).find(x=>x.id===statusId);
  return !!(s&&/完了|承認|上がり|フィックス|ok\b|done|fix|approve|complete/i.test(s.label));
}
/* チェック待ち（未チェック）判定：まだ担当が判断していない＝初期ステータス（＝プロジェクトの先頭ステータス）。
   OK / リテイク / NG など担当が判断済みのものは「チェック待ち」ではない。 */
function isAwaitingCheck(root,statusId){
  if(!statusId||statusId==='empty')return false;
  if(statusId==='pending')return true;
  const sts=projStatuses(root);
  return !!(sts.length&&statusId===sts[0].id);
}
/* プロジェクト（ルート）が完了か。動画のあるレビューが全て完了ステータスなら完了 */
function projectDone(root){
  const reviews=[root,...descendants(root.id)].filter(n=>n.type==='review'&&n.versions&&n.versions.length);
  if(!reviews.length)return false;
  return reviews.every(r=>isDoneStatus(root,nodeStatus(r)));
}
/* プロジェクトのバッジ（進行中 / 完了） */
function projBadge(root){return projectDone(root)?{label:'完了',color:'#5affa0'}:{label:'進行中',color:'#5a9bff'};}

/* アプリのバージョン（更新確認用。更新のたびにここを上げる） */
const APP_VERSION='2026.07.09.8';
/* ---------- utils ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e};
/* --- 単色ラインアイコン（currentColor でツールの色味に追従） --- */
const ICONS={
  folder:'<path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h3.3l1.5 1.8H16A1.5 1.5 0 0 1 17.5 7.3v7.2A1.5 1.5 0 0 1 16 16H4a1.5 1.5 0 0 1-1.5-1.5z"/>',
  film:'<rect x="2.5" y="4" width="15" height="12" rx="1.5"/><path d="M6.5 4v12M13.5 4v12M2.5 8h4M13.5 8h4M2.5 12h4M13.5 12h4"/>',
  chart:'<path d="M3 3v14h14"/><path d="M7 13v-3M10.5 13V7M14 13v-5"/>',
  reel:'<circle cx="10" cy="10" r="7"/><circle cx="10" cy="10" r="2"/><path d="M10 3v3M10 14v3M3 10h3M14 10h3"/>',
  list:'<path d="M6 5.5h11M6 10h11M6 14.5h11"/><path d="M3 5.5h.01M3 10h.01M3 14.5h.01"/>',
  user:'<circle cx="10" cy="7" r="3"/><path d="M4.5 16.5a5.5 5.5 0 0 1 11 0"/>',
  trash:'<path d="M4 6h12M8 6V4.5A1 1 0 0 1 9 3.5h2a1 1 0 0 1 1 1V6M6.5 6l.6 9a1 1 0 0 0 1 .9h3.8a1 1 0 0 0 1-.9l.6-9"/>',
  comment:'<path d="M4 4.5h12A1.5 1.5 0 0 1 17.5 6v6A1.5 1.5 0 0 1 16 13.5H8l-4 3v-3A1.5 1.5 0 0 1 2.5 12V6A1.5 1.5 0 0 1 4 4.5z"/>',
  upload:'<path d="M10 13V4M6.5 7.5 10 4l3.5 3.5M4 16h12"/>',
  home:'<path d="M3.5 9.5 10 4l6.5 5.5M5 8.5V16h10V8.5"/>',
  play:'<path d="M6.5 4.5v11l9-5.5z"/>',
  section:'<path d="M2.5 5.5A1.5 1.5 0 0 1 4 4h3.3l1.5 1.8H16A1.5 1.5 0 0 1 17.5 7.3v7.2A1.5 1.5 0 0 1 16 16H4a1.5 1.5 0 0 1-1.5-1.5z"/>',
};

/* アイコン＋テキストの要素を作る（el 相当）。textは任意 */
function elIco(tag,cls,name,text){const e=el(tag,cls);e.appendChild(icoEl(name));if(text!=null){e.appendChild(document.createTextNode(text))}return e}

/* サムネが無いタイル用のプレースホルダ要素。elに追記して使う */
function thumbPh(doc){doc=doc||document;const w=doc.createElement('div');w.className='thumb-ph';const im=doc.createElement('img');im.src=PLACEHOLDER_THUMB;im.alt='未着手';im.draggable=false;w.appendChild(im);return w}
let authUser=null; // {name,email,photo,role} when Google認証時
const currentUser=()=>authUser?authUser.name:(($('#currentUser').value||'').trim()||'anonymous');
function toast(m){const t=el('div','toast',m);document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
function fmt(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return iso;const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}

   ゲート
   ============================================================ */
function chrome(on){$('.header').style.display=on?'':'none';$('.app-body').style.display=on?'':'none'}

/* ============================================================
   起動
   ============================================================ */
async function boot(){
  const g=$('#gateScreen');if(g)g.remove();chrome(true);
  /* グローバル(個人設定＝通知のみ) */
  const local=await storage.loadLocal();
  DB={version:3,nodes:[],reels:[],
      notifications:(local&&Array.isArray(local.notifications))?local.notifications:[],submits:[]};
  /* 接続プロジェクト一覧 */
  REG=await storage.loadRegistry();
  /* 旧・単一DBからの移行（registry未作成のときのみ） */
  if(!Array.isArray(REG)){
    REG=[];
    const legacy=await storage.loadLegacyDb();
    if(legacy){
      const lg=legacy.nodes?legacy:migrate(legacy);
      DB.nodes=Array.isArray(lg.nodes)?lg.nodes:[];
      DB.reels=Array.isArray(lg.reels)?lg.reels:[];
      DB.notifications=Array.isArray(lg.notifications)?lg.notifications:DB.notifications;
      DB.submits=Array.isArray(lg.submits)?lg.submits:[];
      normalizeNodes();
      syncRegistryFromDb();
      await persist(); /* 新フォーマットで書き出し（kv/db は保険で残す） */
    }else{
      await storage.saveRegistry(REG);
    }
  }else{
    /* 各プロジェクトのデータ・リールを読み込んでマージ */
    for(const e of REG){
      const data=await storage.loadProject(e.id);
      if(data&&Array.isArray(data.nodes)){
        for(const n of data.nodes)if(!DB.nodes.some(x=>x.id===n.id))DB.nodes.push(n);
        if(Array.isArray(data.submits))for(const s of data.submits)if(!DB.submits.some(x=>x.id===s.id))DB.submits.push(s);
      }
      const rls=await storage.loadReels(e.id);
      if(Array.isArray(rls))for(const r of rls)if(!DB.reels.some(x=>x.id===r.id))DB.reels.push(r);
    }
    /* 旧・localStorageのリール（layna_local.reels）を一度だけ取り込み（次回persistでフォルダへ移行） */
    if(local&&Array.isArray(local.reels))for(const r of local.reels)if(!DB.reels.some(x=>x.id===r.id))DB.reels.push(r);
    normalizeNodes();
  }
  updateFolderStatus();initSizeBtns();updateNotifBadge();

/* ============================================================
   メンション（@名前＝個人 / @ロール）
   ・表示は @名前 / @ロール。内部参照は個人=メール(id)、ロール=ロール名。
   ・保存：コメント/ノートに mentions:[{type:'user'|'role',id,name}]（通知用）
   ・入力：@ でメンバー/ロール候補のドロップダウン（ownerDocument 対応でポップアップ内でも動作）
   ・通知：他ユーザーの通知は共有できない（localStorage）ため、読込時に自分宛メンションを走査して通知
   ============================================================ */
function curRoot(){const c=state&&state.currentId?getNode(state.currentId):null;return c?rootOf(c):null}

function mentionCandidates(root){
  root=root||curRoot();const out=[];if(!root)return out;
  for(const m of projectMembers(root)){if(m.active===false)continue;out.push({type:'user',id:m.id,name:m.name||m.id,sub:(m.roles||[]).join(', ')||m.id,color:m.color})}
  for(const r of projectRoles(root))out.push({type:'role',id:r,name:r,sub:'ロール',color:null});
  return out;
}
/* テキストから @メンションを走査（候補名の最長一致） */
function scanMentions(text,root){
  root=root||curRoot();const cands=mentionCandidates(root).slice().sort((a,b)=>(b.name||'').length-(a.name||'').length);
  const res=[];const t=String(text||'');let i=0;
  while(i<t.length){
    if(t[i]==='@'){let m=null;for(const c of cands){if(c.name&&t.startsWith(c.name,i+1)){m=c;break}}
      if(m){res.push({type:m.type,id:m.id,name:m.name,start:i,end:i+1+m.name.length,color:m.color});i=i+1+m.name.length;continue}}
    i++;
  }
  return res;
}
/* 保存用メンション配列。tracked（ピッカーで実際に選んだ候補）で同名個人の id を優先 */
function extractMentions(text,root,tracked){
  root=root||curRoot();const scan=scanMentions(text,root);const seen=new Set();const out=[];
  for(const s of scan){let id=s.id;
    if(s.type==='user'&&tracked){const tk=tracked.find(x=>x.type==='user'&&x.name===s.name);if(tk)id=tk.id}
    const key=s.type+':'+String(id).toLowerCase();if(seen.has(key))continue;seen.add(key);
    out.push({type:s.type,id,name:s.name});
  }
  return out;
}
/* テキストを @メンションをチップ化して container に描画（ownerDocument 対応） */
function renderMentionText(container,text,root){
  const d=container.ownerDocument||document;const t=String(text||'');const parts=scanMentions(t,root);
  let pos=0;const push=s=>{if(s)container.appendChild(d.createTextNode(s))};
  for(const p of parts){push(t.slice(pos,p.start));const chip=d.createElement('span');chip.className='mention mention-'+p.type;chip.textContent='@'+p.name;if(p.type==='user'&&p.color)chip.style.color=p.color;container.appendChild(chip);pos=p.end}
  push(t.slice(pos));return container;
}
/* textarea に @ オートコンプリートを付与（重複付与ガード付き・ownerDocument 対応） */
function attachMention(ta,root){
  if(!ta||ta._mentionOn)return;ta._mentionOn=true;ta._mentions=ta._mentions||[];
  const d=ta.ownerDocument||document;let box=null,items=[],sel=0,anchor=-1;
  const close=()=>{if(box){box.remove();box=null}items=[];anchor=-1};
  const curToken=()=>{const c=ta.selectionStart;const s=ta.value.slice(0,c);const m=s.match(/(^|\s)@([^\s@]*)$/);if(!m)return null;return {q:m[2],start:c-m[2].length-1,end:c}};
  const hi=()=>{if(box)[...box.children].forEach((e,i)=>e.classList.toggle('on',i===sel))};
  const position=()=>{if(!box)return;const r=ta.getBoundingClientRect();box.style.position='fixed';box.style.left=Math.round(r.left)+'px';box.style.top=Math.round(r.bottom+4)+'px';box.style.minWidth=Math.min(260,Math.max(160,r.width))+'px';box.style.zIndex=99999};
  const choose=idx=>{const c=items[idx];if(!c)return;const tok=curToken()||{start:anchor,end:ta.selectionStart};
    const before=ta.value.slice(0,tok.start),after=ta.value.slice(tok.end),ins='@'+c.name+' ';
    ta.value=before+ins+after;const caret=(before+ins).length;try{ta.setSelectionRange(caret,caret)}catch(_){}
    if(!ta._mentions.some(m=>m.type===c.type&&String(m.id).toLowerCase()===String(c.id).toLowerCase()))ta._mentions.push({type:c.type,id:c.id,name:c.name});
    close();ta.focus();};
  const open=tok=>{const q=(tok.q||'').toLowerCase();const cands=mentionCandidates(root).filter(c=>!q||c.name.toLowerCase().includes(q)).slice(0,8);
    if(!cands.length){close();return}items=cands;sel=0;anchor=tok.start;
    if(!box){box=d.createElement('div');box.className='mention-pop';(d.body||d.documentElement).appendChild(box)}
    box.innerHTML='';cands.forEach((c,idx)=>{const it=d.createElement('div');it.className='mention-opt'+(idx===sel?' on':'')+(c.type==='role'?' is-role':'');
      const nm=d.createElement('span');nm.className='mo-nm';nm.textContent='@'+c.name;const sb=d.createElement('span');sb.className='mo-sub';sb.textContent=(c.type==='role'?'ロール':c.sub);
      it.appendChild(nm);it.appendChild(sb);it.onmousedown=e=>{e.preventDefault();choose(idx)};box.appendChild(it)});
    position();};

    else if((e.key==='Enter'&&!e.ctrlKey&&!e.metaKey)||e.key==='Tab'){e.preventDefault();choose(sel)}

}
/* ==== 自分宛メンションの通知（読込時＋通知パネル表示時に走査。localStorage で既知キーを管理） ==== */
/* 自分の識別：ログインメール(id) と 表示名/入力名 の両方で照合（メンバー未登録でも id 一致すれば拾う） */
function myIdentity(root){
  const email=((authUser&&authUser.email)||'').toLowerCase();
  let name=(currentUser()||'').trim();if(name==='anonymous')name='';
  let me=null;
  if(email)me=memberById(root,email);
  if(!me&&name)me=projectMembers(root).find(m=>(m.name||'').trim()===name);
  const ids=new Set();if(email)ids.add(email);if(me)ids.add(String(me.id).toLowerCase());
  const roles=new Set(me?(me.roles||[]).map(r=>String(r)):[]);
  return {ids,roles,name};
}
function _seenMentions(){try{return new Set(JSON.parse(localStorage.getItem('layna.seenMentions')||'[]'))}catch(_){return new Set()}}
function _saveSeenMentions(set){try{localStorage.setItem('layna.seenMentions',JSON.stringify([...set].slice(-3000)))}catch(_){}}
function scanMentionsForMe(){
  if(!DB)return;const seen=_seenMentions();const pending=[];
  for(const root of childrenOf(null)){
    const me=myIdentity(root);
    if(!me.ids.size&&!me.name)continue; /* 誰か特定できないときはスキップ */
    const hit=ms=>Array.isArray(ms)&&ms.some(x=>x.type==='user'
        ?(me.ids.has(String(x.id).toLowerCase())||(me.name&&x.name&&String(x.name).trim()===me.name))
        :(x.type==='role'&&me.roles.has(String(x.id))));
    const consider=(obj,author,text,nodeId)=>{if(!obj||!obj.mentions||!obj.mentions.length||!hit(obj.mentions))return;
      /* 自分宛メンションは自分の発言でも通知（@自分メモ・動作確認のため） */
      const key='mn:'+(obj.id||'')+':'+(obj.time||'')+':'+nodeId;if(seen.has(key))return;seen.add(key);
      pending.push({title:'メンションされました',text:(author||'誰か')+'：'+String(text||'').replace(/\s+/g,' ').slice(0,80),nodeId})};
    for(const n of descendants(root.id)){
      for(const c of (n.comments||[]))consider(c,c.author,c.text,n.id);
      if(n.type==='review')for(const v of (n.versions||[]))for(const note of ((v.review&&v.review.notes)||[]))consider(note,note.author,note.text,n.id);
    }
    /* レビュー依頼：サブミット提出時、自分がチェック担当のカットを通知 */
    for(const sb of (DB.submits||[])){
      if(!sb||sb.projectId!==root.id||!Array.isArray(sb.items))continue;
      if((sb.by||'')===currentUser())continue; /* 自分が提出したものは通知しない */
      for(const it of sb.items){
        const n=getNode(it.nodeId);if(!n||!n.reviewer)continue;
        if(!me.ids.has(String(n.reviewer).toLowerCase()))continue; /* 自分がチェック担当のときのみ */
        const key='rq:'+sb.id+':'+it.nodeId;if(seen.has(key))continue;seen.add(key);
        pending.push({title:'チェック依頼',text:(sb.by||'誰か')+'：'+(shotOf(n)?shotOf(n)+' / ':'')+n.name+'（'+(sb.name||'サブミット')+'）',nodeId:it.nodeId});
      }
    }
  }
  _saveSeenMentions(seen);
  if(pending.length){if(!Array.isArray(DB.notifications))DB.notifications=[];
    for(const p of pending.reverse())DB.notifications.unshift({id:newId('ntf'),title:p.title,text:p.text,time:nowIso(),read:false,nodeId:p.nodeId||null});
    if(DB.notifications.length>300)DB.notifications.length=300;
    updateNotifBadge();persist(); /* 通知を localStorage に保存（次回読込でも保持） */
    const pn=$('#notifPanel');if(pn&&!pn.classList.contains('hidden'))renderNotifPanel();
  }
}
