<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Layna</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c1f;--bg4:#232327;
  --border:#2a2a2f;--border2:#3a3a42;
  --text:#e8e8ec;--text2:#9a9aaa;--text3:#5a5a6a;
  --accent:#7c6fff;--accent2:#5a4fff;
  --red:#ff5a5a;--green:#5affa0;--amber:#ffb85a;
  --radius:10px;--radius2:6px;
  --font-head:'Syne',sans-serif;--font-body:'Noto Sans JP',sans-serif;
  --cols:4;
}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;background:none;border:none;color:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;cursor:pointer}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:100}
.logo{order:-1;display:inline-flex;flex-direction:column;align-items:flex-start;flex-shrink:0;line-height:1}
.logo .name{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:.5px}
.logo .name b{color:var(--accent)}
.logo .ver{font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-top:2px}
.home-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;font-size:18px;background:var(--bg4);border:1px solid transparent;border-radius:var(--radius2);transition:all .15s}
.home-btn:hover{background:rgba(124,111,255,.15);border-color:var(--accent)}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:13px}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.folder-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);cursor:pointer}
.folder-status:hover{border-color:var(--border2)}
.folder-status .dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.folder-status.connected .dot{background:var(--green)}
.user-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3)}
.user-field input{width:96px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:12px}
.size-btns{display:flex;gap:2px}
.size-btn{width:30px;height:30px;border-radius:var(--radius2);border:1px solid var(--border);color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center}
.size-btn.active{color:var(--green);border-color:var(--green)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,90,90,.12)}
.btn-sm{padding:4px 9px;font-size:12px}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:12px 8px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 8px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sidebar-label .add{color:var(--accent);cursor:pointer;font-size:14px}
/* TREE */
.tree{font-size:13px}
.tree-row{display:flex;align-items:center;gap:5px;padding:5px 6px;border-radius:6px;color:var(--text2);cursor:pointer;white-space:nowrap;overflow:hidden}
.tree-row:hover{background:var(--bg4);color:var(--text)}
.tree-row.active{background:rgba(124,111,255,.16);color:var(--text)}
.tree-toggle{width:14px;text-align:center;color:var(--text3);flex-shrink:0;font-size:9px;transition:transform .1s}
.tree-toggle.open{transform:rotate(90deg)}
.tree-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tree-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-badge{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:0 6px}
.tree-empty{color:var(--text3);font-size:12px;padding:8px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:12px 20px 0;color:var(--text3);font-size:13px;flex-wrap:wrap}
.breadcrumb .sep{opacity:.5}
.breadcrumb .cur{color:var(--text)}
.main-head{display:flex;align-items:center;gap:12px;padding:8px 20px 0}
.main-head h1{font-family:var(--font-head);font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.main-head .desc{color:var(--text3);font-size:12px;margin-top:3px}
.main-head .spacer{flex:1}
.scroll{flex:1;overflow-y:auto;padding:14px 20px 28px}
.section-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label:first-child{margin-top:8px}
.section-label .acts{margin-left:auto;display:flex;gap:6px}

/* GRID / CARDS */
.grid{display:grid;gap:12px;grid-template-columns:repeat(var(--cols,4),1fr)}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.vcard:hover{border-color:var(--border2);transform:translateY(-5px);box-shadow:0 14px 32px rgba(0,0,0,.45)}
.vcard-thumb{position:relative;padding-bottom:56.25%;background:#111;overflow:hidden}
.vcard-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vcard-noimg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#161225,#1e1830);color:rgba(255,255,255,.4)}
.vcard-noimg .g{font-size:30px}
.vcard-noimg .lab{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;font-family:var(--font-head)}
.vcard-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.85);text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none}
.vcard-badge{position:absolute;top:6px;left:6px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;z-index:3;backdrop-filter:blur(4px)}
.vcard-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .15s;z-index:4}
.vcard:hover .vcard-actions{opacity:1}
.vcard-act{width:26px;height:26px;border-radius:5px;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.vcard-act:hover{background:rgba(255,90,90,.55)}
.vcard-cnt{position:absolute;bottom:6px;right:8px;font-size:10px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.5);padding:1px 6px;border-radius:8px;z-index:3}
.vcard-ov{position:absolute;left:0;right:0;bottom:0;padding:18px 10px 9px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:2;pointer-events:none}
.vcard-ov .t{font-size:12px;font-weight:500;color:#fff;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.badge-empty{background:rgba(90,90,106,.25);color:#9a9aaa}
.badge-pending{background:rgba(120,120,140,.3);color:#cbd5e1}
.badge-approved{background:rgba(42,157,92,.8);color:#fff}
.badge-retake{background:rgba(255,184,90,.85);color:#1a1200}
.badge-rejected{background:rgba(255,90,90,.8);color:#fff}
.add-tile{border:1px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text3);cursor:pointer;min-height:130px;transition:all .15s}
.add-tile:hover{border-color:var(--accent);color:var(--text2);background:rgba(124,111,255,.05)}
.add-tile .p{font-size:26px}
.empty{color:var(--text3);text-align:center;padding:50px 20px;border:1px dashed var(--border);border-radius:var(--radius)}

/* LOG */
.log{display:flex;flex-direction:column;gap:8px}
.log-item{display:flex;gap:12px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;cursor:pointer;transition:border-color .15s}
.log-item:hover{border-color:var(--border2)}
.log-thumb{width:104px;height:59px;border-radius:5px;background:#111 center/cover no-repeat;flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.log-thumb .play{position:absolute;font-size:20px;color:rgba(255,255,255,.85)}
.log-main{flex:1;min-width:0}
.log-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.log-meta{font-size:11px;color:var(--text3);margin-top:3px}
.log-note{font-size:12px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-drop{border:1px dashed var(--border2);border-radius:10px;padding:16px;text-align:center;color:var(--text3);font-size:13px;cursor:pointer;margin-bottom:12px}
.file-drop:hover{border-color:var(--accent);color:var(--text2)}
.file-drop input{display:none}
.uploading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:12px;margin-bottom:12px}
.bar{height:6px;background:var(--bg3);border-radius:4px;overflow:hidden;flex:1}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .2s}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:in .25s cubic-bezier(.16,1,.3,1)}
.modal.lg{max-width:940px}
@keyframes in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.modal-title .sub{font-family:var(--font-body);font-size:12px;color:var(--text3);font-weight:400;margin-top:2px}
.modal-close{font-size:20px;color:var(--text3);width:30px;height:30px;border-radius:6px}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);color:var(--text);font-size:14px}
.form-input:focus{outline:none;border-color:var(--accent)}
textarea.form-input{height:70px;resize:vertical}
.divider{border-top:1px solid var(--border);margin:18px 0}
.review-media{width:100%;background:#000;border-radius:10px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
.review-media img,.review-media video{width:100%;display:block;max-height:56vh;object-fit:contain}
.review-actions{display:flex;gap:8px;margin:6px 0 4px;flex-wrap:wrap}
.review-actions .btn.ok{background:var(--green);color:#04120a}
.review-actions .btn.retake{background:var(--amber);color:#1a1200}
.review-actions .btn.reject{background:var(--red);color:#fff}
.notes{margin-top:14px}
.note{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.note .m{color:var(--text3);font-size:11px;margin-bottom:4px}
.note-input{display:flex;gap:8px;margin-top:10px}
.note-input input{flex:1}
.tmpl-pick{display:flex;flex-direction:column;gap:8px}
.tmpl-opt{border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer}
.tmpl-opt:hover{border-color:var(--accent)}
.tmpl-opt .tn{font-weight:600;font-size:13px}
.tmpl-opt .ts{font-size:11px;color:var(--text3);margin-top:3px}
.seg{display:flex;gap:6px}
.seg-opt{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;text-align:center;line-height:1.5}
.seg-opt small{display:block;font-size:10px;color:var(--text3)}
.seg-opt.active{border-color:var(--accent);background:rgba(124,111,255,.14);color:var(--text)}
.seg-opt.active small{color:var(--text2)}
.type-chip{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.vcard-type{position:absolute;bottom:6px;left:8px;font-size:10px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.5);padding:1px 7px;border-radius:8px;z-index:3}
.gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:44px 36px;max-width:520px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.gate-logo{font-family:var(--font-head);font-size:40px;font-weight:700}
.gate-logo b{color:var(--accent)}
.gate-sub{color:var(--text2);line-height:1.8;margin:14px 0 4px;font-size:13px}
.gate-sub code{background:var(--bg4);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--accent)}
.gate-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.gate-note{color:var(--text3);font-size:12px;margin-top:16px}
.gbtn{display:inline-flex;align-items:center;gap:10px;padding:11px 22px;background:#fff;color:#1a1a1a;border-radius:8px;font-weight:600;font-size:14px}
.gbtn:hover{filter:brightness(.94)}
.gbtn .gg{font-weight:700;color:#4285F4}
.spin{width:34px;height:34px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:6px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar{width:26px;height:26px;border-radius:50%;border:1px solid var(--border2);object-fit:cover}
.hd-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.hd-user .lo{color:var(--text3);cursor:pointer;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 8px}
.hd-user .lo:hover{color:var(--text);border-color:var(--border2)}
.deny-email{font-size:13px;color:var(--text3);margin:8px 0 18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:11px 18px;border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:2000;font-size:13px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px;border:2px solid var(--bg)}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><span class="name">La<b>y</b>na</span><span class="ver">PROJECT</span></div>
  <button class="home-btn" id="homeBtn" title="トップへ">◐</button>
  <div class="search-wrap"><span class="si">⌕</span><input id="searchInput" type="text" placeholder="この階層を検索..." /></div>
  <div class="header-actions">
    <div class="size-btns" id="sizeBtns"></div>
    <div class="folder-status" id="folderStatus" title="保存先フォルダ / クリックで変更"><span class="dot"></span><span id="folderName">未接続</span></div>
    <label class="user-field" id="nameField"><span>👤</span><input id="currentUser" type="text" placeholder="名前" /></label>
    <div class="hd-user hidden" id="authUserBox"></div>
    <button class="btn btn-primary" id="addBtn">+ 追加</button>
  </div>
</header>
<div class="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div class="main-head" id="mainHead"></div>
    <div class="scroll" id="scroll"></div>
  </main>
</div>
<div class="modal-overlay hidden" id="modal"><div class="modal" id="modalBody"></div></div>

<script>
'use strict';
/* ============================================================
   Layna — 任意階層ツリー版（ShotGrid ライク / OGREF デザイン）
   どのノードも「子（枝分かれ）」と「動画ログ（工程ごとの履歴）」を持てる。
   階層の数・名前はユーザーが自由に作成。保存はローカルフォルダ。
   ============================================================ */

const STATUS={
  empty:{label:'—',cls:'empty',color:'#3a3a42'},
  pending:{label:'チェック待ち',cls:'pending',color:'#7a7a90'},
  approved:{label:'OK',cls:'approved',color:'#5affa0'},
  retake:{label:'リテイク',cls:'retake',color:'#ffb85a'},
  rejected:{label:'NG',cls:'rejected',color:'#ff5a5a'},
};
function defaultTemplates(){return[
  {id:'tpl_anim',name:'アニメ工程（レイアウト→アニメ→セカンダリ）',steps:[{name:'レイアウト',color:'#7c6fff'},{name:'アニメーション',color:'#5a9bff'},{name:'セカンダリ',color:'#c06fff'}]},
  {id:'tpl_cg',name:'CG工程（モデリング〜コンポジット）',steps:[{name:'モデリング',color:'#7c6fff'},{name:'アニメーション',color:'#5a9bff'},{name:'ライティング',color:'#ffb85a'},{name:'コンポジット',color:'#5affa0'}]},
  {id:'tpl_shots',name:'ショット3つ（ショット01〜03）',steps:[{name:'ショット01',color:'#7c6fff'},{name:'ショット02',color:'#7c6fff'},{name:'ショット03',color:'#7c6fff'}]},
];}

let _c=0;
function newId(p){_c++;return p+'_'+Date.now().toString(36)+_c.toString(36)}
function nowIso(){try{return new Date().toISOString()}catch(_){return''}}

/* ---------- IndexedDB ---------- */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('layna',1);r.onupgradeneeded=()=>{const d=r.result;for(const s of['handles','blobs','kv'])if(!d.objectStoreNames.contains(s))d.createObjectStore(s)};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function idbPut(s,k,v){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).put(v,k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}
async function idbGet(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readonly');const q=t.objectStore(s).get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error)})}
async function idbDel(s,k){const d=await idbOpen();return new Promise((res,rej)=>{const t=d.transaction(s,'readwrite');t.objectStore(s).delete(k);t.oncomplete=()=>res();t.onerror=()=>rej(t.error)})}

/* ---------- ストレージ抽象化（folder / idb） ---------- */
const storage={
  mode:null,rootHandle:null,_pending:null,urlCache:new Map(),
  supportsFolder(){return typeof window.showDirectoryPicker==='function'},
  async pickFolder(){const h=await window.showDirectoryPicker({mode:'readwrite',id:'layna-root'});if(!await this._perm(h))throw new Error('書き込み許可が必要です');this.rootHandle=h;this.mode='folder';await idbPut('handles','root',h);try{localStorage.setItem('layna_mode','folder')}catch(_){}return h.name},
  async tryReconnect(){if(!this.supportsFolder())return false;const h=await idbGet('handles','root');if(!h)return false;if(await h.queryPermission({mode:'readwrite'})==='granted'){this.rootHandle=h;this.mode='folder';return true}this._pending=h;return false},
  async resumePending(){if(!this._pending)return false;if(!await this._perm(this._pending))return false;this.rootHandle=this._pending;this.mode='folder';this._pending=null;return true},
  async _perm(h){const o={mode:'readwrite'};if(await h.queryPermission(o)==='granted')return true;return (await h.requestPermission(o))==='granted'},
  useIdb(){this.mode='idb';try{localStorage.setItem('layna_mode','idb')}catch(_){}},
  folderLabel(){if(this.mode==='folder'&&this.rootHandle)return this.rootHandle.name;if(this.mode==='idb')return 'ブラウザ内保存';return '未接続'},
  async _subdir(n){return this.rootHandle.getDirectoryHandle(n,{create:true})},
  async loadDb(){if(this.mode==='folder'){try{const fh=await this.rootHandle.getFileHandle('layna_db.json');return JSON.parse(await (await fh.getFile()).text())}catch(e){return null}}return (await idbGet('kv','db'))||null},
  async saveDb(db){if(this.mode==='folder'){const fh=await this.rootHandle.getFileHandle('layna_db.json',{create:true});const w=await fh.createWritable();await w.write(JSON.stringify(db,null,2));await w.close()}else{await idbPut('kv','db',db)}},
  async putMedia(sub,fn,blob){if(this.mode==='folder'){const dir=await this._subdir(sub);const fh=await dir.getFileHandle(fn,{create:true});const w=await fh.createWritable();await w.write(blob);await w.close();return sub+'/'+fn}const key='blob_'+newId('b')+'_'+fn;await idbPut('blobs',key,blob);return 'idb:'+key},
  async delMedia(ref){if(!ref)return;try{if(ref.startsWith('idb:'))await idbDel('blobs',ref.slice(4));else if(this.mode==='folder'){const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);await dir.removeEntry(fn)}}catch(e){}const u=this.urlCache.get(ref);if(u){URL.revokeObjectURL(u);this.urlCache.delete(ref)}},
  async getURL(ref){if(!ref)return null;if(this.urlCache.has(ref))return this.urlCache.get(ref);let blob=null;try{if(ref.startsWith('idb:'))blob=await idbGet('blobs',ref.slice(4));else{const[sub,fn]=ref.split('/');const dir=await this.rootHandle.getDirectoryHandle(sub);blob=await (await dir.getFileHandle(fn)).getFile()}}catch(e){return null}if(!blob)return null;const url=URL.createObjectURL(blob);this.urlCache.set(ref,url);return url},
};

/* ---------- 状態 / DB ---------- */
let DB=null;
const state={currentId:null,search:'',expanded:new Set()};
function defaultDb(){return{version:2,templates:defaultTemplates(),nodes:[]}}
async function persist(){await storage.saveDb(DB)}

/* v1(projects/shots) → v2(nodes) 移行 */
function migrate(old){
  const nodes=[];
  for(const p of old.projects||[])nodes.push({id:p.id,parentId:null,name:p.name,description:p.description||'',thumbnail:p.thumbnail||null,createdAt:p.createdAt||nowIso(),versions:[]});
  for(const s of old.shots||[])nodes.push({id:s.id,parentId:s.projectId,name:s.name,description:s.description||'',thumbnail:s.thumbnail||null,createdAt:s.createdAt||nowIso(),versions:(s.versions||[]).map(v=>({...v,thumb:v.thumb||v.thumbnail||null}))});
  const templates=(old.pipelineTemplates&&old.pipelineTemplates.length)?old.pipelineTemplates.map(t=>({id:t.id,name:t.name,steps:(t.steps||[]).map(st=>({name:st.name,color:st.color||'#7c6fff'}))})):defaultTemplates();
  return{version:2,templates,nodes};
}

/* ---------- ツリー操作 ---------- */
const getNode=id=>DB.nodes.find(n=>n.id===id)||null;
const childrenOf=id=>DB.nodes.filter(n=>n.parentId===id).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
function pathOf(id){const p=[];let n=getNode(id);while(n){p.unshift(n);n=n.parentId?getNode(n.parentId):null}return p}
function descendants(id){const out=[];const walk=pid=>{for(const c of childrenOf(pid)){out.push(c);walk(c.id)}};walk(id);return out}
function nodeStatus(node){
  if(node.versions&&node.versions.length)return node.versions[node.versions.length-1].review.status;
  const ch=childrenOf(node.id);
  if(!ch.length)return 'empty';
  const sts=ch.map(nodeStatus);
  if(sts.every(s=>s==='approved'))return 'approved';
  if(sts.some(s=>s==='rejected'))return 'rejected';
  if(sts.some(s=>s==='retake'))return 'retake';
  if(sts.some(s=>s!=='empty'))return 'pending';
  return 'empty';
}
function reviewToStatus(st){return st}

const el=(t,c,x)=>{const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e};

function fmt(iso){if(!iso)return'';const d=new Date(iso);if(isNaN(d))return iso;const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())}

/* ============================================================

   ============================================================ */
async function boot(){
  const g=$('#gateScreen');if(g)g.remove();chrome(true);
  let raw=await storage.loadDb();
  if(!raw)DB=defaultDb();
  else if(raw.nodes)DB=raw;               // v2
  else DB=migrate(raw);                    // v1 → v2
  if(!Array.isArray(DB.nodes))DB.nodes=[];
  if(!Array.isArray(DB.templates)||!DB.templates.length)DB.templates=defaultTemplates();
  // ページ種別の補完（未設定は: 動画があればレビュー、なければセクション）
  for(const n of DB.nodes)if(!n.type)n.type=(n.versions&&n.versions.length)?'review':'section';
  await persist();
  updateFolderStatus();initSizeBtns();
  state.currentId=null;go(null);
}
function updateFolderStatus(){$('#folderStatus').classList.toggle('connected',!!storage.mode);$('#folderName').textContent=storage.folderLabel()}
function initSizeBtns(){const wrap=$('#sizeBtns');wrap.innerHTML='';let cols=4;try{cols=parseInt(localStorage.getItem('layna_cols')||'4')}catch(_){}document.documentElement.style.setProperty('--cols',cols);[['S',6],['M',4],['L',3]].forEach(([lab,n])=>{const b=el('button','size-btn'+(n===cols?' active':''),lab);b.onclick=()=>{document.documentElement.style.setProperty('--cols',n);try{localStorage.setItem('layna_cols',n)}catch(_){}for(const x of wrap.children)x.classList.remove('active');b.classList.add('active')};wrap.appendChild(b)})}

    mFoot(body,[(()=>{const b=el('button','btn btn-ghost','閉じる');b.onclick=closeModal;return b})()]);
  });
}

/* 名称変更 */
function openRename(node){
  openModal(body=>{

    const nameRow=frow('名前','input');nameRow.f.value=node.name;
    inner.appendChild(nameRow.r);

    if(kids||vers)inner.appendChild(el('div','form-label','※ 種別を変えてもデータは消えません（レビューにすると子項目は非表示、セクションにすると動画ログは非表示になります）。現在: 子'+kids+'件 / 動画'+vers+'本'));
    const descRow=frow('説明','textarea');descRow.f.value=node.description||'';

    mFoot(body,[cancel,save]);

/* 削除（子孫・メディアも） */
async function deleteNode(node){
  const desc=descendants(node.id);const cnt=desc.length;
  if(!confirm('「'+node.name+'」'+(cnt?('と配下の'+cnt+'項目'):'')+'を削除しますか？（動画も削除されます）'))return;
  const all=[node,...desc];
  for(const n of all)for(const v of n.versions||[]){await storage.delMedia(v.file);await storage.delMedia(v.thumb)}
  const ids=new Set(all.map(n=>n.id));
  DB.nodes=DB.nodes.filter(n=>!ids.has(n.id));
  await persist();
  const parent=node.parentId;go(getNode(parent)?parent:null);
}

/* ============================================================
   アップロード / レビュー
   ============================================================ */
async function uploadVersion(node,file,ui){
  ui.prog.classList.remove('hidden');ui.pct.textContent='サムネイル生成中...';ui.bi.style.width='30%';
  const isVideo=file.type.startsWith('video/');
  try{
    const thumbDataUrl=await genThumb(file);ui.pct.textContent='保存中...';ui.bi.style.width='60%';
    const ext=(file.name.match(/\.[^.]+$/)||[''])[0];const id=newId('media');
    const mediaRef=await storage.putMedia('media',id+ext,file);
    let thumbRef=null;if(thumbDataUrl){const blob=await(await fetch(thumbDataUrl)).blob();thumbRef=await storage.putMedia('thumbnails',id+'.jpg',blob)}else if(!isVideo)thumbRef=mediaRef;
    const version={id:newId('ver'),name:'v'+String(node.versions.length+1).padStart(2,'0'),type:isVideo?'video':'image',file:mediaRef,thumb:thumbRef,uploadedBy:currentUser(),uploadedAt:nowIso(),review:{status:'pending',notes:[]}};
    node.versions.push(version);if(thumbRef)node.thumbnail=thumbRef;
    await persist();ui.bi.style.width='100%';render();resolveThumbs();toast('アップロード完了: '+version.name);
  }catch(e){ui.prog.classList.add('hidden');toast('アップロード失敗: '+e.message)}
}
function genThumb(file){return new Promise(resolve=>{const isVideo=file.type.startsWith('video/');const url=URL.createObjectURL(file);const done=cv=>{URL.revokeObjectURL(url);resolve(cv?cv.toDataURL('image/jpeg',0.72):null)};const draw=(src,w,h)=>{const scale=Math.min(1,640/w);const cv=document.createElement('canvas');cv.width=Math.round(w*scale);cv.height=Math.round(h*scale);cv.getContext('2d').drawImage(src,0,0,cv.width,cv.height);return cv};if(isVideo){const vid=document.createElement('video');vid.preload='metadata';vid.muted=true;vid.src=url;vid.onloadeddata=()=>{try{vid.currentTime=Math.min(1,(vid.duration||2)/2)}catch(_){}}; vid.onseeked=()=>{try{done(draw(vid,vid.videoWidth,vid.videoHeight))}catch(_){done(null)}};vid.onerror=()=>done(null)}else{const img=new Image();img.onload=()=>done(draw(img,img.naturalWidth,img.naturalHeight));img.onerror=()=>done(null);img.src=url}})}

function openReview(nodeId,versionId){
  openModal(async body=>{
    const node=getNode(nodeId);const v=node.versions.find(x=>x.id===versionId);
    const inner=mHead(body,node.name+' — '+v.name,'by '+(v.uploadedBy||'-')+'・'+fmt(v.uploadedAt));
    const mb=el('div','review-media');const url=await storage.getURL(v.file);
    if(v.type==='video'){const vid=el('video');vid.src=url||'';vid.controls=true;mb.appendChild(vid)}else{const img=el('img');img.src=url||'';mb.appendChild(img)}
    inner.appendChild(mb);
    // 判定
    const st=STATUS[v.review.status];const line=el('div');line.style.marginBottom='8px';line.appendChild(document.createTextNode('判定: '));const b=el('span','badge badge-'+st.cls,st.label);line.appendChild(b);inner.appendChild(line);
    const acts=el('div','review-actions');const mk=(l,c,s)=>{const bt=el('button','btn '+c,l);bt.onclick=async()=>{v.review.status=s;await persist();closeModal();openReview(nodeId,versionId);render();resolveThumbs()};return bt};
    acts.appendChild(mk('OK（承認）','ok','approved'));acts.appendChild(mk('リテイク','retake','retake'));acts.appendChild(mk('NG','reject','rejected'));acts.appendChild(mk('保留','btn-ghost','pending'));inner.appendChild(acts);
    // コメント
    inner.appendChild(el('div','divider'));inner.appendChild(el('div','form-label','コメント / ログ'));
    const notes=el('div','notes');
    if(!v.review.notes.length)notes.appendChild(el('div','form-label','コメントはまだありません。'));
    for(const n of v.review.notes){const note=el('div','note');note.appendChild(el('div','m',n.author+'・'+fmt(n.time)));note.appendChild(el('div',null,n.text));notes.appendChild(note)}
    const iw=el('div','note-input');const input=el('input','form-input');input.placeholder='コメントを入力...';const sb=el('button','btn btn-primary','送信');
    const send=async()=>{if(!input.value.trim())return;v.review.notes.push({author:currentUser(),text:input.value.trim(),time:nowIso()});await persist();closeModal();openReview(nodeId,versionId);render()};
    sb.onclick=send;input.onkeydown=e=>{if(e.key==='Enter')send()};iw.appendChild(input);iw.appendChild(sb);notes.appendChild(iw);inner.appendChild(notes);
    // 削除
    const del=el('button','btn btn-danger','このバージョンを削除');del.onclick=async()=>{if(!confirm(v.name+' を削除しますか？'))return;await storage.delMedia(v.file);await storage.delMedia(v.thumb);node.versions=node.versions.filter(x=>x.id!==v.id);node.thumbnail=node.versions.length?node.versions[node.versions.length-1].thumb:null;await persist();closeModal();render();resolveThumbs()};
    mFoot(body,[del]);
  },true);
}

async function startAppFlow(){
  let prev=null;try{prev=localStorage.getItem('layna_mode')}catch(_){}
  try{
    if(await storage.tryReconnect()){await boot();return}
    if(storage._pending){renderGate();return}
    if(prev==='idb'){storage.useIdb();await boot();return}
    renderGate();
  }catch(e){renderGate()}
}

/* ===== 認証（Googleログイン + git許可リスト access.json）===== */
let accessCfg=null,AUTH_ON=false;
function roleFor(email){
  if(!accessCfg||!email)return null;const e=email.toLowerCase();
  const has=arr=>(arr||[]).some(x=>String(x).toLowerCase()===e);
  if(has(accessCfg.operatorEmails))return 'operator';
  if(has(accessCfg.adminEmails))return 'admin';
  if(has(accessCfg.allowedEmails))return 'member';
  const dom=e.split('@')[1]||'';
  if((accessCfg.allowedDomains||[]).some(d=>String(d).toLowerCase().replace(/^@/,'')===dom))return 'member';
  return null;
}
function authScreen(build){chrome(false);let s=$('#authScreen');if(s)s.remove();s=el('div','gate');s.id='authScreen';const box=el('div','gate-box');build(box);s.appendChild(box);document.body.appendChild(s)}
function clearAuthScreen(){const s=$('#authScreen');if(s)s.remove()}
function renderAuthLoading(){authScreen(box=>{box.innerHTML='<div class="gate-logo">La<b>y</b>na</div><div class="spin"></div><div class="gate-sub">認証を確認しています…</div>'})}
function renderLogin(msg){authScreen(box=>{
  box.innerHTML='<div class="gate-logo">La<b>y</b>na</div>';
  box.appendChild(el('div','gate-sub','社内メンバー専用。Googleアカウントでログインしてください。'));
  const acts=el('div','gate-actions');const b=el('button','gbtn');b.innerHTML='<span class="gg">G</span> Google でログイン';
  b.onclick=async()=>{if(window.__laynaFB){try{await window.__laynaFB.login()}catch(e){toast('ログイン失敗: '+e.message)}}else toast('認証を初期化中です。数秒後に再試行してください。')};
  acts.appendChild(b);box.appendChild(acts);
  if(msg)box.appendChild(el('div','gate-note',msg));
})}
function renderDenied(user){authScreen(box=>{
  box.innerHTML='<div class="gate-logo">La<b>y</b>na</div>';
  box.appendChild(el('div','gate-sub','このアカウントにはアクセス権がありません。'));
  box.appendChild(el('div','deny-email','ログイン中: '+(user.email||'')));
  const acts=el('div','gate-actions');const b=el('button','btn btn-ghost','別のアカウントでログイン');b.onclick=async()=>{if(window.__laynaFB)await window.__laynaFB.logout()};acts.appendChild(b);box.appendChild(acts);
  box.appendChild(el('div','gate-note','管理者に access.json の allowedEmails への追加を依頼してください。'));
})}
function showAuthedHeader(){
  $('#nameField').classList.add('hidden');
  const bx=$('#authUserBox');bx.classList.remove('hidden');bx.innerHTML='';
  if(authUser.photo){const img=el('img','avatar');img.src=authUser.photo;img.referrerPolicy='no-referrer';bx.appendChild(img)}
  bx.appendChild(el('span',null,authUser.name+((authUser.role==='admin'||authUser.role==='operator')?'（管理者）':'')));
  const lo=el('span','lo','ログアウト');lo.onclick=async()=>{if(window.__laynaFB)await window.__laynaFB.logout()};bx.appendChild(lo);
}
async function onAuthChanged(u){
  if(!u){authUser=null;renderLogin();return}
  const role=roleFor(u.email);
  if(!role){authUser=null;renderDenied(u);return}
  authUser={name:u.displayName||u.email,email:u.email,photo:u.photoURL,role};
  clearAuthScreen();showAuthedHeader();startAppFlow();
}
async function initApp(){
  try{accessCfg=await (await fetch('./access.json',{cache:'no-store'})).json()}catch(_){accessCfg=null}
  AUTH_ON=!!(accessCfg&&accessCfg.authRequired)&&location.hostname==='ogshaw03.github.io';
  if(!AUTH_ON){startAppFlow();return}       // exe/ローカル/プレビューは自動的に認証オフ
  window.__laynaAuthChanged=onAuthChanged;
  renderAuthLoading();
  if(window.__laynaFBUser!==undefined)onAuthChanged(window.__laynaFBUser);
  setTimeout(()=>{if(AUTH_ON&&!authUser&&!window.__laynaFB)renderLogin('認証の初期化に時間がかかっています。ネットワークをご確認ください。')},6000);
}
initApp();
