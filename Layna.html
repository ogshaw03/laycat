function go(id){state.currentId=id;state.search='';state.projTab='timeline';state.pmPick=null;state.reviewOpen=null;$('#searchInput').value='';const nn=getNode(id);if(nn&&nn.type==='review'){state.openTasks=(state.openTasks||[]).filter(x=>x!==id);state.openTasks.push(id)}/* タスク(review)のみタブとして開く（カテゴリは開かない） */for(const n of pathOf(id))state.expanded.add(n.id);syncHash();render()}
/* ============================================================
   URLルーティング（ハッシュ）— 画面ごとに固有URL・作業者間でリンク共有
   #/                     ホーム
   #/n/<nodeId>/<tab>     プロジェクト/セクション/レビューページ（tab: timeline|progress|shots|browse）
   #/r/<nodeId>/<verId>   レビュー（動画FB）画面
   ============================================================ */
const VALID_TABS=['timeline','progress','shots','submit','check','browse'];
function hashOf(){
  if(state.reviewOpen&&getNode(state.reviewOpen.nodeId))return '#/r/'+state.reviewOpen.nodeId+'/'+state.reviewOpen.versionId;
  if(!state.currentId)return '#/';
  let h='#/n/'+state.currentId+'/'+(VALID_TABS.includes(state.projTab)?state.projTab:'timeline');
  /* 右側スライド（ドロワー）の状態もURLに含める＝サブミット・工程の右スライドを直接共有できる */
  const d=state.drawer;
  if(d){
    if(d.kind==='submit')h+='/s/'+d.id+(d.detailId?'/'+d.detailId:'');
    else if(d.kind==='review')h+='/t/'+(d.shotId||'-')+'/'+d.id;
  }
  return h;
}
/* 現在の画面（ドロワー含む）への共有用フルURL */
function shareURL(){return location.href.split('#')[0]+hashOf();}
function copyShareLink(){const url=shareURL();const fb=()=>{try{window.prompt('このURLをコピーしてください',url)}catch(_){}};
  try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>toast('リンクをコピーしました'),fb)}else fb()}catch(_){fb()}}
let _hashLock=false;
function syncHash(){const h=hashOf();if(location.hash!==h){_hashLock=true;location.hash=h;setTimeout(()=>{_hashLock=false},0)}}
function closeReviewOverlay(){const ov=$('#fbOverlay');if(ov)ov.remove();const bd=$('#fbBackdrop');if(bd)bd.remove();state.reviewOpen=null}
/* ハッシュを解釈して画面を復元。initial=起動時（該当なしなら false を返し localStorage 復元に委譲） */
function applyHash(initial){
  const raw=(location.hash||'').replace(/^#\/?/,'');
  const parts=raw.split('/').filter(x=>x!=='');
  if(parts[0]==='r'&&parts[1]){
    const n=getNode(parts[1]);
    if(n){state.currentId=n.id;state.search='';state.projTab='browse';for(const x of pathOf(n.id))state.expanded.add(x.id);render();resolveThumbs();
      const v=(n.versions||[]).find(x=>x.id===parts[2])||(n.versions||[])[(n.versions||[]).length-1];
      if(v)openReview(n.id,v.id);return true}
    return false;
  }
  /* サブミット直リンク（提出連絡に同封しやすい短い形式） #/submit/<submitId> */
  if(parts[0]==='submit'&&parts[1]){
    const sb=(DB.submits||[]).find(s=>s.id===parts[1]);
    if(sb){const root=getNode(sb.projectId);if(root){closeReviewOverlay();state.currentId=root.id;state.search='';state.projTab='submit';state.pmPick=null;for(const x of pathOf(root.id))state.expanded.add(x.id);render();resolveThumbs();openSubmitDrawer(sb.id);if(parts[2]){state.drawer.detailId=parts[2];fillSubmitDrawer()}return true}}
    return false;
  }
  if(parts[0]==='n'&&parts[1]){
    const n=getNode(parts[1]);
    if(n){closeReviewOverlay();state.currentId=n.id;state.search='';state.projTab=VALID_TABS.includes(parts[2])?parts[2]:'timeline';state.pmPick=null;for(const x of pathOf(n.id))state.expanded.add(x.id);render();resolveThumbs();
      /* ドロワー状態の復元：/s/<submitId>[/detailId] または /t/<shotId|->/<reviewId> */
      if(parts[3]==='s'&&parts[4]){openSubmitDrawer(parts[4]);if(parts[5]&&state.drawer){state.drawer.detailId=parts[5];fillSubmitDrawer()}}
      else if(parts[3]==='t'&&parts[5]){openReviewDrawer(parts[5],parts[4]==='-'?null:parts[4])}
      return true}
    return false;
  }
  if(!parts.length){if(initial)return false;closeReviewOverlay();state.currentId=null;state.projTab='timeline';state.reviewOpen=null;render();resolveThumbs();return true}
  return false;
}
window.addEventListener('hashchange',()=>{if(_hashLock)return;applyHash(false)});

/* ============================================================
   プロジェクトの接続 / 解除（ユーザーは使うプロジェクトだけ接続する）
   ============================================================ */
async function connectProjectFlow(){
  if(!storage.supportsFolder()){toast('このブラウザはフォルダ接続に未対応です（Chrome / Edge 推奨）');return}
  let handle;
  try{handle=await window.showDirectoryPicker({mode:'readwrite'})}catch(e){if(e&&e.name!=='AbortError')toast('フォルダ選択に失敗しました');return}
  let data=null;
  try{const fh=await handle.getFileHandle(storage._projFileName);data=JSON.parse(await (await fh.getFile()).text())}catch(e){data=null}
  if(!data||!Array.isArray(data.nodes)||!data.id){toast('選択したフォルダに Layna プロジェクトが見つかりません（layna.project.json が必要です）');return}
  await storage.setProjRoot(data.id,handle);
  /* 既に接続済みなら古いデータを入れ替え */
  const oldIds=new Set([data.id,...DB.nodes.filter(n=>rootOfId(n)===data.id).map(n=>n.id)]);
  DB.nodes=DB.nodes.filter(n=>!oldIds.has(n.id)&&n.id!==data.id);
  DB.submits=(DB.submits||[]).filter(s=>s.projectId!==data.id);
  DB.reels=(DB.reels||[]).filter(r=>r.projectId!==data.id);
  for(const n of data.nodes)if(!DB.nodes.some(x=>x.id===n.id))DB.nodes.push(n);
  if(Array.isArray(data.submits))for(const s of data.submits)if(!DB.submits.some(x=>x.id===s.id))DB.submits.push(s);
  /* このプロジェクトのリール（フォルダ内 reels/）も取り込み */
  const rls=await storage.loadReels(data.id);
  if(Array.isArray(rls))for(const r of rls)if(!DB.reels.some(x=>x.id===r.id))DB.reels.push(r);
  const root=getNode(data.id);if(root)root.folderName=handle.name;
  normalizeNodes();
  if(!REG.some(e=>e.id===data.id))REG.push({id:data.id,name:data.name||(root&&root.name)||'project',folderName:handle.name});
  await persist();
  toast('プロジェクト「'+((root&&root.name)||data.name)+'」を接続しました');
  go(data.id);
}
/* DB を辿らずに rootOf の id を返す簡易版（接続処理中の一時判定用） */
function rootOfId(node){let n=node;while(n&&n.parentId){const p=getNode(n.parentId);if(!p)break;n=p}return n?n.id:null}
async function disconnectProject(id){
  const root=getNode(id);if(!root)return;
  if(!confirm('プロジェクト「'+root.name+'」の接続を解除しますか？\n（フォルダ内のデータは削除されません。再度「接続」で開けます）'))return;
  const ids=new Set([id,...descendants(id).map(n=>n.id)]);
  DB.reels=(DB.reels||[]).filter(r=>(r.projectId||reelProjectId(r))!==id); /* ノード削除前に判定 */
  DB.nodes=DB.nodes.filter(n=>!ids.has(n.id));
  DB.submits=(DB.submits||[]).filter(s=>s.projectId!==id);
  REG=REG.filter(e=>e.id!==id);delete _saveCache.proj[id];delete _saveCache.reels[id];
  storage.projHandles.delete(id);
  await persist();
  toast('接続を解除しました');
  go(null);
}

/* サイドバー フィルタ：検索語・作業者に一致するノード＋その先祖の集合（未指定なら null＝全表示） */
function computeSidebarVisible(root){
  const q=(state.sideSearch||'').trim().toLowerCase();
  const fa=(state.sideAssignee||'').toLowerCase();
  if(!q&&!fa)return null;
  const matchIds=new Set();
  for(const n of descendants(root.id)){
    let m=true;
    if(fa){if(!(n.type==='review'&&String(n.assignee||'').toLowerCase()===fa))m=false}
    if(q){const hay=(n.name+' '+pathOf(n.id).slice(1).map(x=>x.name).join(' ')).toLowerCase();if(!hay.includes(q))m=false}
    if(m)matchIds.add(n.id);
  }
  const vis=new Set();
  for(const id of matchIds){let n=getNode(id);while(n&&n.id!==root.id){vis.add(n.id);n=n.parentId?getNode(n.parentId):null}}
  return {vis,matchIds};
}
function renderTreeNode(container,node,depth,filt){
  if(filt&&!filt.vis.has(node.id))return;
  const kids=childrenOf(node.id).filter(c=>!filt||filt.vis.has(c.id));
  const row=el('div','tree-row'+(node.id===state.currentId?' active':'')+(filt&&filt.matchIds.has(node.id)?' hit':''));
  row.style.paddingLeft=(6+depth*13)+'px';
  const expanded=filt?true:state.expanded.has(node.id); /* フィルタ中は一致枝を自動展開 */
  const tg=el('span','tree-toggle'+(kids.length&&expanded?' open':''),kids.length?'▶':'');
  if(kids.length&&!filt)tg.onclick=e=>{e.stopPropagation();if(state.expanded.has(node.id))state.expanded.delete(node.id);else state.expanded.add(node.id);renderSidebar()};
  row.appendChild(tg);
  const dot=el('span','tree-dot');dot.style.background=stInfo(node).color;row.appendChild(dot);
  const ico=icoEl(node.type==='review'?'film':'folder');ico.style.flexShrink='0';row.appendChild(ico);
  row.appendChild(el('span','tree-name',node.name));
  if(node.type==='review'&&node.versions.length)row.appendChild(el('span','tree-badge','▶'+node.versions.length));
  else if(kids.length){const tb=elIco('span','tree-badge','folder',String(kids.length));row.appendChild(tb)}
  row.onclick=()=>go(node.id);
  container.appendChild(row);
  if(kids.length&&expanded){const wrap=el('div');for(const c of kids)renderTreeNode(wrap,c,depth+1,filt);container.appendChild(wrap)}
}

/* 本体：ページ種別で分岐 */
/* ノードのルート（プロジェクト） */
function rootOf(node){let n=node;while(n&&n.parentId){const p=getNode(n.parentId);if(!p)break;n=p}return n;}
/* タスクが属するショット（＝直上のカテゴリ）の名前。直上がプロジェクトなら空 */
function shotOf(node){if(!node||!node.parentId)return '';const p=getNode(node.parentId);return (p&&p.parentId)?p.name:'';}
/* プロジェクトの上部タブ（常に表示）。タブクリックでプロジェクトのトップ＋該当タブへ */
/* ヘッダ内のプロジェクトタブ（タイムライン / 進捗 / ショット） */
function buildProjectTabsHead(root){
  if(!['timeline','progress','shots','submit','check','browse'].includes(state.projTab))state.projTab='timeline';
  const onRoot=state.currentId===root.id&&!state.search.trim();
  const nav=el('div','head-tabs');
  [['timeline','タイムライン'],['progress','進捗'],['shots','ショット'],['submit','サブミット'],['check','チェック待ち']].forEach(([id,lab],i)=>{
    if(i)nav.appendChild(el('span','vdiv')); /* タブ間の縦区切り線 */
    const active=onRoot&&state.projTab===id;
    const b=el('button','ptab'+(active?' on':''),lab);
    b.onclick=()=>{if(id==='check')state.checkReset=true;state.currentId=root.id;state.projTab=id;state.pmPick=null;state.search='';$('#searchInput').value='';for(const n of pathOf(root.id))state.expanded.add(n.id);syncHash();render()};
    nav.appendChild(b);
  });
  return nav;
}
/* 下段：左サイドバー／ショットから開いたタスク（タスクページ）をタブとして複数並べる（ブラウザのタブ風） */
function buildTaskTabs(root){
  /* タスク（review）のみタブ表示。カテゴリ（section）は表示しない */
  state.openTasks=(state.openTasks||[]).filter(id=>{const n=getNode(id);return n&&n.type==='review'&&rootOf(n)&&rootOf(n).id===root.id});
  const strip=el('div','task-tabs');
  if(!state.openTasks.length){
    strip.appendChild(el('span','task-tabs-empty','左のツリーやショットからタスクを開くとタブで並びます'));
    return strip;
  }
  for(const id of state.openTasks){
    const n=getNode(id);if(!n)continue;
    const active=state.currentId===id;
    const tab=el('div','task-tab'+(active?' on':''));
    tab.appendChild(el('span','tt-name',shotOf(n)||n.name)); /* タブはショット名のみ（工程はタスクページ側で表示） */
    tab.onclick=()=>{state.currentId=id;state.projTab='browse';state.pmPick=null;state.search='';$('#searchInput').value='';for(const x of pathOf(id))state.expanded.add(x.id);syncHash();render()};
    const x=el('button','tt-close','✕');x.title='タブを閉じる';
    x.onclick=e=>{e.stopPropagation();
      const wasCur=state.currentId===id;
      const idx=state.openTasks.indexOf(id);
      state.openTasks=state.openTasks.filter(t=>t!==id);
      if(wasCur){
        const next=state.openTasks[idx]||state.openTasks[idx-1]||null;
        if(next){state.currentId=next;state.projTab='browse';for(const y of pathOf(next))state.expanded.add(y.id)}
        else{state.currentId=root.id;state.projTab='timeline'}
        syncHash();render();
      }else render();
    };
    tab.appendChild(x);
    strip.appendChild(tab);
  }
  return strip;
}
/* 保存先フォルダ未設定の警告バナー（動画はフォルダにしか保存できないため） */

/* プロジェクト（ルート）配下の更新イベント（動画アップロードのみ）を新着順で。
   コメント追加やステータス変更はタイムラインに出さない */
function projectUpdates(rootId){
  const evs=[];const groups={};
  for(const n of descendants(rootId))if(n.type==='review')for(const v of (n.versions||[])){
    if(v.type!=='video')continue;
    const notes=(v.review&&v.review.notes)||[];
    const upNote=notes.find(x=>x.kind==='upload');
    const item={type:'upload',node:n,v,time:v.uploadedAt||'',stage:n.name,comment:upNote?upNote.text:null};
    if(v.submitId){
      /* サブミットの提出はまとめて1つのタイムラインエントリに */
      let g=groups[v.submitId];
      if(!g){g={type:'submit',submitId:v.submitId,name:v.submitName||'サブミット',items:[],time:''};groups[v.submitId]=g;evs.push(g)}
      g.items.push(item);
      if(item.time>g.time)g.time=item.time;
      continue;
    }
    evs.push(item);
  }
  /* まとめエントリの工程一覧（フィルタ用）：含まれる工程のどれかが表示対象なら表示 */
  for(const g of Object.values(groups))g.stages=[...new Set(g.items.map(i=>i.stage))];
  evs.sort((a,b)=>a.time<b.time?1:a.time>b.time?-1:0);
  return evs;
}
/* プロジェクト配下で動画のある工程（レビューノード）の名前一覧（工程順） */
function projectStageNames(rootId){return [...new Set(descendants(rootId).filter(n=>n.type==='review'&&n.versions&&n.versions.length).map(n=>n.name))].sort(stageRankCmp);}
/* タイムラインで非表示にしている工程名（プロジェクト単位・切替時にリセット） */
function tlHiddenSet(rootId){if(state.tlHiddenFor!==rootId){state.tlHiddenFor=rootId;state.tlHidden=new Set()}return state.tlHidden;}

function renderProjTimeline(main,cur){
  const hidden=tlHiddenSet(cur.id);
  const visEv=e=>e.type==='submit'?(e.stages||[]).some(s=>!hidden.has(s)):!hidden.has(e.stage);
  const evs=projectUpdates(cur.id).filter(visEv);
  const lab=el('div','section-label');lab.appendChild(el('span',null,'最新の更新タイムライン'));main.appendChild(lab);
  if(!evs.length){
    main.appendChild(el('div','empty',projectUpdates(cur.id).length?'表示できる更新がありません。右上の工程フィルタでチェックを追加してください。':'まだ更新がありません。タスクに動画をアップロードすると、ここに新着順で表示されます。'));
    return;
  }
  const tl=el('div','tl');
  for(const e of evs){
    if(e.type==='submit'){tl.appendChild(tlSubmitItem(e,cur));continue}
    /* ショットの枠全体をクリックで該当ショットへ移動 */
    const it=el('div','tl-item');it.onclick=()=>openReviewDrawer(e.node.id);it.title='クリックでタスクページを右側に表示（動画タイルはタスクページへ）';
    const th=el('img','tl-thumb');if(e.v.thumb)th.dataset.ref=e.v.thumb;
    th.title='クリックでタスクページへ';th.onclick=ev=>{ev.stopPropagation();go(e.node.id)}; /* 動画タイルは直接タスクページへ */
    it.appendChild(th);
    const bd=el('div','tl-body');
    const shot=e.node.parentId?getNode(e.node.parentId):null;
    bd.appendChild(el('div','tl-path',pathOf(e.node.id).slice(1,-1).map(x=>x.name).join(' / ')||cur.name));
    const t=el('div','tl-title');
    const sb=el('span','tl-stage',e.stage);sb.style.background=stageColor(e.stage);t.appendChild(sb);
    t.appendChild(el('span',null,(shot?shot.name+'　':'')+e.v.name));
    t.appendChild(elIco('span','tl-kind','upload','アップロード'));
    bd.appendChild(t);
    if(e.comment)bd.appendChild(el('div','tl-comment',e.comment));
    const st=stInfo(e.node);
    bd.appendChild(el('div','tl-meta','by '+(e.v.uploadedBy||'-')+'・'+fmt(e.v.uploadedAt)+'　［'+st.label+'］'));
    it.appendChild(bd);
    tl.appendChild(it);
  }
  main.appendChild(tl);
}
/* タイムライン：サブミットのまとめエントリ。1ショット=1タイルで横並び表示（クリックで右側に表示） */

/* チェック待ちタブ：チェック担当者ごと＋未割り当てで、チェック待ち（未完了）の工程（カット）をタブ切替表示 */
const CHK_NONE='__none__';
function renderProjCheck(main,root){
  /* ヘッダ（更新ボタン付き）。ステータス変更してもその場では消えず、更新するまで残る（誤操作防止） */
  const head=el('div','pm-h');head.style.cssText='display:flex;align-items:center;gap:10px;flex-wrap:wrap';
  head.appendChild(el('span',null,'チェック待ち — チェック担当者ごと／未割り当て'));
  const refresh=el('button','btn btn-ghost btn-sm','🗘 更新');refresh.title='ステータスを変更したカットを一覧から整理（更新するまで消えません）';
  refresh.onclick=()=>{state.checkReset=true;renderBody();resolveThumbs()};head.appendChild(refresh);
  main.appendChild(head);
  /* 対象＝配下の工程(review)で、動画があり、まだ完了していないもの（チェック担当の有無は問わない） */
  const pendingNow=descendants(root.id).filter(n=>n.type==='review'&&n.versions&&n.versions.length&&isAwaitingCheck(root,nodeStatus(n)));
  const pendingIds=new Set(pendingNow.map(n=>n.id));
  /* スナップショット：タブに入った時（またはチェック待ちタブ再クリック/更新）に確定。
     以後のステータス変更ではリストからカットを消さず、済みは薄く表示のまま残す（誤操作防止）。 */
  if(!state.checkSnap||state.checkSnapRoot!==root.id||state.checkReset){state.checkSnap=new Set(pendingIds);state.checkSnapRoot=root.id;state.checkReset=false}
  else{for(const id of pendingIds)state.checkSnap.add(id)} /* 新規の未チェックカットは随時追加 */
  const all=descendants(root.id).filter(n=>n.type==='review'&&n.versions&&n.versions.length&&state.checkSnap.has(n.id));
  if(!all.length){main.appendChild(el('div','pm-empty','チェック待ちのカットはありません。動画が上がっていて未完了の工程がここに表示されます。'));return}
  const isPend=n=>pendingIds.has(n.id);
  /* バケット：チェック担当者ごと（名簿順→名簿外）＋未割り当て。件数は「未チェック（残り）」で表示 */
  const cntFor=key=>{const inB=n=>key===CHK_NONE?!n.reviewer:(n.reviewer&&String(n.reviewer).toLowerCase()===String(key).toLowerCase());return all.filter(n=>inB(n)&&isPend(n)).length};
  const keys=[];const seen=new Set();
  for(const m of projectMembers(root)){const k=String(m.id).toLowerCase();if(!seen.has(k)&&all.some(n=>n.reviewer&&String(n.reviewer).toLowerCase()===k)){seen.add(k);keys.push(m.id)}}
  for(const n of all){if(!n.reviewer)continue;const k=String(n.reviewer).toLowerCase();if(!seen.has(k)){seen.add(k);keys.push(n.reviewer)}}
  if(all.some(n=>!n.reviewer))keys.push(CHK_NONE); /* 未割り当てバケット */

/* ==== ショットタブのタイル：マウスホバーで再生（元解像度） ====
   ・自動再生をやめてホバー中のタイルだけ再生 → 同時再生が減り負荷が低いので、
     解像度は落とさず動画そのままの解像度で <video> 再生（ミュート／ループ）。
   ・ホバーが外れたら停止してソースを解放（メモリ節約） */
let _shotHoverVids=[];
function _shotHoverStop(vid){if(!vid)return;vid._hover=false;vid.classList.remove('on');try{vid.pause()}catch(_){}try{if(vid.getAttribute('src')){vid.removeAttribute('src');vid.load()}}catch(_){}}
async function _shotHoverPlay(vid){
  if(!vid)return;vid._hover=true;
  if(!vid.getAttribute('src')){const url=await storage.getURL(vid.dataset.vref);if(!url||!vid._hover)return;vid.src=url}
  try{vid.currentTime=0}catch(_){}
  try{await vid.play()}catch(_){}
  if(vid._hover)vid.classList.add('on');else _shotHoverStop(vid);
}
function stopShotAutoplay(){for(const v of _shotHoverVids)_shotHoverStop(v);_shotHoverVids=[]}
function setupShotAutoplay(){
  stopShotAutoplay();
  _shotHoverVids=[...document.querySelectorAll('#scroll video.tvid')];
  for(const vid of _shotHoverVids){
    const tile=vid.closest('.pm-tile')||vid.parentElement;if(!tile)continue;
    tile.addEventListener('mouseenter',()=>_shotHoverPlay(vid));
    tile.addEventListener('mouseleave',()=>_shotHoverStop(vid));
  }
}

/* ============================================================
   アノテーション共通（FB画面・REELで共用）
   ============================================================ */
function paintStrokeList(ctx,W,H,list,alpha){
  ctx.globalAlpha=alpha;
  for(const st of list){
    if(st.kind==='head'){paintHead(ctx,W,H,st,alpha);ctx.globalAlpha=alpha;continue}
    if(!st.points||st.points.length<2)continue;
    ctx.strokeStyle=st.color||'#ff4d4d';
    ctx.lineWidth=Math.max(1.5,(st.w||0.004)*W);
    ctx.lineJoin=ctx.lineCap='round';
    const P=st.points,n=P.length;
    ctx.beginPath();ctx.moveTo(P[0][0]*W,P[0][1]*H);
    if(n<3){
      for(let i=1;i<n;i++)ctx.lineTo(P[i][0]*W,P[i][1]*H);
    }else{
      /* 点の中点を通す二次ベジェで補間して滑らかに（速書きのカクつき対策） */
      for(let i=1;i<n-2;i++){const xc=(P[i][0]+P[i+1][0])/2*W,yc=(P[i][1]+P[i+1][1])/2*H;ctx.quadraticCurveTo(P[i][0]*W,P[i][1]*H,xc,yc);}
      ctx.quadraticCurveTo(P[n-2][0]*W,P[n-2][1]*H,P[n-1][0]*W,P[n-1][1]*H);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}
/* 顔の向きガイド（ヘッドジンバル）を描画。単位球上の大円を yaw/pitch/roll で回転し正射影。
   正中線（縦・顔の中心線）＋アイライン（横）＋鼻ベクトル（正面方向）。前面は実線、背面は破線で3D感を出す。 */
function paintHead(ctx,W,H,s,alpha){
  const cx=(s.cx||0)*W, cy=(s.cy||0)*H, R=Math.max(6,(s.r||0.12)*W);
  const yaw=s.yaw||0, pitch=s.pitch||0, roll=s.roll||0, col=s.color||'#ff4d4d';
  function rotv(x,y,z){
    let c=Math.cos(yaw),n=Math.sin(yaw);let x1=c*x+n*z,z1=-n*x+c*z,y1=y;
    c=Math.cos(pitch);n=Math.sin(pitch);let y2=c*y1-n*z1,z2=n*y1+c*z1,x2=x1;
    c=Math.cos(roll);n=Math.sin(roll);let x3=c*x2-n*y2,y3=n*x2+c*y2,z3=z2;
    return [x3,y3,z3];
  }
  const proj=p=>{const r=rotv(p[0],p[1],p[2]);return [cx+R*r[0],cy-R*r[1],r[2]];};
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';ctx.setLineDash([]);
  /* ひし形（八面体）ワイヤー：前方(+Z)頂点＝鼻先の角。奥側の辺も消さず薄く表示して形を保つ */
  const seg=(a,b,wf)=>{const pa=proj(a),pb=proj(b);const back=pa[2]<-0.05&&pb[2]<-0.05;ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);ctx.strokeStyle=col;ctx.globalAlpha=alpha*(back?0.35:1);ctx.lineWidth=Math.max(1.3,R*wf*(back?0.85:1));ctx.stroke();ctx.globalAlpha=alpha;};
  const U=[0,1,0.05],D=[0,-1,0.05],L=[-1,0,0],Rp=[1,0,0],F=[0,-0.05,1.34],B=[0,0,-1];
  [[U,Rp],[Rp,D],[D,L],[L,U]].forEach(([a,b])=>seg(a,b,0.032)); /* 赤道のひし形輪郭 */
  [[U,B],[B,D],[L,B],[B,Rp]].forEach(([a,b])=>seg(a,b,0.03));   /* 後頂点へ集まる稜（奥・薄め） */
  [[U,F],[F,D],[L,F],[F,Rp]].forEach(([a,b])=>seg(a,b,0.05));   /* 鼻先へ集まる前稜 */
  {const pf=proj(F);ctx.beginPath();ctx.arc(pf[0],pf[1],Math.max(1.6,R*0.055),0,2*Math.PI);ctx.fillStyle=col;ctx.globalAlpha=alpha*(pf[2]<0?0.4:1);ctx.fill();ctx.globalAlpha=alpha;} /* 鼻先の角 */
  /* 中心（移動ハンドル） */
  ctx.beginPath();ctx.arc(cx,cy,Math.max(2,R*0.03),0,2*Math.PI);ctx.fillStyle=col;ctx.globalAlpha=alpha*0.6;ctx.fill();
  ctx.restore();
}
/* ブラシ型消しゴム：半径内の点だけを取り除き、残った区間で線を分割。
   対象は指定レイヤーのみ。変更がなければ null を返す。 */
function eraseFromList(list,x,y,r,aspect,layer){
  const out=[];let changed=false;
  for(const s of list){
    if(s.kind==='head'){if((s.layer||1)===layer&&Math.hypot(s.cx-x,(s.cy-y)*aspect)<=r+(s.r||0.12)*0.25){changed=true;continue}out.push(s);continue}
    if((s.layer||1)!==layer){out.push(s);continue}
    const keep=s.points.map(q=>Math.hypot(q[0]-x,(q[1]-y)*aspect)>=r);
    if(keep.every(Boolean)){out.push(s);continue}
    changed=true;
    let run=[];
    for(let i=0;i<s.points.length;i++){
      if(keep[i])run.push(s.points[i]);
      else{if(run.length>=2)out.push({...s,points:run});run=[]}
    }
    if(run.length>=2)out.push({...s,points:run});
  }
  return changed?out:null;
}

/* カスタム動画プレイヤー（◐再生ボタン＋ダイヤノブのシークバー） */
function buildVPlayer(media,vid){
  const fmtT=s=>{s=Math.max(0,s||0);return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')};
  const center=el('div','vp-center','◐');
  const bar=el('div','vp-bar');
  const play=el('button','vp-play','◐');play.title='再生 / 停止';
  const time=el('span','vp-time','0:00 / 0:00');
  const track=el('div','vp-track');
  const ticks=el('div','ticks');for(let i=0;i<13;i++)ticks.appendChild(el('i'));
  const rail=el('div','rail');const fill=el('div','fill');const knob=el('div','knob');
  rail.appendChild(fill);rail.appendChild(knob);
  track.appendChild(ticks);track.appendChild(rail);
  bar.appendChild(play);bar.appendChild(track);bar.appendChild(time);
  media.appendChild(center);media.appendChild(bar);
  function update(){
    const d=vid.duration||0,c=vid.currentTime||0,p=d?(c/d*100):0;
    fill.style.width=p+'%';knob.style.left=p+'%';
    time.textContent=fmtT(c)+' / '+fmtT(d);
  }
  vid.addEventListener('loadedmetadata',update);
  vid.addEventListener('timeupdate',update);
  vid.addEventListener('play',()=>{center.classList.add('off');play.textContent='❚❚';
    (function loop(){if(vid.paused||vid.ended)return;update();requestAnimationFrame(loop)})()});
  vid.addEventListener('pause',()=>{center.classList.remove('off');play.textContent='◐';update()});
  vid.addEventListener('ended',()=>{center.classList.remove('off');play.textContent='◐'});
  const toggle=()=>{if(vid.paused)vid.play().catch(()=>{});else vid.pause()};
  play.onclick=e=>{e.stopPropagation();toggle()};
  vid.addEventListener('click',toggle);
  const seek=e=>{const r=track.getBoundingClientRect();const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));if(vid.duration){vid.currentTime=p*vid.duration;update()}};
  let drag=false;
  track.onpointerdown=e=>{e.stopPropagation();drag=true;track.setPointerCapture(e.pointerId);seek(e)};
  track.onpointermove=e=>{if(drag)seek(e)};
  track.onpointerup=()=>{drag=false};
  return {update};
}

/* アノテーション付きフレームのスクリーンショット生成（キャッシュ＋直列キュー） */
const shotCache=new Map();let shotQueue=Promise.resolve();
function annotShotInto(cv,shot,n){
  const key=shot.fileRef+'|'+(n.time||'')+'|'+(n.frame||0);
  const paint=du=>{if(!du)return;const img=new Image();img.onload=()=>{cv.width=img.width;cv.height=img.height;cv.getContext('2d').drawImage(img,0,0)};img.src=du};
  if(shotCache.has(key)){paint(shotCache.get(key));return}
  shotQueue=shotQueue.then(async()=>{
    if(shotCache.has(key)){paint(shotCache.get(key));return}
    const url=await storage.getURL(shot.fileRef);if(!url)return;
    const du=await new Promise(res=>{
      const vd=document.createElement('video');vd.muted=true;vd.preload='auto';
      const to=setTimeout(()=>res(null),5000);
      vd.onloadedmetadata=()=>{try{vd.currentTime=(n.frame||0)/(shot.fps||24)+0.0001}catch(_){clearTimeout(to);res(null)}};
      vd.onseeked=()=>{
        clearTimeout(to);
        try{
          const W=360,H=Math.max(2,Math.round(W*vd.videoHeight/vd.videoWidth));
          const c=document.createElement('canvas');c.width=W;c.height=H;
          const ctx=c.getContext('2d');ctx.drawImage(vd,0,0,W,H);
          if(n.drawing)paintStrokeList(ctx,W,H,n.drawing,1);
          res(c.toDataURL('image/jpeg',0.72));
        }catch(_){res(null)}
        vd.removeAttribute('src');
      };
      vd.onerror=()=>{clearTimeout(to);res(null)};
      vd.src=url;
    });
    if(du)shotCache.set(key,du);
    paint(du);
  }).catch(()=>{});
}

/* 描画のみ（コメントなし）のノートは「動画へのアノテ埋め込み専用」。コメント欄には出さない。 */
/* 埋め込みのみ（コメント欄に出さない）＝描画だけ かつ「記入せず送信」で noShot が付いたものだけ。
   明示的に記入ボタンを押した描画ノートは noShot が付かず、スクショ付きでコメント欄に表示する。 */
function noteEmbedOnly(n){return !!(n&&n.drawing&&n.drawing.length&&!(n.text&&String(n.text).trim())&&n.noShot)}
/* 描画アイテムを保存用に複製（線＝points系／顔の向きガイド＝head系） */
function cloneDrawItem(p){
  return p.kind==='head'
    ? {kind:'head',cx:p.cx,cy:p.cy,r:p.r,yaw:p.yaw,pitch:p.pitch,roll:p.roll,color:p.color,layer:p.layer||1}
    : {color:p.color,points:p.points,layer:p.layer||1,w:p.w};
}
/* pending ストローク＋コメントを、各ストローク自身のフレーム(p.f)ごとに分割したノート配列にする。
   ・複数フレームにまたがって描いても、線は描いたフレームに正しく割り当てられる（ズレ防止）
   ・コメントは現在フレーム(curFrame)のノートに付け、無ければコメント単独ノートを作る
   ・isVideo=false（画像）はフレームなしの1ノートにまとめる
   レビューページ(record)とリール(buildNotes)で共通利用し、ロジックの分岐も防ぐ。 */
function buildFrameNotes(pending,opts){
  opts=opts||{};pending=pending||[];
  const who=opts.author||currentUser(),t=nowIso();
  const pdur=opts.dur||1;const txt=(opts.text||'').trim();
  const isVideo=opts.isVideo!==false;
  if(!pending.length&&!txt)return [];
  const notes=[];
  if(pending.length){
    if(isVideo){
      const byFrame=new Map();
      for(const p of pending){const fr=(p.f!=null?p.f:(opts.curFrame!=null?opts.curFrame:0));if(!byFrame.has(fr))byFrame.set(fr,[]);byFrame.get(fr).push(p)}
      for(const fr of [...byFrame.keys()].sort((a,b)=>a-b))
        notes.push({author:who,text:'',time:t,frame:fr,dur:pdur,drawing:byFrame.get(fr).map(cloneDrawItem)});
    }else{
      notes.push({author:who,text:'',time:t,drawing:pending.map(cloneDrawItem)});
    }
  }
  if(txt){
    const mns=extractMentions(txt,opts.root,opts.mentions);
    if(!isVideo){if(notes[0]){notes[0].text=txt;if(mns.length)notes[0].mentions=mns}else notes.push({author:who,text:txt,time:t,mentions:mns})}
    else{
      const cf=(opts.curFrame!=null?opts.curFrame:(notes[0]&&notes[0].frame!=null?notes[0].frame:0));
      const at=notes.find(n=>n.frame===cf);
      if(at){at.text=txt;if(mns.length)at.mentions=mns}else notes.push({author:who,text:txt,time:t,frame:cf,mentions:mns});
    }
  }
  return notes;
}
/* 共通コメントブロック（編集・削除・フレームジャンプ・アノテスクショ対応） */
function noteBlock(v,n,opts){
  opts=opts||{};
  const note=el('div','log-note');
  const m=el('div','m');
  m.appendChild(el('span',null,n.author+'・'+fmt(n.time)+(n.edited?'（編集済）':'')));
  if(n.frame!=null){
    const fc=el('span','frame-chip'+(opts.onSeek?' link':''),'F'+n.frame);
    if(opts.onSeek)fc.onclick=()=>opts.onSeek(n.frame);
    fc.title='フレーム '+n.frame;
    m.appendChild(fc);
  }
  if(n.drawing&&n.drawing.length)m.appendChild(el('span','frame-chip','✎ 描画'));
  if(n.kind==='submit')m.appendChild(el('span','frame-chip submit-chip','⧉ '+(n.submitName||'サブミット')));
  const acts=el('span','note-acts');
  const ed=el('button','na','✎ 編集');
  const del=el('button','na','✕');del.title='削除';
  acts.appendChild(ed);acts.appendChild(del);m.appendChild(acts);
  const t=el('div','t');renderMentionText(t,n.text==='（描画のみ）'?'':n.text,opts.root); /* @メンションをチップ表示（旧「（描画のみ）」は非表示） */
  note.appendChild(m);note.appendChild(t);
  /* アノテーション付きフレームのスクショをコメントに表示（noShot＝記入せず送信した描画のみは省略） */
  if(opts.shot&&opts.shot.isVideo&&n.drawing&&n.drawing.length&&!n.noShot){
    const cv=el('canvas','note-shot');cv.width=16;cv.height=9;cv.title='F'+(n.frame||0)+' のアノテーション';
    if(opts.onSeek&&n.frame!=null)cv.onclick=()=>opts.onSeek(n.frame);
    note.appendChild(cv);
    annotShotInto(cv,opts.shot,n);
  }
  ed.onclick=()=>{
    if(note.querySelector('textarea'))return;
    const ta=el('textarea','fb-edit-ta');ta.value=n.text;
    const row=el('div','edit-row');
    const save=el('button','btn btn-primary btn-sm','保存');
    const cancel=el('button','btn btn-ghost btn-sm','キャンセル');
    save.onclick=async()=>{const txt=ta.value.trim();if(!txt)return;n.text=txt;n.edited=true;n.mentions=extractMentions(txt,opts.root,ta._mentions);if(opts.refresh)await opts.refresh()};
    cancel.onclick=()=>{ta.remove();row.remove();t.style.display=''};
    t.style.display='none';
    note.appendChild(ta);note.appendChild(row);row.appendChild(save);row.appendChild(cancel);
    attachMention(ta,opts.root);ta.focus();
  };
  del.onclick=async()=>{if(!confirm('コメントを削除しますか？'))return;v.review.notes=v.review.notes.filter(x=>x!==n);if(opts.refresh)await opts.refresh()};
  return note;
}

function logItem(node,v){
  const it=el('div','log-item');
  // 大型メディア（動画はインライン再生可・画像はそのまま表示）
  const media=el('div','log-media');
  if(v.type==='video'){
    const vid=el('video');vid.dataset.vref=v.file;if(v.thumb)vid.dataset.poster=v.thumb;
    vid.preload='metadata';vid.playsInline=true;
    media.appendChild(vid);
    buildVPlayer(media,vid);
  }else{
    const img=el('img');img.dataset.ref=v.file;img.alt=v.name;
    img.style.cursor='zoom-in';img.onclick=()=>openReview(node.id,v.id);
    media.appendChild(img);
  }
  const openBtn=el('button','log-open','⤢');openBtn.title='FB画面を開く（アノテーション・フレームコメント）';
  openBtn.onclick=e=>{e.stopPropagation();openReview(node.id,v.id)};
  media.appendChild(openBtn);
  // ヘッダ行：バージョン名・メタ・詳細ボタン（ステータスはページ単位に移行）
  const head=el('div','log-head');
  const title=el('div','log-title');title.appendChild(document.createTextNode(v.name));
  head.appendChild(title);
  head.appendChild(el('span','log-meta','by '+(v.uploadedBy||'-')+'・'+fmt(v.uploadedAt)));
  if(v.type==='video'){const cmp=el('button','btn btn-ghost btn-sm','⇄ 比較');cmp.title='別の版・カットと横並びで比較再生';cmp.onclick=()=>openComparePicker(node,v);head.appendChild(cmp);const rb=elIco('button','btn btn-ghost btn-sm','reel',' REELに送る');rb.title='この動画を REEL に送る';rb.onclick=()=>sendToReel(node,v);head.appendChild(rb)}
  /* この動画が含まれる保存済みリール */
  for(const r of (DB.reels||[]).filter(r=>r.clips.some(c=>c.vId===v.id)).slice(0,2)){
    const lb=elIco('button','btn btn-ghost btn-sm','reel',' '+r.name);lb.title='保存済みリールを開く';
    lb.onclick=()=>openReelFromSaved(r.id);head.appendChild(lb);
  }
  it.appendChild(head);
  // 動画左・フレームコメント右のレイアウト（ショット全体へのコメントは廃止＝メッセージ機能を使用）
  const flexw=el('div','log-flex');
  const left=el('div','log-left');left.appendChild(media);flexw.appendChild(left);
  const refresh=async()=>{await persist();renderBody();resolveThumbs()};
  const seekInline=v.type==='video'?f=>{const vd=media.querySelector('video');if(vd){vd.pause();vd.currentTime=f/(v.fps||24)+0.0001}}:null;
  const shot={fileRef:v.file,fps:v.fps||24,isVideo:v.type==='video'};
  /* フレームコメント（frameあり）→ 動画の右側 */
  const side=el('div','log-side');
  side.appendChild(el('div','log-side-head','フレームコメント / FB'));
  const notes=el('div','log-side-list');
  let arr=v.review.notes.filter(n=>n.frame!=null&&!noteEmbedOnly(n));
  /* 常にフレーム番号順（同フレームは時系列）で並べる */
  arr.sort((a,b)=>((a.frame??1e9)-(b.frame??1e9))||String(a.time).localeCompare(String(b.time)));
  if(!arr.length)notes.appendChild(el('div','log-empty-note','フレームコメントはまだありません。FB画面（⤢）または下の入力から。'));
  for(const n of arr)notes.appendChild(noteBlock(v,n,{refresh,onSeek:seekInline,shot}));
  side.appendChild(notes);
  /* フレームコメントの追加はFB画面（⤢）からのみ */
  const hint=el('div','log-empty-note','フレームへのコメント・アノテーションは ⤢（FB画面）から');
  hint.style.padding='8px 12px';side.appendChild(hint);
  flexw.appendChild(side);
  it.appendChild(flexw);
  return it;
}

async function resolveThumbs(){
  for(const img of document.querySelectorAll('#scroll img[data-ref],#scroll .log-thumb[data-ref],#reviewDrawer img[data-ref]')){const ref=img.dataset.ref;const url=await storage.getURL(ref);if(url){if(img.tagName==='IMG')img.src=url;else img.style.backgroundImage='url("'+url+'")'}}
  /* .tvid（ショットタブのホバー再生）は事前ロードしない＝ホバー時のみ getURL する（負荷軽減） */
  for(const v of document.querySelectorAll('#scroll video[data-vref]:not(.tvid),#reviewDrawer video[data-vref]:not(.tvid)')){if(v.dataset.poster){const p=await storage.getURL(v.dataset.poster);if(p)v.poster=p}const src=await storage.getURL(v.dataset.vref);if(src&&v.src!==src)v.src=src}
}
/* サムネイルのトリミング表示：元画像は変えず、縦横比タイルに合わせて位置・拡大で表示。
   crop={s:拡大率(>=1), fx/fy:パン位置(-0.5..0.5, 0=中央)} は解像度非依存 */
function applyThumbCrop(img){
  const box=img.parentElement;if(!box)return;
  const iw=img.naturalWidth,ih=img.naturalHeight;if(!iw||!ih)return;
  let crop={s:1,fx:0,fy:0};if(img.dataset.crop){try{crop=Object.assign(crop,JSON.parse(img.dataset.crop))}catch(_){}}
  const bw=box.clientWidth,bh=box.clientHeight;if(!bw||!bh)return;
  const base=Math.max(bw/iw,bh/ih),sc=base*(crop.s||1),dw=iw*sc,dh=ih*sc;
  img.style.width=dw+'px';img.style.height=dh+'px';
  img.style.left=((bw-dw)/2+(crop.fx||0)*(dw-bw))+'px';
  img.style.top=((bh-dh)/2+(crop.fy||0)*(dh-bh))+'px';
}
window.addEventListener('resize',()=>{document.querySelectorAll('.proj-media img.proj-thumb').forEach(applyThumbCrop)});
/* トリミング編集ウィジェット（タイルと同じ縦横比のボックスでドラッグ移動・拡大）
   ＋実際のタイルサイズのライブプレビューで見え方を確認できる */
function makeCropEditor(opts){
  opts=opts||{};
  const wrap=el('div','crop-wrap');
  const box=el('div','crop-box');
  const img=el('img');
  box.appendChild(img);box.appendChild(el('div','crop-hint','ドラッグで移動・スライダーで拡大'));
  wrap.appendChild(box);
  const slider=el('input','crop-slider');slider.type='range';slider.min='100';slider.max='400';
  wrap.appendChild(slider);
  /* 実際のタイルサイズのプレビュー */
  const prev=el('div','crop-preview');prev.appendChild(el('div','cp-label','実際のタイルでの見え方'));
  const ptile=el('div','cp-tile');const pimg=el('img');ptile.appendChild(pimg);prev.appendChild(ptile);
  wrap.appendChild(prev);
  const crop=Object.assign({s:1,fx:0,fy:0},opts.crop||{});
  slider.value=String(Math.round(crop.s*100));
  let iw=0,ih=0;
  const clamp=()=>{crop.s=Math.max(1,Math.min(6,crop.s));crop.fx=Math.max(-0.5,Math.min(0.5,crop.fx));crop.fy=Math.max(-0.5,Math.min(0.5,crop.fy))};
  const place=(imgEl,boxEl)=>{const bw=boxEl.clientWidth,bh=boxEl.clientHeight;if(!iw||!ih||!bw||!bh)return;const base=Math.max(bw/iw,bh/ih),sc=base*crop.s,dw=iw*sc,dh=ih*sc;imgEl.style.width=dw+'px';imgEl.style.height=dh+'px';imgEl.style.left=((bw-dw)/2+crop.fx*(dw-bw))+'px';imgEl.style.top=((bh-dh)/2+crop.fy*(dh-bh))+'px'};
  function layout(){if(!iw||!ih)return;place(img,box);place(pimg,ptile)}
  img.onload=()=>{iw=img.naturalWidth;ih=img.naturalHeight;clamp();layout()};
  pimg.onload=layout;
  if(opts.url){img.src=opts.url;pimg.src=opts.url}
  let drag=null;
  box.onpointerdown=e=>{drag={x:e.clientX,y:e.clientY,fx:crop.fx,fy:crop.fy};try{box.setPointerCapture(e.pointerId)}catch(_){}};
  box.onpointermove=e=>{if(!drag||!iw)return;const bw=box.clientWidth,bh=box.clientHeight,base=Math.max(bw/iw,bh/ih),sc=base*crop.s,ovx=iw*sc-bw,ovy=ih*sc-bh;if(ovx>0)crop.fx=drag.fx+(e.clientX-drag.x)/ovx;if(ovy>0)crop.fy=drag.fy+(e.clientY-drag.y)/ovy;clamp();layout()};
  box.onpointerup=box.onpointercancel=()=>{drag=null};
  box.onwheel=e=>{e.preventDefault();crop.s=crop.s*(e.deltaY<0?1.08:0.92);clamp();layout();slider.value=String(Math.round(crop.s*100))};
  slider.oninput=()=>{crop.s=parseInt(slider.value)/100;clamp();layout()};
  return {el:wrap,getCrop:()=>({s:+crop.s.toFixed(4),fx:+crop.fx.toFixed(4),fy:+crop.fy.toFixed(4)}),relayout:layout};
}

/* 追加（単体） */
function typeSelector(initial,onChange){
  let sel=initial||'section';
  const row=el('div','form-row');row.appendChild(el('label','form-label','ページ種別'));
  const seg=el('div','seg');
  const svgS='<svg class="ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">'+ICONS.folder+'</svg>';
  const svgR='<svg class="ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">'+ICONS.film+'</svg>';
  const optS=el('button','seg-opt');optS.type='button';optS.innerHTML=svgS+'カテゴリ<small>工程・階層を管理／動画は不可</small>';
  const optR=el('button','seg-opt');optR.type='button';optR.innerHTML=svgR+'タスク<small>動画FBログを縦に残す</small>';
  const apply=()=>{optS.classList.toggle('active',sel==='section');optR.classList.toggle('active',sel==='review');if(onChange)onChange(sel)};
  optS.onclick=()=>{sel='section';apply()};optR.onclick=()=>{sel='review';apply()};apply();
  seg.appendChild(optS);seg.appendChild(optR);row.appendChild(seg);
  return{row,get:()=>sel};
}
/* 新規プロジェクト作成（セクション/レビューとは別UI・トップ階層専用）
   ・ページ種別の選択なし（必ずプロジェクト＝section扱い）
   ・連番なし（プロジェクトは1つ）
   ・サムネイル画像を指定可能（プロジェクトフォルダ直下 thumbnails/ に格納） */
function openProjectModal(){
  openModal(body=>{
    body.classList.add('proj-modal');
    const inner=mHead(body,'新規プロジェクト','カテゴリ・タスクとは別の、最上位のプロジェクトです');
    /* サムネイル（タイルの縦横比に合わせてトリミング可能） */
    inner.appendChild(el('div','form-label','プロジェクトサムネイル（任意・ドラッグ/拡大でタイル表示範囲を調整）'));
    let thumbFile=null,thumbUrl=null,cropWidget=null;
    const thumbHost=el('div');inner.appendChild(thumbHost);
    function pickFile(){const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.onchange=()=>setImg(fi.files[0]);fi.click()}
    function setImg(f){if(!f)return;if(!f.type.startsWith('image/')){toast('画像ファイルを選択してください');return}if(thumbUrl){try{URL.revokeObjectURL(thumbUrl)}catch(_){}}thumbFile=f;thumbUrl=URL.createObjectURL(f);renderThumbHost()}
    function renderThumbHost(){
      thumbHost.innerHTML='';cropWidget=null;
      if(!thumbUrl){
        const p=el('div','pc-thumb');p.appendChild(icoEl('film'));p.appendChild(el('div','ph','画像をドロップ、またはクリックで選択'));
        p.onclick=pickFile;p.ondragover=e=>{e.preventDefault();p.classList.add('drag')};p.ondragleave=()=>p.classList.remove('drag');
        p.ondrop=e=>{e.preventDefault();p.classList.remove('drag');setImg([...(e.dataTransfer.files||[])][0])};
        thumbHost.appendChild(p);
      }else{
        cropWidget=makeCropEditor({url:thumbUrl,crop:{s:1,fx:0,fy:0}});
        thumbHost.appendChild(cropWidget.el);
        const rep=el('button','btn btn-ghost btn-sm','画像を選び直す');rep.type='button';rep.style.marginBottom='4px';rep.onclick=pickFile;
        thumbHost.appendChild(rep);
      }
    }
    renderThumbHost();
    /* プロジェクト名 */
    const nameRow=frow('プロジェクト名','input');inner.appendChild(nameRow.r);
    /* 保存先フォルダ */
    let projFolderHandle=null;
    inner.appendChild(el('div','form-label','保存先フォルダ（このプロジェクト専用。動画・画像・サムネイルを格納）'));
    if(storage.supportsFolder()){
      const fwrap=el('div');fwrap.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px';
      const fcur=el('span','form-label');fcur.style.margin='0';fcur.textContent='未指定（フォルダなしでは動画・サムネイルを保存できません）';
      const fpick=el('button','btn btn-ghost btn-sm','フォルダを指定');fpick.type='button';
      fpick.onclick=async()=>{try{const h=await window.showDirectoryPicker({mode:'readwrite'});projFolderHandle=h;fcur.textContent='現在: '+h.name}catch(e){if(e&&e.name!=='AbortError')toast('フォルダ選択に失敗しました')}};
      const fclr=el('button','btn btn-ghost btn-sm','解除');fclr.type='button';
      fclr.onclick=()=>{projFolderHandle=null;fcur.textContent='未指定（フォルダなしでは動画・サムネイルを保存できません）'};
      fwrap.appendChild(fpick);fwrap.appendChild(fclr);fwrap.appendChild(fcur);inner.appendChild(fwrap);
    }else{
      inner.appendChild(el('div','form-label','お使いのブラウザはフォルダ保存に未対応です（Chrome / Edge 推奨）。'));
    }
    /* 説明 */
    const descRow=frow('説明（任意）','textarea');inner.appendChild(descRow.r);
    const cancel=el('button','btn btn-ghost','キャンセル');cancel.onclick=()=>{if(thumbUrl){try{URL.revokeObjectURL(thumbUrl)}catch(_){}}closeModal()};
    const save=el('button','btn btn-primary','プロジェクトを作成');
    save.onclick=async()=>{
      const name=nameRow.f.value.trim();if(!name)return toast('プロジェクト名を入力してください');
      const id=addNode(null,name,descRow.f.value.trim(),'section');
      if(projFolderHandle){await storage.setProjRoot(id,projFolderHandle);getNode(id).folderName=projFolderHandle.name}
      /* サムネイルは元画像をそのまま（サイズ変更なし）プロジェクトフォルダ直下 thumbnails/ に保存し、
         トリミングは crop パラメータ（node.thumbCrop）として別途保持 */
      if(thumbFile){
        if(!projFolderHandle){toast('サムネイルは保存先フォルダ設定時のみ保存されます（プロジェクトは作成しました）');}
        else{try{const ext=(thumbFile.name.match(/\.[^.]+$/)||['.jpg'])[0];const ref=await storage.putMedia('thumbnails',newId('media')+ext,thumbFile,{projectId:id});if(ref){getNode(id).thumbnail=ref;getNode(id).thumbCrop=cropWidget?cropWidget.getCrop():{s:1,fx:0,fy:0}}}catch(_){}}
      }
      if(thumbUrl){try{URL.revokeObjectURL(thumbUrl)}catch(_){}}
      await persist();closeModal();go(id);resolveThumbs();
    };
    mFoot(body,[cancel,save]);
  });
}
function openAddModal(parentId){
  openModal(body=>{
    const cur=parentId?getNode(parentId):null;
    const inner=mHead(body,'項目を追加',cur?('親: '+cur.name):'新規項目');
    const nameRow=frow('名前 / ベース名（例: ショット01 / cut）','input');
    inner.appendChild(nameRow.r);
    const nameLab=nameRow.r.querySelector('label');
    let stgSection=null;
    const ts=typeSelector('section',t=>{if(stgSection)stgSection.style.display=(t==='section')?'':'none'});inner.appendChild(ts.row);
    /* 連番で複数作成（同じ工程を含むフォルダを一括作成） */
    const seqTop=el('label','form-label');seqTop.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px';
    const seqCb=el('input');seqCb.type='checkbox';seqTop.appendChild(seqCb);seqTop.appendChild(document.createTextNode('連番で複数作成'));
    const seqFields=el('div');seqFields.style.cssText='display:none;gap:12px;flex-wrap:wrap;margin:6px 0 6px';
    const mkNum=(lab,val)=>{const box=el('div');box.style.cssText='display:flex;flex-direction:column;gap:3px';const l=el('label','form-label',lab);l.style.margin='0';const i=el('input','form-input');i.type='number';i.value=String(val);i.style.width='84px';box.appendChild(l);box.appendChild(i);seqFields.appendChild(box);return i};
    const cntI=mkNum('個数',3),startI=mkNum('開始番号',10),stepI=mkNum('増分',10),digI=mkNum('桁数',3);
    const prev=el('div','form-label');prev.style.color='var(--text3)';
    const updPrev=()=>{if(!seqCb.checked){prev.textContent='';return}const base=nameRow.f.value.trim()||'name';const cnt=Math.min(4,Math.max(1,parseInt(cntI.value)||1));const start=parseInt(startI.value)||0,step=parseInt(stepI.value)||1,dig=Math.max(0,parseInt(digI.value)||0);const ex=[];for(let i=0;i<cnt;i++)ex.push(base+String(start+i*step).padStart(dig,'0'));prev.textContent='例: '+ex.join(', ')+((parseInt(cntI.value)||1)>4?' …':'')};
    [cntI,startI,stepI,digI,nameRow.f].forEach(i=>i.addEventListener('input',updPrev));
    seqCb.onchange=()=>{seqFields.style.display=seqCb.checked?'flex':'none';nameLab.textContent=seqCb.checked?'ベース名（例: cut → cut010, cut020 …）':(cur?'名前 / ベース名（例: ショット01 / cut）':'プロジェクト名');updPrev()};
    inner.appendChild(seqTop);inner.appendChild(seqFields);inner.appendChild(prev);
    /* 作成する各フォルダ内の工程（親の設定を初期値に、その場で編集可） */
    stgSection=el('div');
    stgSection.appendChild(el('div','form-label','各フォルダ内に作成するタスク'));
    const stgWrap=el('div','step-grid');stgSection.appendChild(stgWrap);
    let stgArr=(cur&&Array.isArray(cur.stages)?cur.stages.slice():[]).map(x=>typeof x==='string'?x:(x&&x.name)||'');
    const redrawStg=()=>{
      stgWrap.innerHTML='';
      stgArr.forEach((nm,i)=>{
        const row=el('div','step-row');
        const sc=el('span');sc.style.cssText='width:13px;height:13px;border-radius:3px;flex-shrink:0;align-self:center;background:'+stageColor(nm);
        const inp=el('input','form-input');inp.value=nm;inp.oninput=()=>{stgArr[i]=inp.value;sc.style.background=stageColor(inp.value)};
        const del=el('button','btn btn-danger btn-sm','削除');del.onclick=()=>{stgArr.splice(i,1);redrawStg()};
        row.appendChild(sc);row.appendChild(inp);row.appendChild(del);stgWrap.appendChild(row);
      });
      if(!stgArr.length)stgWrap.appendChild(el('div','form-label','（工程なし。「＋ 工程を追加」で設定できます）'));
    };
    redrawStg();
    const addStg=el('button','btn btn-ghost btn-sm','＋ 工程を追加');addStg.style.marginBottom='6px';addStg.onclick=()=>{stgArr.push('新工程');redrawStg()};
    stgSection.appendChild(addStg);
    inner.appendChild(stgSection);
    const descRow=frow('説明（任意）','textarea');inner.appendChild(descRow.r);
    const cancel=el('button','btn btn-ghost','キャンセル');cancel.onclick=closeModal;
    const save=el('button','btn btn-primary','追加');
    save.onclick=async()=>{
      const base=nameRow.f.value.trim();if(!base)return toast('名前を入力してください');
      const type=ts.get();
      let names=[base];
      if(seqCb.checked){
        const cnt=Math.max(1,Math.min(200,parseInt(cntI.value)||1));
        const start=parseInt(startI.value)||0,step=parseInt(stepI.value)||1,dig=Math.max(0,parseInt(digI.value)||0);
        names=[];for(let i=0;i<cnt;i++)names.push(base+String(start+i*step).padStart(dig,'0'));
      }
      const stages=(type==='section')?stgArr.map(x=>x.trim()).filter(Boolean):[];
      const createdIds=[];
      for(const nm of names){
        const id=addNode(parentId,nm,names.length===1?descRow.f.value.trim():'',type);
        createdIds.push(id);
        if(stages.length){for(const st of stages)addNode(id,st,'','review');getNode(id).stages=stages.slice()}
      }
      await persist();closeModal();if(parentId)state.expanded.add(parentId);render();resolveThumbs();
      if(names.length>1)toast(names.length+'件を作成しました');
    };
    mFoot(body,[cancel,save]);
  });
}
function addNode(parentId,name,description,type){const node={id:newId('nd'),parentId:parentId,name,type:type||'section',description:description||'',thumbnail:null,createdAt:nowIso(),versions:[]};DB.nodes.push(node);return node.id}

/* 名称変更 */
function openRename(node){
  openModal(body=>{
    const inner=mHead(body,'項目の設定',node.name);
    const nameRow=frow('名前','input');nameRow.f.value=node.name;
    inner.appendChild(nameRow.r);
    const ts=typeSelector(node.type);inner.appendChild(ts.row);
    const kids=childrenOf(node.id).length,vers=node.versions.length;
    if(kids||vers)inner.appendChild(el('div','form-label','※ 種別を変えてもデータは消えません（タスクにすると子項目は非表示、カテゴリにすると動画ログは非表示になります）。現在: 子'+kids+'件 / 動画'+vers+'本'));
    const descRow=frow('説明','textarea');descRow.f.value=node.description||'';
    inner.appendChild(descRow.r);
    /* セクションフォルダ：この中で管理する工程（子フォルダに一括作成される工程テンプレート） */
    let stagesArr=null;
    if(node.type==='section'){
      inner.appendChild(el('div','form-label','この中で管理する工程（子フォルダ作成時にテンプレートとして使用）'));
      const stgWrap=el('div','step-grid');
      stagesArr=(Array.isArray(node.stages)?node.stages:[]).map(x=>typeof x==='string'?x:(x&&x.name)||'');
      const redrawStg=()=>{
        stgWrap.innerHTML='';
        stagesArr.forEach((nm,i)=>{
          const row=el('div','step-row');
          const sc=el('span');sc.style.cssText='width:13px;height:13px;border-radius:3px;flex-shrink:0;align-self:center;background:'+stageColor(nm);
          const inp=el('input','form-input');inp.value=nm;inp.oninput=()=>{stagesArr[i]=inp.value;sc.style.background=stageColor(inp.value)};
          const del=el('button','btn btn-danger btn-sm','削除');del.onclick=()=>{stagesArr.splice(i,1);redrawStg()};
          row.appendChild(sc);row.appendChild(inp);row.appendChild(del);stgWrap.appendChild(row);
        });
      };
      redrawStg();
      inner.appendChild(stgWrap);
      const addStg=el('button','btn btn-ghost btn-sm','＋ 工程を追加');addStg.style.marginBottom='12px';
      addStg.onclick=()=>{stagesArr.push('新工程');redrawStg()};
      inner.appendChild(addStg);
    }
    /* タスク（工程）：作業担当・チェック担当（メンバーから選択。ショット単位ではなく工程ごとに設定） */
    /* 作業者/チェック者の設定はタスクページ上部バー（設定ボタンの左）に移設 */
    /* プロジェクト（ルート）ならステータス／進捗のショット親フォルダを編集できる */
    let stArr=null,spSel=null,projThumbFile=null,projThumbUrlTmp=null,projCropWidget=null;
    let pwNew=null,pwConf=null,pwRemove=null;
    if(!node.parentId){
      /* プロジェクトサムネイル（元画像はそのまま・トリミングのみ調整可能） */
      inner.appendChild(el('div','form-label','プロジェクトサムネイル（ドラッグ/拡大でタイル表示範囲を調整）'));
      const thHost=el('div');inner.appendChild(thHost);
      const pickTh=()=>{const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.onchange=()=>setTh(fi.files[0]);fi.click()};
      const setTh=f=>{if(!f)return;if(!f.type.startsWith('image/')){toast('画像ファイルを選択してください');return}if(projThumbUrlTmp){try{URL.revokeObjectURL(projThumbUrlTmp)}catch(_){}}projThumbFile=f;projThumbUrlTmp=URL.createObjectURL(f);node.thumbCrop={s:1,fx:0,fy:0};renderTh()};
      async function renderTh(){
        thHost.innerHTML='';projCropWidget=null;
        let url=projThumbUrlTmp||(node.thumbnail?await storage.getURL(node.thumbnail):null);
        if(url){
          projCropWidget=makeCropEditor({url,crop:node.thumbCrop||{s:1,fx:0,fy:0}});thHost.appendChild(projCropWidget.el);
          const rep=el('button','btn btn-ghost btn-sm','画像を変更');rep.type='button';rep.style.marginBottom='10px';rep.onclick=pickTh;thHost.appendChild(rep);
        }else{
          const p=el('div','pc-thumb');p.appendChild(icoEl('film'));p.appendChild(el('div','ph','画像をドロップ、またはクリックで選択'));
          p.onclick=pickTh;p.ondragover=e=>{e.preventDefault();p.classList.add('drag')};p.ondragleave=()=>p.classList.remove('drag');
          p.ondrop=e=>{e.preventDefault();p.classList.remove('drag');setTh([...(e.dataTransfer.files||[])][0])};
          thHost.appendChild(p);
          if(!node.folderName)thHost.appendChild(el('div','form-label','（保存先フォルダ設定時のみ保存されます）'));
        }
      }
      renderTh();
      inner.appendChild(el('div','form-label','ステータス定義（このプロジェクト全体で使用）'));
      const stWrap=el('div','step-grid');
      stArr=(node.statuses&&node.statuses.length?node.statuses:DEFAULT_STATUSES).map(x=>({...x}));
      const redrawSt=()=>{
        stWrap.innerHTML='';
        stArr.forEach((st2,i)=>{
          const row=el('div','step-row');
          const color=el('input');color.type='color';color.value=st2.color;color.style.cssText='width:36px;height:30px;background:none;border:none';color.oninput=()=>st2.color=color.value;
          const nm=el('input','form-input');nm.value=st2.label;nm.oninput=()=>st2.label=nm.value;
          const del=el('button','btn btn-danger btn-sm','削除');del.onclick=()=>{stArr.splice(i,1);redrawSt()};
          row.appendChild(color);row.appendChild(nm);row.appendChild(del);stWrap.appendChild(row);
        });
      };
      redrawSt();
      inner.appendChild(stWrap);
      const addSt=el('button','btn btn-ghost btn-sm','＋ ステータスを追加');addSt.style.marginBottom='12px';
      addSt.onclick=()=>{stArr.push({id:newId('st'),label:'新ステータス',color:'#60a5ff'});redrawSt()};
      inner.appendChild(addSt);
      /* 進捗（工程/ステータスグラフ）のショット親フォルダ */
      inner.appendChild(el('div','form-label','進捗グラフのショット親フォルダ（この直下がショット、その下が工程）'));
      spSel=el('select','form-input');
      spSel.appendChild(new Option('（自動検出）',''));
      const folders=[node,...descendants(node.id).filter(n=>n.type==='section')];
      for(const f of folders){const label=(f.id===node.id?'（プロジェクト直下）':pathOf(f.id).slice(1).map(x=>x.name).join(' / '));spSel.appendChild(new Option(label,f.id))}
      spSel.value=(node.shotsParentId&&getNode(node.shotsParentId))?node.shotsParentId:'';
      inner.appendChild(spSel);
      /* プロジェクト別の保存先フォルダ（ブラウザが使用するフォルダパス。サブミット等を格納） */
      if(storage.supportsFolder()){
        inner.appendChild(el('div','form-label','保存先フォルダ（このプロジェクト専用。動画・画像を格納。未指定ならブラウザ内保存）'));
        const fwrap=el('div');fwrap.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px';
        const fcur=el('span','form-label');fcur.style.margin='0';fcur.textContent=node.folderName?('現在: '+node.folderName):'未指定（ブラウザ内保存を使用）';
        const fpick=el('button','btn btn-ghost btn-sm','フォルダを指定');fpick.type='button';
        fpick.onclick=async()=>{try{const h=await window.showDirectoryPicker({mode:'readwrite'});await storage.setProjRoot(node.id,h);node.folderName=h.name;fcur.textContent='現在: '+h.name;await persist();updateFolderStatus();toast('保存先フォルダを設定しました')}catch(e){if(e&&e.name!=='AbortError')toast('フォルダ選択に失敗しました')}};
        const fclr=el('button','btn btn-ghost btn-sm','解除');fclr.type='button';
        fclr.onclick=async()=>{await storage.clearProjRoot(node.id);delete node.folderName;fcur.textContent='未指定（ブラウザ内保存を使用）';await persist();updateFolderStatus()};
        fwrap.appendChild(fpick);fwrap.appendChild(fclr);fwrap.appendChild(fcur);inner.appendChild(fwrap);
      }else{
        inner.appendChild(el('div','form-label','保存先フォルダ：お使いのブラウザはフォルダ保存に未対応です（Chrome / Edge 推奨）。ブラウザ内保存で動作します。'));
      }
      /* プロジェクトメンバー（担当割り当て・メンション用。共有フォルダ内 json に保存） */
      inner.appendChild(el('div','divider'));
      const memWrap=el('div');memWrap.style.cssText='display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap';
      memWrap.appendChild(el('div','form-label','プロジェクトメンバー（担当割り当て・メンション・ロール用。共有フォルダに保存）'));
      const memBtn=el('button','btn btn-ghost btn-sm','👥 メンバー管理…');memBtn.type='button';memBtn.onclick=()=>openMembersWindow(node);
      memWrap.appendChild(memBtn);
      inner.appendChild(memWrap);
      /* プロジェクトのパスワード保護（画面上のアクセス制限） */
      inner.appendChild(el('div','divider'));
      inner.appendChild(el('div','form-label','パスワード保護（'+(node.passHash?'設定済み':'未設定')+'）— このプロジェクトを開くときにパスワードを要求します'));
      pwNew=frow(node.passHash?'新しいパスワード':'パスワード','input');pwNew.f.type='password';pwNew.f.placeholder=node.passHash?'変更する場合のみ入力':'パスワードを設定';inner.appendChild(pwNew.r);
      pwConf=frow('確認（再入力）','input');pwConf.f.type='password';inner.appendChild(pwConf.r);
      if(node.passHash){const rr=el('label','form-check');rr.style.cssText='display:flex;align-items:center;gap:8px;margin:6px 0';pwRemove=el('input');pwRemove.type='checkbox';rr.appendChild(pwRemove);rr.appendChild(el('span','form-label','パスワード保護を解除する（誰でも開けるようになります）'));rr.querySelector('.form-label').style.margin='0';inner.appendChild(rr)}

/* ============================================================
   プロジェクトのパスワード保護（UIレベルのアクセス制限）
   ・root.passHash（SHA-256 の16進）と root.passSalt を layna.project.json に保存
   ・パスワード平文は保存しない。解錠状態はタブ内（sessionStorage）のみ保持
   ・注意：データ本体は共有フォルダにあるため、フォルダ直アクセスには無力（画面上の制限）
   ・将来のアクセス権付与方式（Firebase）への布石 */
function _hex(buf){return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
function genSalt(){const a=new Uint8Array(16);(self.crypto||window.crypto).getRandomValues(a);return _hex(a.buffer)}
async function hashPass(salt,pw){
  const data=new TextEncoder().encode(String(salt)+':'+String(pw));
  try{if(self.crypto&&self.crypto.subtle){const h=await self.crypto.subtle.digest('SHA-256',data);return _hex(h)}}catch(_){}
  /* フォールバック（subtle 不可環境）：FNV-1a を複数ラウンド */
  let out='';let h=0x811c9dc5;const bytes=new Uint8Array(data);
  for(let round=0;round<4;round++){for(let i=0;i<bytes.length;i++){h^=bytes[i];h=(h*0x01000193)>>>0}out+=('0000000'+h.toString(16)).slice(-8)}
  return out;
}
async function setProjectPassword(root,pw){root.passSalt=genSalt();root.passHash=await hashPass(root.passSalt,pw)}
async function verifyPass(root,pw){if(!root||!root.passHash)return true;return (await hashPass(root.passSalt||'',pw))===root.passHash}
function unlockedSet(){if(!state._unlocked){state._unlocked=new Set();try{const a=JSON.parse(sessionStorage.getItem('layna.unlocked')||'[]');if(Array.isArray(a))a.forEach(x=>state._unlocked.add(x))}catch(_){}}return state._unlocked}
function markUnlocked(id){unlockedSet().add(id);try{sessionStorage.setItem('layna.unlocked',JSON.stringify([...state._unlocked]))}catch(_){}}
function projectLocked(root){return !!(root&&root.passHash&&!unlockedSet().has(root.id))}

/* 削除（子孫・メディアも） */
async function deleteNode(node){
  const desc=descendants(node.id);const cnt=desc.length;
  if(!confirm('「'+node.name+'」'+(cnt?('と配下の'+cnt+'項目'):'')+'を削除しますか？（動画も削除されます）'))return;
  const all=[node,...desc];
  for(const n of all)for(const v of n.versions||[]){await storage.delMedia(v.file);await storage.delMedia(v.thumb)}
  const ids=new Set(all.map(n=>n.id));
  const isProject=!node.parentId;
  /* 削除対象のクリップを含むリールを除去（プロジェクト削除時はそのプロジェクトのリール全て） */
  DB.reels=(DB.reels||[]).filter(r=>isProject?(r.projectId||reelProjectId(r))!==node.id:!r.clips.some(c=>ids.has(c.nodeId)));
  DB.nodes=DB.nodes.filter(n=>!ids.has(n.id));
  DB.submits=(DB.submits||[]).filter(s=>!ids.has(s.nodeId||s.projectId)&&s.projectId!==node.id);
  if(isProject){/* プロジェクト削除：保存データと接続情報も破棄 */
    REG=REG.filter(e=>e.id!==node.id);delete _saveCache.proj[node.id];delete _saveCache.reels[node.id];
    try{await storage.delProject(node.id);await storage.clearProjRoot(node.id)}catch(_){}
  }
  await persist();
  const parent=node.parentId;go(getNode(parent)?parent:null);
}

/* ============================================================
   アップロード / レビュー
   ============================================================ */
async function uploadVersion(node,file,ui,opts){
  opts=opts||{};
  ui.prog.classList.remove('hidden');ui.pct.textContent='サムネイル生成中...';ui.bi.style.width='30%';
  const isVideo=file.type.startsWith('video/');
  try{
    const thumbDataUrl=await genThumb(file);ui.pct.textContent='保存中...';ui.bi.style.width='60%';
    const ext=(file.name.match(/\.[^.]+$/)||[''])[0];const id=newId('media');
    const sub=opts.sub||'media';const thumbSub=opts.sub?opts.sub+'/thumbnails':'thumbnails';const pm={projectId:opts.projectId};
    const mediaRef=await storage.putMedia(sub,id+ext,file,pm);
    if(!mediaRef){ui.prog.classList.add('hidden');toast('保存先フォルダが未設定のため保存できません。プロジェクト設定でフォルダを指定してください');return}
    let thumbRef=null;if(thumbDataUrl){const blob=await(await fetch(thumbDataUrl)).blob();thumbRef=await storage.putMedia(thumbSub,id+'.jpg',blob,pm)}else if(!isVideo)thumbRef=mediaRef;
    /* 名前：入力があればそれ、空欄なら動画のタイトル（拡張子なしのファイル名） */
    const vname=(opts.name&&opts.name.trim())||file.name.replace(/\.[^.]+$/,'');
    const version={id:newId('ver'),name:vname,type:isVideo?'video':'image',file:mediaRef,thumb:thumbRef,uploadedBy:currentUser(),uploadedAt:nowIso(),review:{status:'pending',notes:[]}};

    for(const n of shownNotes()){
      if(n.frame==null||!(n.drawing&&n.drawing.length))continue;

  /* B を A に同期：停止・シーク中は厳密に、再生中はドリフト補正のみ */
  function syncBToA(hard){
    if(!cmpOn||!bVid)return;
    /* 停止・シーク・コマ送り時は厳密にフレーム一致（B の再生速度は一切変更しない） */
    if(hard||media.paused){const t=Math.min(media.currentTime,(bVid.duration||media.currentTime));if(Math.abs((bVid.currentTime||0)-t)>0.002){bSeekBusy=true;try{bVid.currentTime=t}catch(_){bSeekBusy=false}}}
  }

  }

  /* レイヤー削除：未送信の描画（pending / 記入中ストローク / 下書き）から当該レイヤーを除去し、上位レイヤーを繰り下げ */
  function deleteLayer(i){
    if(!confirm('レイヤー L'+i+' を削除しますか？（このレイヤーの未送信の描画が削除されます）'))return;
    const shift=arr=>{for(const s of arr){const L=s.layer||1;if(L>i)s.layer=L-1}};
    pending=pending.filter(p=>(p.layer||1)!==i);shift(pending);
    if(stroke){const L=stroke.layer||1;if(L===i)stroke=null;else if(L>i)stroke.layer=L-1}
    for(const dn of drafts){if(dn.drawing&&dn.drawing.length){dn.drawing=dn.drawing.filter(s=>(s.layer||1)!==i);shift(dn.drawing)}}

  function updateLayerPanel(){

  eyeBtn.onclick=()=>{annotVisible=!annotVisible;eyeBtn.classList.toggle('active',annotVisible);eyeBtn.textContent=annotVisible?'👁':'—';drawAll()};

  function paintStrokes(ctx,list,alpha){paintStrokeList(ctx,canvas.width,canvas.height,list,alpha)}

  /* 顔の向きガイド：ドラッグ操作。既存ガイドの本体をヒットすれば編集、無ければ新規配置 */

  /* --- 再生同期（フレーム表示・そのフレームの描画・タイムライン） --- */

  /* 未送信＝記入済み下書き(drafts)＋未記入の pending アノテ＋入力中コメント。
     どれかあれば送信バーを表示（アノテのみ・記入し忘れでも送信できるようにリールと統一） */
  function updSubmit(){const has=drafts.length||pending.length||(ta&&ta.value.trim());submitLab.textContent=drafts.length?('未送信の記入: '+drafts.length+'件'):(has?'未送信の内容があります':'');submitBar.style.display=has?'':'none';}
  function renderNotes(){
    list.innerHTML='';
    const shown=v.review.notes.filter(n=>!noteEmbedOnly(n)); /* 描画のみは動画に埋め込むだけでコメント欄には出さない */
    if(!shown.length&&!drafts.length)list.appendChild(el('div','log-empty-note','コメントはまだありません。'));
    const refresh=async()=>{await persist();renderNotes();drawAll();drawTimeline()};
    for(const n of shown)list.appendChild(noteBlock(v,n,{refresh,onSeek:isVideo?seekFrame:null}));
    for(const n of drafts)list.appendChild(draftBlock(n));
    list.scrollTop=list.scrollHeight;
  }
  renderNotes();updSubmit();
  /* 記入：コメント／アノテーションを下書き(drafts)に積む。まだレビューページには反映しない。
     ・コメント＋アノテ → テキスト＋描画スクショ／・コメントのみ → テキスト／・アノテのみ → 描画スクショ
     ・描いて記入を押さなければ pending のまま（クリップに埋め込み表示されるだけで反映されない） */
  const record=async(auto)=>{
    /* 各線は描いたフレームごとに別ノートへ（複数フレームにまたがってもズレない）。
       コメントは現在フレームのノートに付ける。リールと同じ buildFrameNotes を使用。
       auto=true（送信時の自動記入）で「描画のみ」ノートは noShot を付与しスクショを省略。
       記入ボタン（auto無し）では noShot を付けず、スクショ付きで表示する。 */
    const notes=buildFrameNotes(pending,{text:ta.value,curFrame:isVideo?dispFrame():null,dur:parseInt(durSel.value)||1,isVideo,mentions:ta._mentions,root:rootOf(node)});
    if(!notes.length)return;
    for(const n of notes){n._draft=true;if(auto&&n.drawing&&n.drawing.length&&!(n.text&&String(n.text).trim()))n.noShot=true;}
    drafts.push(...notes);pending=[];stroke=null;headActive=null;
    ta.value='';ta._mentions=[];renderNotes();drawAll();drawTimeline();updSubmit();
  };
  /* 送信：記入した内容をまとめてレビューページ(v.review.notes)へ反映。
     未記入の pending アノテ・入力中コメントも自動で記入してから送信（リールと統一）。 */
  async function submit(){
    if(ta.value.trim()||pending.length)record(true); /* 未記入分を自動記入（描画のみはスクショ省略） */
    if(!drafts.length)return;
    for(const n of drafts){delete n._draft;v.review.notes.push(n)}
    drafts=[];
    await persist();renderNotes();drawAll();drawTimeline();updSubmit();renderBody();resolveThumbs();
  }
  sb.onclick=()=>record();submitBtn.onclick=submit; /* 記入ボタンは auto無し（スクショ付き） */
  ta.oninput=()=>updSubmit(); /* 入力中コメントでも送信バーを表示 */
  ta.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();record()}};

  /* --- キーボード --- */
  function onKey(e){
    if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
    if(e.key==='Escape')close();
    else if(isVideo&&e.key==='ArrowLeft'){e.preventDefault();seekFrame(dispFrame()-1)}
    else if(isVideo&&e.key==='ArrowRight'){e.preventDefault();seekFrame(dispFrame()+1)}
    else if(isVideo&&e.key===' '){e.preventDefault();playBtn.onclick()}
  }
  document.addEventListener('keydown',onKey);

  /* --- メディア読み込み --- */
  (async()=>{const url=await storage.getURL(v.file);if(url)media.src=url;setTimeout(fit,60)})();
  /* 版カードの「⇄ 比較」等から比較対象を指定して開いた場合 */
  if(opts.compare){const bn=getNode(opts.compare.nodeId);const bv=bn&&bn.versions.find(x=>x.id===opts.compare.verId);if(bn&&bv)enterCompare(bn,bv)}
}

/* ============================================================
   進捗管理（別ウィンドウ）
   OGPipeline のショットリストを踏襲。
   「ショット親」を指定 → 直下がショット、ショット直下のフォルダ名が
   工程（ステータス）。工程ごとの最新動画（アップロード時刻）を比較し、
   最も新しい動画がある工程がそのショットの現在の進捗になる。
   ============================================================ */
let pgWin=null;const pgUI={};
/* 工程の表示順（Pipeline _stage_rank 準拠）: lay系→anm系→その他、同順位は名前順 */
function stageRank(name){const low=(name||'').toLowerCase();let r;if(low.startsWith('lay')||low.startsWith('layout'))r=0;else if(low.startsWith('anm')||low.startsWith('anim'))r=1;else r=2;return [r,low];}
function stageRankCmp(a,b){const ra=stageRank(a),rb=stageRank(b);return ra[0]-rb[0]||(ra[1]<rb[1]?-1:ra[1]>rb[1]?1:0);}
/* 工程カラー（Pipeline stage_color 準拠：固定マップ＋文字コードハッシュ） */
const STAGE_COLOR_MAP={lay_pri:'#4a90d9',lay_anm:'#5fb878',anm_pri:'#e8a838',anm_sec:'#d9734a'};
const STAGE_PALETTE=['#4a90d9','#5fb878','#e8a838','#d9734a','#9b6dd6','#46c4b8','#d96d9e','#c5c043'];
function stageColor(stage){if(!stage)return '#5a5a6a';const key=stage.toLowerCase().split('/').pop();if(STAGE_COLOR_MAP[key])return STAGE_COLOR_MAP[key];let h=0;for(const c of stage.toLowerCase())h+=c.charCodeAt(0);return STAGE_PALETTE[h%STAGE_PALETTE.length];}
/* ノード配下（自身＋子孫）にある最新動画のアップロード時刻（ISO文字列/なければnull） */
function latestVideoTimeUnder(nodeId){let best=null;const ns=[getNode(nodeId),...descendants(nodeId)];for(const n of ns)if(n)for(const v of (n.versions||[]))if(v.type==='video'){const t=v.uploadedAt||'';if(best===null||t>best)best=t}return best;}
/* ショットの工程一覧（直下フォルダ＝工程）。time は各工程配下の最新動画時刻 */
function shotStages(shot){return childrenOf(shot.id).map(st=>({name:st.name,node:st,time:latestVideoTimeUnder(st.id)}));}
/* ショットの現在工程 = 最も新しい動画が上がっている工程（Pipeline _shot_latest の media 分岐相当） */
function shotCurrentStage(shot){const withVid=shotStages(shot).filter(s=>s.time);if(!withVid.length)return null;withVid.sort((a,b)=>a.time<b.time?-1:a.time>b.time?1:0);return withVid[withVid.length-1].name;}
/* 「ショット親」候補 = 孫を持つノード（＝直下がショット、その下が工程）。無ければルート */
function shotParentCandidates(){const c=DB.nodes.filter(n=>childrenOf(n.id).some(ch=>childrenOf(ch.id).length>0));return c.length?c:DB.nodes.filter(n=>!n.parentId);}
/* ノード配下の最新動画バージョン（{v,node,t}／なければnull） */
function latestVideoVersionUnder(nodeId){let best=null;for(const n of [getNode(nodeId),...descendants(nodeId)])if(n)for(const v of (n.versions||[]))if(v.type==='video'){const t=v.uploadedAt||'';if(!best||t>best.t)best={v,node:n,t}}return best;}
/* tab: 'stage'（工程別）| 'status'（ステータス別）。各ショットに key（分類）を付与 */
function progressData(parentId,tab,filterFn){
  const parent=getNode(parentId);
  let shots=childrenOf(parentId);
  if(filterFn)shots=shots.filter(filterFn);
  const statuses=projStatuses(parent||shots[0]||{});
  const perShot=shots.map(shot=>{
    const stages=childrenOf(shot.id).map(st=>({node:st,time:latestVideoTimeUnder(st.id)}));
    const withVid=stages.filter(s=>s.time).sort((a,b)=>a.time<b.time?-1:a.time>b.time?1:0);
    const curNode=withVid.length?withVid[withVid.length-1].node:null;
    return {shot,stageName:curNode?curNode.name:null,curNode,
            statusId:curNode?nodeStatus(curNode):'empty',
            latest:latestVideoVersionUnder(shot.id),stageCount:childrenOf(shot.id).length};
  });
  let rows;
  if(tab==='status'){
    const buckets=statuses.map(s=>({id:s.id,label:s.label,color:s.color,count:0}));
    const byId=Object.fromEntries(buckets.map(b=>[b.id,b]));
    const emptyB={id:'empty',label:'未着手',color:'#5a5a6a',count:0};
    for(const ps of perShot){const id=(byId[ps.statusId]?ps.statusId:'empty');ps.key=id;(id==='empty'?emptyB:byId[id]).count++}
    rows=buckets.concat(emptyB.count?[emptyB]:[]);
  }else{
    const stageNames=[...new Set(shots.flatMap(s=>childrenOf(s.id).map(c=>c.name)))].sort(stageRankCmp);
    const counts={};for(const ps of perShot){ps.key=ps.stageName||'__none__';counts[ps.key]=(counts[ps.key]||0)+1}
    rows=stageNames.map(nm=>({id:nm,label:nm,color:stageColor(nm),count:counts[nm]||0}));
    if(counts['__none__'])rows.push({id:'__none__',label:'未着手',color:'#5a5a6a',count:counts['__none__']});
  }
  return {parent,total:shots.length,rows,perShot,tab};
}
function drawDonut(cv,rows,total,onPick){
  const c=cv.getContext('2d');const W=cv.width,H=cv.height;c.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,rO=Math.min(W,H)/2-6,rI=rO*0.6,START=-Math.PI/2;
  const segs=[];
  if(!total){c.strokeStyle='#2a2a2f';c.lineWidth=rO-rI;c.beginPath();c.arc(cx,cy,(rO+rI)/2,0,Math.PI*2);c.stroke();cv.onclick=null;cv.style.cursor='default';return}
  let a=START;
  for(const r of rows){
    if(!r.count)continue;
    const frac=r.count/total;const a2=a+frac*Math.PI*2;
    c.beginPath();c.moveTo(cx,cy);c.arc(cx,cy,rO,a,a2);c.closePath();c.fillStyle=r.color;c.fill();
    segs.push({row:r,a1:a,a2});a=a2;
  }
  /* 中央くり抜き */
  c.beginPath();c.arc(cx,cy,rI,0,Math.PI*2);c.fillStyle='#141416';c.fill();
  c.fillStyle='#e8e8ec';c.textAlign='center';c.font='700 26px system-ui,sans-serif';
  c.fillText(String(total),cx,cy-2);
  if(onPick){
    cv.style.cursor='pointer';
    cv.onclick=e=>{const r=cv.getBoundingClientRect();const x=e.clientX-r.left-cx,y=e.clientY-r.top-cy;const dist=Math.hypot(x,y);if(dist<rI||dist>rO)return;let ca=Math.atan2(y,x);while(ca<START)ca+=Math.PI*2;while(ca>=START+Math.PI*2)ca-=Math.PI*2;for(const s of segs)if(ca>=s.a1&&ca<s.a2){onPick(s.row);return}};
  }else{cv.onclick=null;cv.style.cursor='default'}
  c.fillStyle='#8a8a9a';c.font='11px system-ui,sans-serif';c.fillText('ショット',cx,cy+16);
}

async function pgPreview(shot,ver){
  const {mod,mnm,mpth,mvideo}=pgUI;
  mnm.textContent=shot.name+(ver?'　'+ver.name:'');
  mpth.textContent=pathOf(shot.id).slice(0,-1).map(x=>x.name).join(' / ')||'—';
  mod.classList.add('on');
  const url=ver?await storage.getURL(ver.file):null;
  if(url){mvideo.src=url;mvideo.play().catch(()=>{})}
}
function pgBuild(){
  if(!pgWin||pgWin.closed)return;
  const {ce2,wrap}=pgUI;wrap.innerHTML='';
  const cands=shotParentCandidates();
  if(!cands.length){wrap.appendChild(ce2('div','empty','フォルダがありません。ショット→工程の階層を作成してください。'));return}
  if(!pgUI.parentId||!cands.some(c=>c.id===pgUI.parentId))pgUI.parentId=cands[0].id;
  if(pgUI.tab!=='status')pgUI.tab='stage';
  /* ショット親セレクタ */
  const selrow=ce2('div','selrow');
  selrow.appendChild(ce2('label',null,'ショット親フォルダ'));
  const sel=ce2('select');
  for(const c of cands){const o=ce2('option',null,pathOf(c.id).map(x=>x.name).join(' / '));o.value=c.id;if(c.id===pgUI.parentId)o.selected=true;sel.appendChild(o)}
  sel.onchange=()=>{pgUI.parentId=sel.value;pgUI.pick=null;pgBuild()};
  selrow.appendChild(sel);
  wrap.appendChild(selrow);
  /* タブ（工程グラフ / ステータスグラフ） */
  const tabs=ce2('div','tabs');
  const mkTab=(id,lab)=>{const t=ce2('button','tab'+(pgUI.tab===id?' on':''),lab);t.onclick=()=>{if(pgUI.tab!==id){pgUI.tab=id;pgUI.pick=null;pgBuild()}};tabs.appendChild(t)};
  mkTab('stage','工程グラフ');mkTab('status','ステータスグラフ');
  wrap.appendChild(tabs);
  const p=progressData(pgUI.parentId,pgUI.tab);
  selrow.appendChild(ce2('span','cnt','ショット '+p.total+' 件'));
  if(!p.total){wrap.appendChild(ce2('div','empty','このフォルダ直下にショットがありません。'));return}
  const isStage=pgUI.tab==='stage';
  /* 集計（円グラフ＋表） */
  const card=ce2('div','pcard');
  const ph=ce2('div','ph');
  ph.appendChild(ce2('span','pn',p.parent?p.parent.name:'—'));
  ph.appendChild(ce2('span','pc','ショット '+p.total+' 件 / '+(isStage?'工程':'ステータス')+'で色分け・クリックで絞り込み'));
  card.appendChild(ph);
  const body=ce2('div','pbody');
  const cv=ce2('canvas');cv.width=180;cv.height=180;body.appendChild(cv);
  const pick=row=>{pgUI.pick=(pgUI.pick===row.id?null:row.id);pgBuild()};
  drawDonut(cv,p.rows,p.total,pick);
  const tbl=ce2('table','ptbl');
  const thead=ce2('tr');[(isStage?'工程':'ステータス'),'ショット数','割合','進捗'].forEach(h=>thead.appendChild(ce2('th',null,h)));
  tbl.appendChild(thead);
  for(const r of p.rows){
    const tr=ce2('tr','trow'+(r.id==='empty'||r.id==='__none__'?' done':'')+(pgUI.pick===r.id?' pick':''));
    const c1=ce2('td');const sw=ce2('span','sw');sw.style.background=r.color;c1.appendChild(sw);c1.appendChild(ce2('span',null,r.label));tr.appendChild(c1);
    tr.appendChild(ce2('td','num',String(r.count)));
    const pct=p.total?Math.round(r.count/p.total*100):0;
    tr.appendChild(ce2('td','pct',pct+'%'));
    const c4=ce2('td');const bar=ce2('div','bar');const fill=ce2('i');fill.style.width=pct+'%';fill.style.background=r.color;bar.appendChild(fill);c4.appendChild(bar);tr.appendChild(c4);
    tr.onclick=()=>pick(r);
    tbl.appendChild(tr);
  }
  body.appendChild(tbl);
  card.appendChild(body);
  wrap.appendChild(card);
  /* 選択中のセグメント → 該当ショットをグリッド表示 */
  if(pgUI.pick!=null){
    const row=p.rows.find(r=>r.id===pgUI.pick);
    const hits=p.perShot.filter(ps=>ps.key===pgUI.pick);
    wrap.appendChild(ce2('div','sect-h','「'+(row?row.label:'')+'」のショット（'+hits.length+' 件）'));
    const grid=ce2('div','grid');
    for(const ps of hits){
      const tile=ce2('div','tile');
      const th=ce2('div','th');th.appendChild(icoEl('film',th.ownerDocument));
      const lv=ps.latest;
      if(lv&&lv.v.thumb)storage.getURL(lv.v.thumb).then(u=>{if(u){th.textContent='';th.style.backgroundImage='url("'+u+'")'}});
      tile.appendChild(th);
      const bd=ce2('div','bd');
      bd.appendChild(ce2('div','nm',ps.shot.name));
      const mt=ce2('div','mt');
      const badge=ce2('span','badge2',isStage?(ps.stageName||'未着手'):(stInfo(ps.curNode||ps.shot).label));
      badge.style.background=isStage?stageColor(ps.stageName):(stInfo(ps.curNode||ps.shot).color||'#5a5a6a');
      mt.appendChild(badge);
      mt.appendChild(ce2('span','pth',lv?('最新: '+lv.v.name):'動画なし'));
      bd.appendChild(mt);
      tile.appendChild(bd);
      tile.onclick=()=>{if(lv)pgPreview(ps.shot,lv.v);else toast('このショットには動画がありません')};
      grid.appendChild(tile);
    }
    wrap.appendChild(grid);
  }else{
    /* 未選択時はショット別 現在工程/ステータスの一覧 */
    wrap.appendChild(ce2('div','sect-h','ショット別 現在の'+(isStage?'工程':'ステータス')));
    const st=ce2('table','stbl');
    const sth=ce2('tr');['ショット',(isStage?'現在の工程':'ステータス'),'工程数'].forEach(h=>sth.appendChild(ce2('th',null,h)));
    st.appendChild(sth);
    for(const ps of p.perShot){
      const tr=ce2('tr');
      const c1=ce2('td');c1.appendChild(ce2('span','sn',ps.shot.name));c1.appendChild(ce2('div','sp2',pathOf(ps.shot.id).slice(0,-1).map(x=>x.name).join(' / ')||'—'));tr.appendChild(c1);
      const c2=ce2('td');
      if(isStage){if(ps.stageName){const b=ce2('span','badge2',ps.stageName);b.style.background=stageColor(ps.stageName);c2.appendChild(b)}else c2.appendChild(ce2('span','sp2','未着手'))}
      else{const si=stInfo(ps.curNode||ps.shot);if(ps.curNode){const b=ce2('span','badge2',si.label);b.style.background=si.color;c2.appendChild(b)}else c2.appendChild(ce2('span','sp2','未着手'))}
      tr.appendChild(c2);
      tr.appendChild(ce2('td','num',String(ps.stageCount)));
      st.appendChild(tr);
    }
    wrap.appendChild(st);
  }
}

function reelRender(){

    const b=ce(d,'div','clip'+(i===reelUI.cur?' cur':'')+(unsent?' unsent':''));
    b.style.width=Math.max(78,(c.dur||2)*reelUI.pxs)+'px';

    const ops=ce(d,'div','ops');

    mk('✕',()=>{cs.splice(i,1);if(reelUI.cur>=cs.length)reelUI.cur=Math.max(0,cs.length-1);reelUI.loadCur(false);reelRender()},'外す');
    b.appendChild(ops);
    b.onclick=()=>{reelUI.cur=i;reelUI.loadCur(true)};
    track.appendChild(b);
  });
  /* ルーラー：実際のクリップブロック(最小幅・gap込み)の並びに合わせて描画（プレイヘッドとズレないように） */
  const total=cs.reduce((a,c)=>a+(c.dur||0),0);
  const blocks=[...track.querySelectorAll('.clip')];
  reelUI._blocks=blocks; /* プレイヘッド位置計算に使用 */
  const W=Math.max(track.clientWidth,track.scrollWidth);
  ruler.width=W;ruler.height=18;
  const ctx=ruler.getContext('2d');ctx.clearRect(0,0,W,18);
  ctx.font='9px monospace';
  let acc=0;
  blocks.forEach((b,i)=>{
    const x0=b.offsetLeft,bw=b.offsetWidth,dur=cs[i]?(cs[i].dur||0):0;
    /* クリップ境界（縦線）＋開始時刻ラベル */
    ctx.strokeStyle='rgba(96,165,255,.5)';ctx.beginPath();ctx.moveTo(Math.round(x0)+.5,2);ctx.lineTo(Math.round(x0)+.5,18);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillText(fmtSec(acc),x0+3,8);
    /* ブロック内の秒目盛り（ブロック幅にスケール） */
    if(dur>0){ctx.strokeStyle='rgba(255,255,255,.22)';ctx.beginPath();for(let s=1;s<Math.ceil(dur-1e-6);s++){const x=x0+(s/dur)*bw;ctx.moveTo(Math.round(x)+.5,11);ctx.lineTo(Math.round(x)+.5,18)}ctx.stroke()}
    acc+=dur;
  });
  totalLab.textContent='計 '+fmtSec(total)+'・'+cs.length+'クリップ';
  if(reelUI.drawFTL)reelUI.drawFTL();
}

async function reelAddClip(node,v,noDedup){
  if(!reelAlive())return;
  if(v.type!=='video')return;
  /* 同じ動画（同ノード・同バージョン）の重複追加を防ぐ（保存リールの復元時は noDedup で許可） */
  if(!noDedup&&reelUI.clips.some(c=>c.nodeId===node.id&&c.vId===v.id)){reelWin.focus();return}
  const url=await storage.getURL(v.file);if(!url)return;
  const clip={name:node.name+' '+v.name,url,dur:0,nodeId:node.id,vId:v.id};
  reelUI.clips.push(clip);
  if(reelUI.clips.length===1&&reelUI.loadCur)reelUI.loadCur(false); // 最初のクリップは即ロード
  else if(reelUI.preloadNext)reelUI.preloadNext(); // 追加されたクリップが「次」なら裏で先読み
  /* 尺の取得（全体フレーム計算にも使用）。取得後は probe を破棄 */
  const probe=reelUI.d.createElement('video');probe.preload='metadata';probe.src=url;
  const cleanup=()=>{probe.onloadedmetadata=null;probe.onerror=null;try{probe.removeAttribute('src');probe.load()}catch(_){}};
  probe.onloadedmetadata=()=>{clip.dur=probe.duration||0;cleanup();reelRender();if(reelUI.drawFTL)reelUI.drawFTL()};
  probe.onerror=cleanup;
  reelRender();
}
